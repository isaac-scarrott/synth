      },
    };
  }

  function workspacesFrame() {
    return {
      crumb: 'Projects', placeholder: 'Search projects…',
      build() {
        const items = [
          { sec: 'act', icon: ICON_PLUS, label: 'Add project', enter: () => pushFrame(createFrame('workspace')) },
        ];
        allRows('.repo__head').forEach((h) => items.push({ sec: 'list', icon: wsChip(h), label: wsName(h), enter: () => pushFrame(workspaceFrame(h)) }));
        return items;
      },
    };
  }

  function categoryFrame(kind) {
    const cfg = {
      branch:  { crumb: 'Branches', ph: 'Search branches…', sel: '.branch',  mk: (b) => ({ sec: 'list', icon: ICON_BRANCH, label: brName(b), ctx: wsOf(b), enter: () => pushFrame(branchFrame(b)) }) },
      session: { crumb: 'Sessions', ph: 'Search sessions…', sel: '.session', mk: (s) => ({ sec: 'list', icon: seIcon(s), label: seName(s), ctx: seCtx(s), meta: seStatus(s), metaState: sessionState(s), enter: () => runAndClose(() => jumpTo(s)) }) },
    }[kind];
    return {
      crumb: cfg.crumb, placeholder: cfg.ph,
      build() {
        const items = [];
        allRows(cfg.sel).forEach((r) => items.push(cfg.mk(r)));
        return items;
      },
    };
  }

  function workspaceFrame(head) {
    const name = wsName(head);
    return {
      crumb: name, placeholder: 'Search ' + name + '…',
      build() {
        const items = [
          { sec: 'act', icon: ICON_BRANCH, label: 'New branch',  enter: () => pushFrame(createFrame('worktree', head)) },
        ];
        // Session creates land on the workspace's active branch (contextBranch's fallback);
        // the ctx chip names it since the crumb only establishes the workspace.
        const scope = head.closest('[data-repo]');
        const br = scope.querySelector('.branch--active') || scope.querySelector('.branch');
        if (br) {
          const bn = brName(br);
          items.push({ sec: 'act', icon: ICON_TERMINAL, label: 'New terminal',    ctx: bn, enter: () => runAndClose(() => addTerminal(br)) });
          AGENTS.forEach((k) => items.push({ sec: 'act', icon: AGENT_ICON[k], label: 'New ' + SESSION_KINDS[k].name, ctx: bn, enter: () => runAndClose(() => addAgent(br, k)) }));
          items.push({ sec: 'act', icon: ICON_BROWSER,  label: 'New browser',     ctx: bn, enter: () => runAndClose(() => addBrowser(br)) });
        }
        items.push(
          { sec: 'act', icon: ICON_GEAR,   label: 'Settings', enter: () => runAndClose(() => enterSettings(head)) },
          { sec: 'act', icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(head)) },
          { sec: 'act', icon: ICON_MINUS,  label: 'Remove', danger: true, enter: () => pushFrame(confirmFrame(head)) },
        );
        head.closest('[data-repo]').querySelectorAll('.branch').forEach((b) =>
          items.push({ sec: 'list', icon: ICON_BRANCH, label: brName(b), enter: () => pushFrame(branchFrame(b)) }));
        return items;
      },
    };
  }

  function branchFrame(row) {
    const name = brName(row);
    return {
      crumb: name, placeholder: 'Search ' + name + '…',
      build() {
        const items = [
          { sec: 'act', icon: ICON_TERMINAL, label: 'New terminal',    enter: () => runAndClose(() => addTerminal(row)) },
          ...AGENTS.map((k) => ({ sec: 'act', icon: AGENT_ICON[k], label: 'New ' + SESSION_KINDS[k].name, enter: () => runAndClose(() => addAgent(row, k)) })),
          { sec: 'act', icon: ICON_BROWSER,   label: 'New browser',     enter: () => runAndClose(() => addBrowser(row)) },
          { sec: 'act', icon: ICON_RENAME,   label: 'Rename', enter: () => pushFrame(renameFrame(row)) },
          { sec: 'act', icon: ICON_MINUS,    label: 'Remove', danger: true, enter: () => pushFrame(confirmFrame(row)) },
        ];
        if (row.classList.contains('branch--group'))
          row.closest('[data-repo]').querySelectorAll('.sessions .session').forEach((s) =>
            items.push({ sec: 'list', icon: seIcon(s), label: seName(s), meta: seStatus(s), metaState: sessionState(s), enter: () => runAndClose(() => jumpTo(s)) }));
        return items;
      },
    };
  }

  // `a` on a branch/worktree jumps straight to the "add a session" choice — terminal or Claude Code.
  function newSessionFrame(row) {
    const name = brName(row);
    return {
      crumb: 'New session', placeholder: 'New session in ' + name + '…',
      build() {
        return [
          { sec: 'act', icon: ICON_TERMINAL, label: 'New terminal',    ctx: name, enter: () => runAndClose(() => addTerminal(row)) },
          ...AGENTS.map((k) => ({ sec: 'act', icon: AGENT_ICON[k], label: 'New ' + SESSION_KINDS[k].name, ctx: name, enter: () => runAndClose(() => addAgent(row, k)) })),
          { sec: 'act', icon: ICON_BROWSER,   label: 'New browser',     ctx: name, enter: () => runAndClose(() => addBrowser(row)) },
        ];
      },
    };
  }

  function openPaletteAt(frame) {
    closeMenu();
    if (paletteOpen) { pal.stack = [rootFrame()]; pushFrame(frame); return; }
    openPalette();
    pushFrame(frame);
  }

  // The row ⋯ kebab / right-click opens ⌘K with its context pinned to that row, so it shows the
  // exact grouped, concise actions ⌘K gives the focused row — one command menu, one layout, no
  // bespoke per-row frame to keep in sync. A session leaf's own verbs (rename / close, and the
  // browser Page verbs + containment) come through the pinned root's Session group; browsing a
  // row's children lives in the root's Sessions / Branches / Projects search groups.
  function openRowActions(row) {
    closeMenu();
    if (paletteOpen) { pal.pinned = row; pal.stack = [rootFrame()]; pal.input.value = ''; renderFrame(); return; }
    openPalette();
    pal.pinned = row;
    renderFrame();
  }

  // `a` = add the natural child: a worktree under a workspace, a session under a worktree.
  // On a session leaf it adds a sibling session to that leaf's worktree. Drops straight into
  // the ⌘K frame for that action rather than the row's full action list.
  function addToRow(row) {
    const lvl = rowLevel(row);
    if (lvl === 'repo') openPaletteAt(createFrame('worktree', row));
    else if (lvl === 'branch') openPaletteAt(newSessionFrame(row));
    else if (lvl === 'session') { const b = branchGroupOf(row); if (b) openPaletteAt(newSessionFrame(b)); }
  }

  function confirmFrame(row) {
    const level = rowLevel(row);
    if (level === 'branch') return removeWorktreeFrame(row);
    const name = level === 'repo' ? wsName(row) : seName(row);
    const verb = level === 'session' ? 'Close' : 'Remove';
    const owned = level === 'session' ? ownedOf(row) : [];
    const danger = true;   // Close and Remove are both destructive/negative — always red
    const hint = level === 'repo' ? 'Removes it from the sidebar. Nothing on disk is deleted.'
      : owned.length ? `Ends this session and its process, and closes its ${owned.length === 1 ? 'browser' : owned.length + ' browsers'}.`
      : 'Ends this session and its process.';
    return {
      crumb: verb + ' ' + name + '?', mode: 'confirm', note: hint, placeholder: '↵ confirm · esc cancel',
      build() {
        return [
          { icon: level === 'session' ? ICON_TRASH : ICON_MINUS, label: verb, danger, enter: () => runAndClose(() => removeUnit(rowUnit(row))) },
          { icon: ICON_CLOSE, label: 'Cancel', enter: () => popFrame() },
        ];
      },
    };
  }

  // Removing a worktree forks: delete it for real (git worktree remove + rm the folder),
  // or just drop it from the sidebar and leave the checkout on disk to re-add later.
  // The destructive path is danger-styled; the list-only path isn't — the colour is the tell.
  function removeWorktreeFrame(row) {
    const name = brName(row);
    return {
      crumb: 'Remove ' + name + '?', mode: 'confirm',
      note: 'Delete the worktree folder, or just drop it from the sidebar? The git branch itself stays either way.', placeholder: '↵ select · esc cancel',
      build() {
        return [
          { icon: ICON_MINUS, label: 'Remove from sidebar', ctx: 'folder and branch stay on disk', danger: true, enter: () => runAndClose(() => removeUnit(rowUnit(row))) },
          { icon: ICON_TRASH, label: 'Delete worktree', ctx: 'removes the folder from disk', danger: true, enter: () => runAndClose(() => removeUnit(rowUnit(row))) },
          { icon: ICON_CLOSE, label: 'Cancel', enter: () => popFrame() },
        ];
      },
    };
  }

  function createFrame(kind, ctx) {
    if (kind === 'worktree') return worktreeFrame(ctx);
    const cfg = {
      workspace: { crumb: 'Add project', ph: 'Repository path…', empty: 'Type a repository path…', mk: (v) => 'Add project “' + v + '”', go: (v) => openWorktreePicker(v) },
    }[kind];
    return {
      crumb: cfg.crumb, mode: 'input', placeholder: cfg.ph,
      build(q) {
        const v = q.trim();
        return [{ icon: ICON_PLUS, label: v ? cfg.mk(v) : cfg.empty, disabled: !v, enter: () => { if (v) runAndClose(() => cfg.go(v)); } }];
      },
    };
  }

  // New branch via ⌘K: empty until you type, then fuzzy-match every local and remote
  // branch (top 5), or cut a new branch off the typed name. A new branch shows, in one
  // quiet line, the base it forks from and where its worktree lands on disk (ADR-0007).
  function worktreeFrame(ctx) {
    const repo = ctx && ctx.closest('[data-repo]');
    const repoName = ctx ? wsName(ctx) : 'repo';
    const baseEl = repo && (repo.querySelector('.branch--active .branch__name') || repo.querySelector('.branch__name'));
    const baseName = baseEl ? baseEl.textContent : 'main';
    const pathFor = (name) => '…/Synth/worktrees/' + repoName + '/' + name.replace(/[^\w.-]+/g, '-');
    const shown = () => new Set(repo ? [...repo.querySelectorAll('.branch__name')].map((n) => n.textContent) : []);
    const isNew = (v) => v && !ALL_BRANCHES.some((b) => b.name === v);
    return {
      crumb: 'New branch', mode: 'input', placeholder: 'Search branches to check out…',
      dashSpaces: true,
      note: (v) => isNew(v) ? 'New branch off ' + baseName + ' · ' + pathFor(v) : '',
      build(q) {
        const v = q.trim();
        if (!v) return [{ icon: ICON_SEARCH, label: 'Type a branch name to check out or create…', disabled: true }];   // guide, not "No results", on an untouched field
        const skip = shown(), seen = new Set(), scored = [];
        ALL_BRANCHES.forEach((b) => {
          if (seen.has(b.name) || skip.has(b.name)) return;   // dedup local/remote + hide already-checked-out
          seen.add(b.name);
          const s = fuzzy(v, b.name);
          if (s > -Infinity) scored.push({ b, s });
        });
        const items = scored.sort((a, b) => b.s - a.s).slice(0, 5).map(({ b }) => ({
          icon: ICON_BRANCH, label: b.name, ctx: b.remote ? 'origin' : 'local',
          enter: () => { if (repo) runAndClose(() => addBranch(repo, b.name)); },
        }));
        if (!ALL_BRANCHES.some((b) => b.name === v))
          items.push({ icon: ICON_PLUS, label: 'New branch “' + v + '”',
            enter: () => { if (repo) runAndClose(() => addBranch(repo, v)); } });
        return items;
      },
    };
  }

  // Rename any unit inline — the field seeds with the current name and commits once it actually changes.
  function renameFrame(row) {
    const noun = { repo: 'project', branch: 'branch', session: 'session' }[rowLevel(row)] || 'item';
    const cur = (nameElOf(row).textContent || '').trim();
    // An agent session's name is only ever an override on top of its AI-generated title —
    // so offer to clear it back to that agent's default once one's been set.
    const agentKind = row.getAttribute('data-agent');
    const agentDefault = agentKind && SESSION_KINDS[agentKind] ? SESSION_KINDS[agentKind].name : null;
    return {
      crumb: 'Rename ' + cur, mode: 'input', placeholder: 'New ' + noun + ' name…', seed: cur,
      build(q) {
        const v = q.trim();
        const changed = v && v !== cur;
        const items = [{ icon: ICON_RENAME, label: v ? 'Rename to “' + v + '”' : 'Type a new name…', disabled: !changed,
          enter: () => { if (changed) runAndClose(() => renameUnit(row, v)); } }];
        if (agentDefault && cur !== agentDefault)
          items.push({ icon: ICON_RESET, label: 'Reset to default name', ctx: agentDefault,
            enter: () => runAndClose(() => renameUnit(row, agentDefault)) });
        return items;
      },
    };
  }

  // ---- Render ----
  function renderCrumbs() {
    const crumbs = pal.stack.map((f, i) => ({ f, i })).filter((x) => x.f.crumb);
    pal.crumbs.innerHTML = crumbs.map(({ f, i }) => '<span class="cmdk__crumb" data-depth="' + i + '">' + esc(f.crumb) + '</span>').join('');
    pal.crumbs.style.display = crumbs.length ? 'flex' : 'none';
  }

  function renderFrame() {
    const fr = curFrame();
    const q = pal.input.value.trim();
    pal.input.placeholder = fr.placeholder;
    renderCrumbs();
    let items = fr.build(q);
    if (!fr.mode && q) {   // 'list' frames fuzzy-filter by query; 'input'/'confirm' frames don't
      const sectioned = items.some((it) => it.g || it.sec);
      if (sectioned) {
        const byK = new Map();
        items.forEach((it) => { const s = itemScore(q, it); if (s === -Infinity) return; const k = it.g || it.sec || ''; if (!byK.has(k)) byK.set(k, []); byK.get(k).push({ it, s }); });
        byK.forEach((arr) => arr.sort((a, b) => b.s - a.s));
        const order = [...byK.keys()].sort((a, b) => byK.get(b)[0].s - byK.get(a)[0].s);   // group with the best match leads
        items = order.flatMap((k) => byK.get(k).map((x) => x.it));
      } else {
        items = items.map((it) => ({ it, s: itemScore(q, it) })).filter((x) => x.s > -Infinity).sort((a, b) => b.s - a.s).map((x) => x.it);
      }
    }
    paintList(items);
  }

  function paintList(items) {
    palItems = items;
    const fr = curFrame();
    const note = typeof fr.note === 'function' ? fr.note(pal.input.value.trim()) : fr.note;
    let html = note ? '<div class="cmdk__note">' + esc(note) + '</div>' : '';
    let lastG = null, lastSec = null;
    items.forEach((it, i) => {
      if (it.g && it.g !== lastG) { html += '<div class="cmdk__group">' + esc(it.g) + '</div>'; lastG = it.g; lastSec = it.sec || null; }
      else if (it.sec && it.sec !== lastSec) { if (i > 0) html += '<div class="cmdk__div"></div>'; lastSec = it.sec; }
      const hint = it.kbd ? '<span class="cmdk__hint">' + it.kbd.map((x) => '<kbd class="cmdk__key">' + x + '</kbd>').join('') + '</span>' : '';
      const ctx = it.ctx ? '<span class="cmdk__ctx">' + esc(it.ctx) + '</span>' : '';
      const meta = it.meta ? '<span class="cmdk__meta' + (it.metaState ? ' cmdk__meta--' + it.metaState : '') + '">' + esc(it.meta) + '</span>' : '';
      html += '<div class="cmdk__item' + (it.danger ? ' cmdk__item--danger' : '') + (it.disabled ? ' is-disabled' : '') + '" data-i="' + i + '">'
        + '<span class="cmdk__ico">' + it.icon + '</span><span class="cmdk__label">' + esc(it.label) + '</span>' + ctx + meta + hint + '</div>';
    });
    pal.list.innerHTML = (items.length || fr.note) ? html : '<div class="cmdk__empty">No results</div>';
    palActive = pal.fresh ? -1 : 0;   // fresh open: nothing pre-highlighted so reflexive Enter is a no-op
    pal.fresh = false;
    paintActive();
    sizeList();
  }

  // Animate the list to its content height (measured at height:auto so it can shrink, not just grow).
  function sizeList() {
    const list = pal.list;
    const start = list.style.height ? list.offsetHeight : null;
    list.style.height = 'auto';
    const target = Math.min(list.scrollHeight, 340) + 'px';
    if (start === null) { list.style.height = target; return; }  // first render: snap, no animation
    list.style.height = start + 'px';
    void list.offsetHeight;                                       // flush the start height
    list.style.height = target;                                  // then animate to the new height
  }

  // Scroll the active item into view only when the cursor has actually moved (palMove),
  // not on open, on each keystroke repaint, or on hover — the list stays put until you navigate.
  function paintActive(scroll) {
    pal.list.querySelectorAll('.cmdk__item').forEach((el) => {
      const on = +el.dataset.i === palActive;
      el.classList.toggle('is-active', on);
      if (on && scroll) el.scrollIntoView({ block: 'nearest' });
    });
  }
  function palMove(d) { if (!palItems.length) return; palActive = (palActive + d + palItems.length) % palItems.length; paintActive(true); }
  function runActive() { const it = palItems[palActive]; if (!it || it.disabled) return; it.enter(); }

  function openPalette() {
    if (paletteOpen) return;
    closeMenu();
    const backdrop = document.createElement('div');
    backdrop.className = 'cmdk';
    backdrop.innerHTML = '<div class="cmdk__panel" role="dialog" aria-modal="true" aria-label="Command menu">'
      + '<div class="cmdk__search"><span class="cmdk__search-ico">' + ICON_SEARCH + '</span>'
      + '<span class="cmdk__crumbs"></span>'
      + '<input class="cmdk__input" autocomplete="off" spellcheck="false" /></div>'
      + '<div class="cmdk__list"></div></div>';
    document.body.appendChild(backdrop);
    pal = { backdrop, input: backdrop.querySelector('.cmdk__input'), list: backdrop.querySelector('.cmdk__list'), crumbs: backdrop.querySelector('.cmdk__crumbs'), stack: [rootFrame()], fresh: true, prevFocus: document.activeElement };
    paletteOpen = true;
    renderFrame();
    requestAnimationFrame(() => backdrop.classList.add('open'));
    setTimeout(() => { if (pal) pal.input.focus(); }, 20);   // palette may have closed within 20ms
    pal.input.addEventListener('input', () => { if (curFrame().dashSpaces) dashSpacesOnInput(pal.input); renderFrame(); });
    backdrop.addEventListener('click', (e) => {
      const crumb = e.target.closest('.cmdk__crumb');
      if (crumb) { popTo(+crumb.dataset.depth); return; }
      const item = e.target.closest('.cmdk__item');
      if (item) { palActive = +item.dataset.i; runActive(); return; }
      if (e.target === backdrop) closePalette();
    });
    backdrop.addEventListener('mousemove', (e) => {
      const item = e.target.closest('.cmdk__item');
      if (item && +item.dataset.i !== palActive) { palActive = +item.dataset.i; paintActive(); }
    });
  }
  function closePalette() {
    if (!pal) return;
    const b = pal.backdrop, prev = pal.prevFocus;
    b.classList.remove('open');
    setTimeout(() => b.remove(), 180);
    pal = null; paletteOpen = false;
    if (prev && prev.focus && document.contains(prev)) prev.focus();
  }

  // The palette owns the keyboard while open. ↑/↓ + Ctrl+J/K (+ Ctrl+N/P) move the active row;
  // Enter drills/runs; Backspace on an empty query steps back a frame; Esc closes the palette.
  document.addEventListener('keydown', (e) => {
    if (!paletteOpen) return;
    const k = e.key;
    if (k === 'Tab') { e.preventDefault(); pal.input.focus(); return; }   // trap focus inside the open palette
    if (k === 'Escape') { e.preventDefault(); if (pal.stack.length > 1) popFrame(); else closePalette(); return; }
    if (k === 'Enter') { e.preventDefault(); runActive(); return; }
    if (k === 'ArrowDown' || (e.ctrlKey && !e.metaKey && (k === 'j' || k === 'J' || k === 'n' || k === 'N'))) { e.preventDefault(); palMove(1); return; }
    if (k === 'ArrowUp'   || (e.ctrlKey && !e.metaKey && (k === 'k' || k === 'K' || k === 'p' || k === 'P'))) { e.preventDefault(); palMove(-1); return; }
    if (k === 'Backspace' && !pal.input.value) { if (pal.stack.length > 1) { e.preventDefault(); popFrame(); } }
  });

  // ===== Settings — a full-screen mode layered over the same shell (sidebar + content). =====
  // Two scopes: Global settings apply to every workspace; each workspace can add its own on top.
  // For the worktree setup script the scopes do NOT override — the effective config runs BOTH:
  // the global script first, then the workspace's. The right pane renders the scope you pick;
  // a Back button at the top of the left panel returns to the workspace tree.

  const settingsNav = document.getElementById('settingsNav');
  let settingsScope = 'global';   // 'global', or a .repo__head element (a workspace)

  // Appearance — global only. 'system' follows the OS live; 'light'/'dark' pin it.
  const themeMql = window.matchMedia('(prefers-color-scheme: dark)');
  let themePref = (() => { try { return localStorage.getItem('synth-theme') || 'system'; } catch (e) { return 'system'; } })();

  }
  function setTheme(pref) {

  // Mock persistence — the setup scripts the effective config is assembled from. The native
  // app would read these from disk; here they just live in memory so edits survive scope hops.
  let globalScript = '#!/usr/bin/env bash\nset -euo pipefail\n\n# Runs in every new worktree, across all projects.\n[ -f "$SYNTH_MAIN/.env" ] && cp "$SYNTH_MAIN/.env" .env';
  const wsScripts = {
    synth: '#!/usr/bin/env bash\nset -euo pipefail\n\npnpm install\npnpm run db:generate',
    'aviator-api': '#!/usr/bin/env bash\nset -euo pipefail\n\ngo mod download',
  };
  const scriptFor = (name) => wsScripts[name] != null ? wsScripts[name] : '#!/usr/bin/env bash\n\n# No extra setup for this project yet.';

  // Default flags passed to `claude` when a Claude Code session starts. The canonical
  // value is a raw flag string, so ANY claude flag works (now and future); the switches
  // are just shortcuts that add/remove their token. Global applies everywhere; a
  // a workspace's flags override the global outright (empty inherits) — flags don't compose.
  // Flags are per agent: each runs a different binary and takes different tokens. opencode
  // needs none by default — it auto-approves, and its needs-input signal rides the question
  // tool rather than a permission flag.
  const AGENT_BIN = { claude: 'claude', opencode: 'opencode' };
  const AGENT_EG = { claude: '--dangerously-skip-permissions --model opus', opencode: '--model anthropic/claude-opus-4-5 --agent build' };

  const wsFlags = { synth: { claude: '--chrome' } };

  const effectiveFlags = (isGlobal, name, agent) => {
    if (isGlobal) return (globalFlags[agent] || '').trim();

  // preview line: `<binary> <flags>` with each flag tinted like a terminal command

    return `<div class="set-cmd" data-agent="${agent}"><span class="set-cmd__prompt">$ </span>${esc(AGENT_BIN[agent])}${rest}</div>`;
  }

  const workspaceHeads = () => [...nav.querySelectorAll(':scope > [data-repo] > .repo__head')];

  function buildScopeNav() {

  function markScope() {
    settingsNav.querySelectorAll('.scope').forEach((b) => {

      b.classList.toggle('scope--on', on);

  // Appearance is global-only: it sits above the setup script on the Global scope.
  function appearanceSection() {
    return `<div class="set-section">
        <div class="set-section__title">Appearance</div>

  // The one setting so far: the worktree setup script. Global shows just its own; a workspace

  function scriptSection(isGlobal, name) {
    if (isGlobal) {
      return appearanceSection() + `<div class="set-section">
        <div class="set-section__title">Worktree setup script</div>
        <div class="set-section__sub">Runs once inside every new worktree, right after it's created — across all projects.</div>

      </div>
      ${cmdPreview(agent, effectiveFlags(false, name, agent))}

  // New-worktree sessions: the ordered session set every new worktree starts with.
  // Same override model as flags: a workspace's list replaces the global one outright,
  // and an empty workspace list inherits global. Order is creation order — the first
  // session is the one that opens.
  const ICON_GRIP = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M104,60A12,12,0,1,1,92,48,12,12,0,0,1,104,60Zm60,12a12,12,0,1,0-12-12A12,12,0,0,0,164,72ZM92,116a12,12,0,1,0,12,12A12,12,0,0,0,92,116Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,116ZM92,184a12,12,0,1,0,12,12A12,12,0,0,0,92,184Zm72,0a12,12,0,1,0,12,12A12,12,0,0,0,164,184Z"/></svg>';
  const TPL_KINDS = {
    claude:   { label: 'Claude Code', start: 'Claude Code', icon: `<span class="session__icon session__icon--ai">${ICON_CLAWD}</span>` },
    opencode: { label: 'OpenCode',    start: 'OpenCode',    icon: `<span class="session__icon">${ICON_OPENCODE}</span>` },
    terminal: { label: 'Terminal',    start: 'shell',       icon: `<span class="session__icon">${ICON_TERMINAL}</span>` },
    browser:  { label: 'Browser',     start: 'Browser',     icon: `<span class="session__icon">${ICON_BROWSER}</span>` },
  };
  let globalTpl = [];
  const wsTpls = { synth: [
    { kind: 'claude',   name: 'Claude Code' },
    { kind: 'terminal', name: 'pnpm dev' },
    { kind: 'browser',  name: 'localhost:3000' },

  const tplFor = (name) => wsTpls[name] || (wsTpls[name] = []);
  const effectiveTpl = (isGlobal, name) => (isGlobal || !tplFor(name).length ? globalTpl : tplFor(name));

  function tplRows(list, editable, emptyText) {
    if (!list.length) return `<div class="tpl-empty">${emptyText}</div>`;
    return list.map((s, i) => {
      const k = TPL_KINDS[s.kind];
      return `<div class="tpl-row" data-i="${i}">
        ${editable ? `<span class="tpl-grip" title="Drag to reorder">${ICON_GRIP}</span>` : ''}
        <span class="tpl-idx">${i + 1}</span>
        ${k.icon}
        ${editable ? `<input class="tpl-name" value="${esc(s.name)}" spellcheck="false" aria-label="Session name" />`
                   : `<span class="tpl-name">${esc(s.name)}</span>`}
        <span class="tpl-kind">${k.label}</span>
        ${editable ? `<button class="tpl-x" title="Remove" aria-label="Remove session">${ICON_CLOSE}</button>` : ''}
      </div>`;
    }).join('');
  }
  const tplAddBar = () => `<div class="tpl-add">${Object.keys(TPL_KINDS).map((k) =>
    `<button class="tpl-add__btn" data-add="${k}">${ICON_PLUS}${TPL_KINDS[k].label}</button>`).join('')}</div>`;

  // what the sidebar will actually show: a branch group with the sessions nested in
  // order — the first row carries the open tint, so "the first one opens" is visible
  function tplPreview(list) {
    const rows = list.map((s, i) => `<div class="row session${i === 0 ? ' session--open' : ''}">
        <span class="session__bullet"></span>${TPL_KINDS[s.kind].icon}

      </div>`).join('');

      </div>
    </div>`;
  }

  function sessionsSection(isGlobal, name) {
    if (isGlobal) {
      return `<div class="set-section">
        <div class="set-section__title">New worktree sessions</div>
        <div class="set-section__sub">Every new worktree starts with these sessions, created in order — the first one opens.</div>

      <div class="set-flow">
        <span class="set-flow__step"><span class="set-flow__ico">${ICON_GLOBE}</span>Global</span>
        <span class="set-flow__arrow">${ICON_CARET}</span>
        <span class="set-flow__step">${wsChip(contextHeadByName(name))}${esc(name)}</span>
        <span class="set-flow__note">Project overrides global</span>
      </div>
      <div class="set-code-wrap">

        <div class="tpl-list tpl-list--ro">${tplRows(globalTpl, false, 'No global sessions.')}</div>
      </div>

        <div class="set-code-head"><span class="set-code-head__label">${esc(name)} — overrides global</span></div>
        <div class="tpl-list" data-tpl>${tplRows(tplFor(name), true, 'Inheriting global — add a session to override.')}</div>
        ${tplAddBar()}
      </div>
      ${tplPreview(effectiveTpl(false, name))}
    </div>`;
  }

  // drag-to-reorder within the template list: the grabbed row stays put (faded) while a lifted
  // clone tracks the pointer and a copper insertion line marks the landing slot (same feel as the tree)
  function startTplDrag(e, listEl, list) {
    e.preventDefault();
    const row = e.target.closest('.tpl-row');
    const r = row.getBoundingClientRect();
    const clone = row.cloneNode(true);
    clone.classList.add('drag-clone');
    clone.style.cssText += `width:${r.width}px;left:${r.left}px;top:${r.top}px;`;
    document.body.appendChild(clone);
    row.classList.add('drag-src');
    document.body.classList.add('dragging');
    const offY = e.clientY - r.top;
    let line = null, dropRef;   // undefined = no move, element = insert before it, null = append
    const hideL = () => { if (line) { line.remove(); line = null; } };
    const onMove = (ev) => {
      clone.style.top = (ev.clientY - offY) + 'px';
      const others = [...listEl.querySelectorAll('.tpl-row')].filter((x) => x !== row);
      const before = others.find((x) => { const b = x.getBoundingClientRect(); return ev.clientY < b.top + b.height / 2; }) || null;
      if (!others.length || before === row.nextElementSibling) { dropRef = undefined; hideL(); return; }
      dropRef = before;
      if (!line) { line = document.createElement('div'); line.className = 'drop-line'; document.body.appendChild(line); }
      const b = (before || others[others.length - 1]).getBoundingClientRect();
      line.style.left = (b.left + 4) + 'px'; line.style.width = (b.width - 8) + 'px';
      line.style.top = ((before ? b.top : b.bottom) - 1) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      clone.remove();
      hideL();
      document.body.classList.remove('dragging');
      if (dropRef !== undefined) listEl.insertBefore(row, dropRef);
      const next = [...listEl.querySelectorAll('.tpl-row')].map((x) => list[+x.dataset.i]);
      list.length = 0;
      list.push(...next);
      renderSettings();
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  // find a workspace head by its name (for the chip in the run-order strip)
  const contextHeadByName = (name) => workspaceHeads().find((h) => wsName(h) === name) || null;

  function renderSettings() {
    stopStream();
    const isGlobal = settingsScope === 'global';
    // a removed workspace can leave settingsScope dangling — fall back to Global
    if (!isGlobal && !document.contains(settingsScope)) { settingsScope = 'global'; return renderSettings(); }
    const head = isGlobal ? null : settingsScope;
    const name = isGlobal ? 'Global' : wsName(head);
    const titleIcon = isGlobal ? `<span class="scope__icon">${ICON_GLOBE}</span>` : wsChip(head);
    content.innerHTML = `<div class="pane">
      <div class="pane__head">
        <div class="pane__title">${titleIcon}<span>${esc(name)}</span></div>
        <div class="pane__crumb"><b>Settings</b> / ${esc(isGlobal ? 'All projects' : name)}</div>
        <div class="pane__spacer"></div>
      </div>
      <div class="set-body"><div class="set-body__inner">${scriptSection(isGlobal, name)}${sessionsSection(isGlobal, name)}${flagsSection(isGlobal, name)}</div></div>
    </div>`;
    markScope();
    // theme segmented control (Global scope only)
    markThemeSeg();
    content.querySelectorAll('[data-theme-opt]').forEach((b) => {
      b.addEventListener('click', () => setTheme(b.dataset.themeOpt));
    });
    // edits persist to the mock store so they survive switching scopes
    content.querySelectorAll('.set-code[data-edit]').forEach((ta) => {
      ta.addEventListener('input', () => {
        if (ta.dataset.edit === 'global') globalScript = ta.value;
        else wsScripts[name] = ta.value;
      });
    });
    // Agent flags: the field edits the raw string live, updating the preview in place so
    // the caret is never yanked mid-type.
    content.querySelectorAll('.set-code--flags[data-flags]').forEach((ta) => {
      ta.addEventListener('input', () => {
        const agent = ta.dataset.agent;
        if (ta.dataset.flags === 'global') globalFlags[agent] = ta.value;
        else (wsFlags[name] || (wsFlags[name] = {}))[agent] = ta.value;
        const sec = ta.closest('.set-section');
        const pv = sec.querySelector('.set-cmd');
        if (pv) pv.outerHTML = cmdPreview(agent, ta.dataset.flags === 'global' ? (globalFlags[agent] || '') : effectiveFlags(false, name, agent));
      });
    });
    // Session template: renames edit the store in place (preview refreshes, caret never
    // yanked); add / remove / drag-reorder re-render the pane. data-tpl marks the one
    // editable list on this scope — the global mirror on a workspace scope stays inert.
    const tplList = () => (isGlobal ? globalTpl : tplFor(name));
    const tplRefresh = () => {
      const pv = content.querySelector('.tpl-preview');
      if (pv) pv.outerHTML = tplPreview(effectiveTpl(isGlobal, name));
    };
    content.querySelectorAll('.tpl-list[data-tpl]').forEach((listEl) => {
      listEl.addEventListener('input', (e) => {
        const inp = e.target.closest('input.tpl-name');
        if (!inp) return;
        tplList()[+inp.closest('.tpl-row').dataset.i].name = inp.value;
        tplRefresh();
      });
      listEl.addEventListener('click', (e) => {
        const x = e.target.closest('.tpl-x');
        if (!x) return;
        tplList().splice(+x.closest('.tpl-row').dataset.i, 1);
        renderSettings();
      });
      listEl.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.tpl-grip')) startTplDrag(e, listEl, tplList());
      });
    });
    content.querySelectorAll('.tpl-add__btn').forEach((b) => {
      b.addEventListener('click', () => {
        tplList().push({ kind: b.dataset.add, name: TPL_KINDS[b.dataset.add].start });
        renderSettings();
      });
    });
  }

  function enterSettings(scope) {
    closeMenu();
    if (paletteOpen) closePalette();
    if (shortcutsEl) closeShortcuts();
    setupEl = null;   // leaving for settings revokes any armed setup-resolve
    app.classList.remove('collapsed');
    settingsScope = scope || 'global';
    buildScopeNav();
    app.classList.add('settings');
    renderSettings();
    select(settingsNav.querySelector('.scope--on'));  // keyboard cursor lands on the active scope
  }
  function exitSettings() {
    if (!app.classList.contains('settings')) return;
    app.classList.remove('settings');
    renderLayout();   // restore the layout that was open before
    // cursor returns to the tree — the open session, else the Settings button we came from
    select(openEl && treeRows().includes(openEl) ? openEl : document.getElementById('openSettings'));
  }
  // switch to a scope (from click or ↵) — the settings-nav equivalent of opening a session
  function selectScope(sc) {
    settingsScope = sc.dataset.scope === 'global' ? 'global' : sc._head;
    renderSettings();
    select(sc);
  }

  document.getElementById('openSettings').addEventListener('click', () => enterSettings());
  settingsNav.addEventListener('click', (e) => {
    if (e.target.closest('#settingsBack')) return exitSettings();
    const sc = e.target.closest('.scope');
    if (sc) selectScope(sc);
  });
  // "Edit in Global" jumps scope without leaving settings
  content.addEventListener('click', (e) => {
    const g = e.target.closest('[data-goto]');
    if (g && app.classList.contains('settings')) { settingsScope = 'global'; renderSettings(); }
  });

  // Restore each branch's remembered layout from the last session (014); if nothing was saved,
  // open a session by default so the workspace feels live on load (the Claude Code hero).
  if (!hydrateLayouts()) openSession(nav.querySelector('.session[data-type="ai"]') || nav.querySelector('.session'));

  // Spine inspection handle. Until the split gestures land (010 drag, 012 sidebar-create),
  // this is the only way to build a multi-pane tree — it drives the same splitPane the
  // gestures will. `split(sel, dir, before)` binds the new pane to the sidebar session
  // matching `sel`. Verification/testing only; product code never reads it.
  window.SynthLayout = {
    get tree() { return layout; },
    get active() { return activePane; },
    get branch() { return currentBranchKey; },        // which branch's layout is on screen (014)
    get fullscreen() { return !!stashedSplit; },       // true while a split is stashed behind a full-screen
    get durable() { return durableLayout(); },         // the branch's remembered layout, ignoring full-screen
    branches() { return [...branchLayouts.keys()]; },
    stored() { try { return JSON.parse(localStorage.getItem(LS_LAYOUTS) || 'null'); } catch (e) { return null; } },
    leaves() { const a = []; eachLeaf(layout, (l) => a.push(l)); return a; },
    split(sel, dir = 'row', before = false) {
      const s = typeof sel === 'string' ? nav.querySelector(sel) : sel;
      splitPane(activePane, s, dir, before);
    },
  };

  // Resizable sidebar — drag the seam to set the sidebar width (persists); ⌘B collapse still wins.
  (() => {
    const handle = document.getElementById('resizeHandle');
    if (!handle) return;
    const MIN = 200, MAX = 460;
    try { const s = parseInt(localStorage.getItem('synth-sidebar-w'), 10); if (s >= MIN && s <= MAX) app.style.setProperty('--sidebar-w', s + 'px'); } catch (e) {}
    let startX = 0, startW = 0;
    const onMove = (e) => {
      const w = Math.min(MAX, Math.max(MIN, startW + (e.clientX - startX)));
      app.style.setProperty('--sidebar-w', w + 'px');
    };
    const onUp = () => {
      app.classList.remove('resizing');
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      const w = Math.round(app.querySelector('.sidebar').getBoundingClientRect().width);
      try { if (w) localStorage.setItem('synth-sidebar-w', w); } catch (e) {}
    };
    handle.addEventListener('pointerdown', (e) => {
      if (app.classList.contains('collapsed')) return;
      e.preventDefault();
      startX = e.clientX;
      startW = app.querySelector('.sidebar').getBoundingClientRect().width;
      app.classList.add('resizing');
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
    // double-click the seam → reset to the default width
    handle.addEventListener('dblclick', () => { app.style.removeProperty('--sidebar-w'); try { localStorage.removeItem('synth-sidebar-w'); } catch (e) {} });
  })();

  // Inter-pane seam resize (011) — drag a seam to repartition its two neighbours, extending the
  // sidebar-handle idiom. Updates the split node's fraction and re-flexes the two child elements
  // in place (no re-render, so live surfaces survive). The min-pane floor (001 / 004 §5) is a hard
  // stop: the drag clamps so neither neighbour subtree pushes any pane below 360×240. Drag-only —
  // deliberately no double-click reset (004 §5).
  (() => {
    const MIN_W = 360, MIN_H = 240;
    // Smallest size a subtree can occupy along `axis` before some pane hits the floor: panes split
    // along the axis add up; panes split across it overlap, so take the larger.
    function minAlong(node, axis) {
      if (node.leaf) return axis === 'row' ? MIN_W : MIN_H;
      const a = minAlong(node.a, axis), b = minAlong(node.b, axis);
      return node.dir === axis ? a + b : Math.max(a, b);
    }
    content.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      const seam = e.target.closest('.pane-seam');
      if (!seam || !seam._node) return;
      const node = seam._node, axis = node.dir;
      const box = seam.parentNode;
      const childA = seam.previousElementSibling, childB = seam.nextElementSibling;
      if (!childA || !childB) return;
      e.preventDefault();
      const rect = box.getBoundingClientRect();
      const total = axis === 'row' ? rect.width : rect.height;
      let lo = minAlong(node.a, axis) / total, hi = 1 - minAlong(node.b, axis) / total;
      if (lo > hi) lo = hi = (lo + hi) / 2;   // container already at the floor — pin, no give
      seam.classList.add('pane-seam--active');
      content.classList.add('pane-resizing', 'pane-resizing--' + axis);
      try { seam.setPointerCapture(e.pointerId); } catch (err) {}
      const onMove = (ev) => {
        const pos = axis === 'row' ? (ev.clientX - rect.left) : (ev.clientY - rect.top);
        const frac = Math.min(hi, Math.max(lo, pos / total));
        node.split = frac;
        const pct = Math.round(frac * 10000) / 100;
        childA.style.flex = '1 1 ' + pct + '%';
        childB.style.flex = '1 1 ' + (100 - pct) + '%';
      };
      const onUp = () => {
        seam.classList.remove('pane-seam--active');
        content.classList.remove('pane-resizing', 'pane-resizing--' + axis);
        seam.removeEventListener('pointermove', onMove);
        seam.removeEventListener('pointerup', onUp);
        try { seam.releasePointerCapture(e.pointerId); } catch (err) {}
        persist();   // 014: the new split fraction is part of the branch's remembered layout
      };
      seam.addEventListener('pointermove', onMove);
      seam.addEventListener('pointerup', onUp);
    });
  })();
})();
</script>
</body>
</html>
