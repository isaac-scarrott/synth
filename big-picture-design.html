    <section class="content"></section>
  </main>

<script>
(() => {
  const app = document.getElementById('app');
  const nav = document.getElementById('nav');
  let paletteOpen = false;

  // --- Sidebar collapse / expand ---
  document.getElementById('collapseBtn').addEventListener('click', () => app.classList.add('collapsed'));
  document.getElementById('expandBtn').addEventListener('click', () => app.classList.remove('collapsed'));

  // --- Branch-group roll-up: highest-priority session state, else last activity ---
  const MARK_INPUT = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M192,96c0,28.51-24.47,52.11-56,55.56V160a8,8,0,0,1-16,0V144a8,8,0,0,1,8-8c26.47,0,48-17.94,48-40s-21.53-40-48-40S80,73.94,80,96a8,8,0,0,1-16,0c0-30.88,28.71-56,64-56S192,65.12,192,96Zm-64,96a16,16,0,1,0,16,16A16,16,0,0,0,128,192Z"/></svg>';
  const MARK_ERROR = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M144,200a16,16,0,1,1-16-16A16,16,0,0,1,144,200Zm-16-40a8,8,0,0,0,8-8V48a8,8,0,0,0-16,0V152A8,8,0,0,0,128,160Z"/></svg>';

  // priority: needs-input > error > working > running > idle
  const PRIORITY = ['input', 'error', 'work', 'run', 'idle'];
  function sessionState(s) {
    if (s.querySelector('.ind--input')) return 'input';
    if (s.querySelector('.ind--error')) return 'error';
    if (s.querySelector('.sdot--work')) return 'work';
    if (s.querySelector('.sdot--run')) return 'run';
    return 'idle';
  }
  const ROLL = {
    input: () => `<span class="ind ind--input">${MARK_INPUT}</span>`,
    error: () => `<span class="ind ind--error">${MARK_ERROR}</span>`,
    work:  () => `<span class="ind"><span class="sdot sdot--work"></span></span>`,
    run:   () => `<span class="ind"><span class="sdot sdot--run"></span></span>`,
  };
  function rollUpGroups() {
    nav.querySelectorAll('[data-group]').forEach((group) => {
      const repo = group.closest('[data-repo]');
      const sessions = [...repo.querySelectorAll('.sessions .session')];
      const worst = PRIORITY.find((p) => sessions.some((s) => sessionState(s) === p)) || 'idle';
      const slot = group.querySelector('.branch__roll');
      slot.innerHTML = worst !== 'idle' ? ROLL[worst]()
        : group.classList.contains('branch--active') ? `<span class="ind"><span class="branch__dot"></span></span>`  // checked-out branch
        : `<span class="branch__meta">${group.dataset.activity}</span>`;  // all idle → last activity
    });
  }
  rollUpGroups();

  // ===== Content pane: render the open session (the one "you are here") =====
  // Sticky selection — survives mousing around, changes only on activate. The white
  // active pill is DERIVED from it: the branch group that holds the open session.
  const content = document.querySelector('.content');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ICON_SEND = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,117.66a8,8,0,0,1-11.32,0L136,59.31V216a8,8,0,0,1-16,0V59.31L61.66,117.66a8,8,0,0,1-11.32-11.32l72-72a8,8,0,0,1,11.32,0l72,72A8,8,0,0,1,205.66,117.66Z"/></svg>';
  const ICON_EMPTY = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,128a8,8,0,0,1-3,6.25l-40,32a8,8,0,1,1-10-12.5L107.19,128,75,102.25a8,8,0,1,1,10-12.5l40,32A8,8,0,0,1,128,128Zm48,24H136a8,8,0,0,0,0,16h40a8,8,0,0,0,0-16Zm56-96V200a16,16,0,0,1-16,16H40a16,16,0,0,1-16-16V56A16,16,0,0,1,40,40H216A16,16,0,0,1,232,56ZM216,200V56H40V200H216Z"/></svg>';
  const STATE_LABEL = { run: 'running', work: 'working', input: 'needs input', error: 'error', idle: 'idle' };
  const IND_HTML = {
    input: `<span class="ind ind--input">${MARK_INPUT}</span>`,
    error: `<span class="ind ind--error">${MARK_ERROR}</span>`,
    work:  `<span class="ind"><span class="sdot sdot--work"></span></span>`,
    run:   `<span class="ind"><span class="sdot sdot--run"></span></span>`,
    idle:  `<span class="ind"><span class="sdot"></span></span>`,
  };
  let openEl = null, streamTimer = null;

  function outerRepoOf(el) {
    let repo = el.closest('[data-repo]');
    while (repo) { const outer = repo.parentElement && repo.parentElement.closest('[data-repo]'); if (!outer) break; repo = outer; }
    return repo;
  }
  function workspaceNameOf(el) {
    const repo = outerRepoOf(el);
    const n = repo && repo.querySelector(':scope > .repo__head .repo__name');
    return n ? n.textContent.trim() : 'workspace';
  }
  function branchGroupOf(el) {
    const group = el.closest('[data-repo]');
    return group ? group.querySelector(':scope > .branch--group') : null;
  }
  function branchNameOf(el) {
    const g = branchGroupOf(el);
    const n = g && g.querySelector('.branch__name');
    return n ? n.textContent.trim() : 'main';
  }

  // exactly one active pill across the whole tree — the open session's branch group
  function derivePill(el) {
    nav.querySelectorAll('.branch--active').forEach((b) => b.classList.remove('branch--active'));
    const g = branchGroupOf(el);
    if (g) g.classList.add('branch--active');
  }

  function stopStream() { if (streamTimer) { clearInterval(streamTimer); streamTimer = null; } }

  function openSession(el) {
    if (!el) return;
    app.classList.remove('settings');   // jumping to a session leaves settings mode
    if (openEl) openEl.classList.remove('session--open');
    openEl = el;
    el.classList.add('session--open');
    el.classList.remove('session--unread');   // opening marks it read
    derivePill(el);
    renderOpen();
  }

  // A session moves to a new derived status: swap its sidebar indicator, re-roll.
  function setSessionState(el, state) {
    const ind = el.querySelector(':scope > .ind');
    if (ind) ind.outerHTML = IND_HTML[state];
    rollUpGroups();
  }

  // ---- mock content, generated purely from (type, name, state) ----
  function termLines(name, state, ws, br) {
    const p = `~/${ws} (${br}) $ `;
    if (state === 'error' || /test/i.test(name)) {
      return [
        ['cmd', p + 'npm test -- command-palette'], ['dim', ''],
        ['', ' RUN  v5.2.0'],
        ['ok',  ' ✓ src/palette/fuzzy.test.ts (8)'],
        ['err', ' ❯ src/palette/CommandPalette.test.tsx (5)'],
        ['err', '   × opens on ⌘K → expected "open", received "closed"'],
        ['dim', '     at CommandPalette.test.tsx:42:19'], ['', ''],
        ['err', ' Test Files  1 failed | 1 passed (2)'],
        ['dim', '      Tests  1 failed | 12 passed (13)'],
        ['cmd', p, true],
      ];
    }
    if (state === 'run' || /dev|serve|watch/i.test(name)) {
      return [
        ['cmd', p + 'npm run dev'], ['dim', ''],
        ['dim', '> synth@0.4.0 dev'], ['dim', '> vite'], ['', ''],
        ['ok', '  VITE v5.2.0  ready in 412 ms'], ['', ''],
        ['', '  ➜  Local:   http://localhost:5173/'],
        ['dim', '  ➜  Network: use --host to expose'],
        ['dim', '  12:04:51 [vite] hmr update /src/CommandPalette.tsx'],
      ];
    }
    return [
      ['cmd', p + 'git status'],
      ['', 'On branch ' + br],
      ['ok', 'nothing to commit, working tree clean'],
      ['cmd', p, true],
    ];
  }
  const STREAM_MSGS = [
    'hmr update /src/sidebar/Tree.tsx', 'hmr update /src/palette/CommandPalette.tsx',
    'page reload src/main.tsx', 'hmr update /src/content/Pane.tsx', 'hmr update /src/state/store.ts',
  ];

  function renderTerminal(name, state, ws, br) {
    const body = termLines(name, state, ws, br)
      .map(([c, t, cur]) => `<div class="term__ln ${c}">${esc(t)}${cur ? '<span class="term__cursor"></span>' : ''}</div>`).join('');
    return `<div class="term" data-term tabindex="-1">${body}</div>`;
  }
  function renderBrowser(name) {
    const url = name.includes('://') ? name : 'http://' + name;
    return `<div class="browser">
      <div class="browser__bar"><span class="browser__dots"><i></i><i></i><i></i></span><span class="browser__url">${esc(url)}</span></div>
      <div class="browser__view">
        <div class="skel skel--title"></div>
        <div class="skel skel--line" style="width:92%"></div>
        <div class="skel skel--line" style="width:86%"></div>
        <div class="skel skel--line" style="width:70%"></div>
        <div class="skel--cards"><div class="skel skel--card"></div><div class="skel skel--card"></div><div class="skel skel--card"></div></div>
      </div></div>`;
  }
  function renderSim(name) {
    return `<div class="sim"><div class="sim__device"><div class="sim__screen">
      <div class="sim__status"><span>9:41</span><span>${esc(name)}</span></div>
      <div class="sim__hero">
        <div class="skel skel--title"></div>
        <div class="skel skel--line" style="width:80%"></div>
        <div class="skel skel--line" style="width:64%"></div>
        <div class="skel--cards" style="grid-template-columns:1fr 1fr"><div class="skel skel--card"></div><div class="skel skel--card"></div></div>
      </div></div></div></div>`;
  }
  function composerHTML(awaiting) {
    const ask = awaiting ? `<div class="chat__ask">${MARK_INPUT}Should the palette also surface recent files, or just commands and sessions for now?</div>` : '';
    return `<div class="chat__composer ${awaiting ? 'awaiting' : ''}">${ask}
      <div class="chat__inputrow">
        <div class="chat__input" contenteditable="true" role="textbox" data-ph="Reply to Claude Code…"></div>
        <span class="chat__send" role="button" aria-label="Send">${ICON_SEND}</span>
      </div></div>`;
  }
  function renderChat(state) {
    const transcript = `
      <div class="msg msg--user"><div class="msg__role">You</div>
        <div class="msg__body">Add a ⌘K command palette to the sidebar, styled like Linear's.</div></div>
      <div class="msg msg--assistant"><div class="msg__role">Claude Code</div>
        <div class="msg__body">
          <p>Done — <code>CommandPalette</code> opens on <code>⌘K</code> with fuzzy search over commands, workspaces, branches, and sessions.</p>
          <p>Wired up:</p>
          <ul><li>Focus-trapped input, <code>↑/↓</code> to move, <code>↵</code> to run, <code>Esc</code> to close</li>
          <li>Subsequence matcher with word-boundary + contiguity bonuses</li>
          <li>Results list resizes fluidly as you type</li></ul>
        </div></div>`;
    if (state === 'work') {
      return `<div class="chat"><div class="chat__scroll">${transcript}
        <div class="msg msg--assistant msg--work"><div class="msg__role">Claude Code</div>
          <div class="msg__body"><span class="work-dot"></span>Editing <code>src/palette/CommandPalette.tsx</code>…</div></div>
      </div>${composerHTML(false)}</div>`;
    }
    return `<div class="chat"><div class="chat__scroll">${transcript}</div>${composerHTML(state === 'input')}</div>`;
  }

  function renderEmpty() {
    stopStream();
    content.innerHTML = `<div class="pane-empty"><span class="pane-empty__mark">${ICON_EMPTY}</span><span>No session open</span></div>`;
  }

  function renderOpen() {
    stopStream();
    if (!openEl || !document.contains(openEl)) { renderEmpty(); return; }
    const type = openEl.dataset.type || 'terminal';
    const name = openEl.querySelector('.session__name').textContent.trim();
    const state = sessionState(openEl);
    const ws = workspaceNameOf(openEl), br = branchNameOf(openEl);
    const iconHTML = openEl.querySelector('.session__icon').outerHTML;
    let body;
    if (type === 'ai') body = renderChat(state);
    else if (type === 'browser') body = renderBrowser(name);
    else if (type === 'simulator') body = renderSim(name);
    else body = renderTerminal(name, state, ws, br);
    content.innerHTML = `<div class="pane">
      <div class="pane__head">
        <div class="pane__title">${iconHTML}<span>${esc(name)}</span></div>
        <div class="pane__crumb"><b>${esc(ws)}</b> / ${esc(br)}</div>
        <div class="pane__spacer"></div>
      </div>
      <div class="pane__body">${body}</div>
    </div>`;
    if (type === 'ai') wireComposer(openEl);
    else if (type === 'terminal' && state === 'run' && !reduceMotion) startStream();
  }

  // running terminals feel alive: a fresh log line trickles in every couple seconds
  function startStream() {
    const term = content.querySelector('[data-term]');
    if (!term) return;
    let i = 0;
    streamTimer = setInterval(() => {
      if (!document.contains(term)) return stopStream();
      const div = document.createElement('div');
      div.className = 'term__ln dim';
      div.textContent = `  12:0${5 + (i % 4)}:${(12 + i * 7) % 60} [vite] ${STREAM_MSGS[i % STREAM_MSGS.length]}`;
      term.appendChild(div);
      while (term.children.length > 200) term.removeChild(term.firstChild);
      term.scrollTop = term.scrollHeight;
      i++;
    }, 2600);
  }

  // Replying to the agent: append the message, flip it to working, then settle back to running.
  function wireComposer(sessionEl) {
    const composerEl = content.querySelector('.chat__composer');
    if (!composerEl) return;
    const input = composerEl.querySelector('.chat__input');
    const send = composerEl.querySelector('.chat__send');
    const scroll = content.querySelector('.chat__scroll');
    const submit = () => {
      const text = (input.textContent || '').trim() || 'Just commands and sessions for now.';
      const u = document.createElement('div');
      u.className = 'msg msg--user';
      u.innerHTML = `<div class="msg__role">You</div><div class="msg__body">${esc(text)}</div>`;
      scroll.appendChild(u);
      input.textContent = '';
      composerEl.classList.remove('awaiting');
      const ask = composerEl.querySelector('.chat__ask'); if (ask) ask.remove();
      setSessionState(sessionEl, 'work');
      const w = document.createElement('div');
      w.className = 'msg msg--assistant msg--work';
      w.innerHTML = `<div class="msg__role">Claude Code</div><div class="msg__body"><span class="work-dot"></span>On it — wiring that up now…</div>`;
      scroll.appendChild(w);
      scroll.scrollTop = scroll.scrollHeight;
      setTimeout(() => {
        if (!document.contains(w)) return;
        w.classList.remove('msg--work');
        w.querySelector('.msg__body').innerHTML = 'Added recent files to the palette source and re-ran the tests — all green.';
        setSessionState(sessionEl, 'run');
        scroll.scrollTop = scroll.scrollHeight;
      }, 3200);
    };
    send.addEventListener('click', submit);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } });
  }

  // --- Toggle expand/collapse (repos + the active branch's session group) ---
  function toggle(repoEl) {
    repoEl.classList.toggle('repo--open');
  }

  nav.addEventListener('click', (e) => {
    const toggleEl = e.target.closest('[data-toggle]');
    if (toggleEl) {
      e.preventDefault();
      toggle(toggleEl.closest('[data-repo]'));
      select(toggleEl); // keep selection on the row you acted on
      return;
    }
    const session = e.target.closest('[data-session]');
    if (session) {
      e.preventDefault();
      select(session);
      openSession(session); // becomes the open session: renders content, marks read, derives the pill
      focusContent();       // focus follows the open session into the content pane
    }
  });

  // --- Keyboard-first navigation ---
  let selEl = null;

  function visibleRows() {
    // A row is navigable only if none of its ancestors are collapsed.
    return [...nav.querySelectorAll('[data-row]')].filter((row) => {
      let p = row.parentElement;
      while (p && p !== nav) {
        if (p.classList.contains('collapse') &&
            !p.closest('[data-repo]').classList.contains('repo--open')) {
          return false;
        }
        p = p.parentElement;
      }
      return true;
    });
  }

  function select(el, scroll) {
    if (selEl) selEl.classList.remove('sel');
    selEl = el;
    if (el) {
      el.classList.add('sel');
      if (scroll) el.scrollIntoView({ block: 'nearest' });
    }
  }

  function move(dir) {
    const rows = visibleRows();
    if (!rows.length) return;
    // no explicit selection yet → step relative to the open session, not the top of the tree
    const from = selEl || (openEl && rows.includes(openEl) ? openEl : null);
    let i = from ? rows.indexOf(from) : -1;
    i = Math.max(0, Math.min(rows.length - 1, i + dir));
    select(rows[i], true);
  }

  // Tab opens the highlighted group and drops selection inside it (its first child) —
  // a fast "go into this group" motion, distinct from → which expands but stays put.
  function openGroup() {
    if (!selEl || !selEl.matches('[data-toggle]')) return;   // groups only
    const repo = selEl.closest('[data-repo]');
    if (!repo.classList.contains('repo--open')) toggle(repo);
    const rows = visibleRows();
    const next = rows[rows.indexOf(selEl) + 1];
    if (next && repo.contains(next)) select(next, true);      // step to the first child
  }

  // ⌘0 / ⌘1 hand the keyboard explicitly to one side of the split
  function focusSidebar() {
    app.classList.remove('collapsed');
    if (document.activeElement && document.activeElement.closest('.content')) document.activeElement.blur();
    const rows = visibleRows();
    const target = selEl && rows.includes(selEl) ? selEl
      : openEl && rows.includes(openEl) ? openEl : rows[0];
    document.body.classList.add('kbd');
    select(target, true);
  }
  function focusContent() {
    document.body.classList.remove('kbd');
    const el = content.querySelector('.chat__input') || content.querySelector('[data-term]');
    if (el) el.focus();
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key;
    // ⌘/ (⌘?) toggles the shortcuts sheet from anywhere; while open it owns the keyboard
    if ((e.metaKey || e.ctrlKey) && (k === '/' || k === '?')) {
      e.preventDefault();
      if (shortcutsEl) closeShortcuts();
      else { if (paletteOpen) closePalette(); openShortcuts(); }
      return;
    }
    if (shortcutsEl) { if (k === 'Escape') closeShortcuts(); return; }
    // Cmd/Ctrl+K opens the palette; Cmd+K also closes it. Ctrl+K while open = nav-up (handled in-palette).
    if ((e.metaKey || e.ctrlKey) && (k === 'k' || k === 'K')) {
      if (!paletteOpen) { e.preventDefault(); openPalette(); return; }
      if (e.metaKey) { e.preventDefault(); closePalette(); }
      return;
    }
    if (paletteOpen) return; // the palette owns the keyboard while it's open
    // Cmd/Ctrl+, toggles Settings (the Mac Preferences convention); Esc leaves it
    if ((e.metaKey || e.ctrlKey) && k === ',') {
      e.preventDefault();
      if (app.classList.contains('settings')) exitSettings(); else enterSettings();
      return;
    }
    if (k === 'Escape' && app.classList.contains('settings')) { e.preventDefault(); exitSettings(); return; }
    // Cmd/Ctrl+B toggles the sidebar
    if ((e.metaKey || e.ctrlKey) && (k === 'b' || k === 'B')) {
      e.preventDefault();
      app.classList.toggle('collapsed');
      return;
    }
    // Cmd/Ctrl+0 focuses the sidebar; Cmd/Ctrl+1 focuses the open session's surface
    if ((e.metaKey || e.ctrlKey) && k === '0') { e.preventDefault(); focusSidebar(); return; }
    if ((e.metaKey || e.ctrlKey) && k === '1') { e.preventDefault(); focusContent(); return; }
    // while focus lives in the content pane (composer, terminal), nav keys stay there
    if (e.target instanceof Element && e.target.closest('.content')) return;
    // an open row menu owns the keyboard (its ↵/Esc are handled by the menu key handler)
    if (openMenuEl) return;
    // Esc hands focus from the sidebar back to the main window (the open session's surface).
    if (k === 'Escape') {
      if (document.querySelector('.backdrop')) return;   // a dialog owns Esc first
      e.preventDefault();
      focusContent();
      return;
    }
    // Tab opens the highlighted group and steps inside it (no-op / default Tab elsewhere).
    if (k === 'Tab' && !e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
      if (document.querySelector('.backdrop')) return;   // a dialog owns Tab
      if (selEl && selEl.matches('[data-toggle]')) {
        e.preventDefault();
        document.body.classList.add('kbd');
        openGroup();
      }
      return;
    }
    if (['ArrowDown', 'ArrowUp', 'ArrowRight', 'ArrowLeft', 'Enter', ' ', 'j', 'k'].includes(k)) {
      document.body.classList.add('kbd');
    }
    if (k === 'ArrowDown' || k === 'j') { e.preventDefault(); move(1); }
    else if (k === 'ArrowUp' || k === 'k') { e.preventDefault(); move(-1); }
    else if (k === 'ArrowRight') {
      e.preventDefault();
      const repo = selEl && selEl.matches('[data-toggle]') ? selEl.closest('[data-repo]') : null;
      if (repo && !repo.classList.contains('repo--open')) toggle(repo);
      else move(1);
    }
    else if (k === 'ArrowLeft') {
      e.preventDefault();
      const repo = selEl && selEl.matches('[data-toggle]') ? selEl.closest('[data-repo]') : null;
      if (repo && repo.classList.contains('repo--open')) toggle(repo);
      else move(-1);
    }
    else if (k === 'Enter' || k === ' ') {
      if (!selEl) return;
      e.preventDefault();
      if (selEl.matches('[data-toggle]')) toggle(selEl.closest('[data-repo]'));
      else if (selEl.matches('[data-session]')) { openSession(selEl); focusContent(); }
    }
    // r renames the selected row in place; d deletes it (through a confirm popover)
    else if ((k === 'r' || k === 'R') && !e.metaKey && !e.ctrlKey && !e.altKey) {
      if (!selEl) return;
      e.preventDefault();
      startRename(selEl);
    }
    else if ((k === 'd' || k === 'D') && !e.metaKey && !e.ctrlKey && !e.altKey) {
      if (!selEl) return;
      e.preventDefault();
      requestDelete(selEl);
    }
  });

  // Mouse use dismisses the keyboard ring (keeps the resting state clean).
  document.addEventListener('mousemove', () => document.body.classList.remove('kbd'), { passive: true });

  // ===== Row actions: hover kebab → popover menu (create / delete) =====
  const ICON_DOTS = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M140,128a12,12,0,1,1-12-12A12,12,0,0,1,140,128Zm56-12a12,12,0,1,0,12,12A12,12,0,0,0,196,116ZM60,116a12,12,0,1,0,12,12A12,12,0,0,0,60,116Z"/></svg>';
  const ICON_TRASH = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,48H176V40a24,24,0,0,0-24-24H104A24,24,0,0,0,80,40v8H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM96,40a8,8,0,0,1,8-8h48a8,8,0,0,1,8,8v8H96Zm96,168H64V64H192ZM112,104v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Zm48,0v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Z"/></svg>';
  const ICON_BRANCH = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M232,64a32,32,0,1,0-40,31v17a8,8,0,0,1-8,8H96a23.84,23.84,0,0,0-8,1.38V95a32,32,0,1,0-16,0v66a32,32,0,1,0,16,0V144a8,8,0,0,1,8-8h88a24,24,0,0,0,24-24V95A32.06,32.06,0,0,0,232,64ZM64,64A16,16,0,1,1,80,80,16,16,0,0,1,64,64ZM96,192a16,16,0,1,1-16-16A16,16,0,0,1,96,192ZM200,80a16,16,0,1,1,16-16A16,16,0,0,1,200,80Z"/></svg>';
  const ICON_TERMINAL = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,128a8,8,0,0,1-3,6.25l-40,32a8,8,0,1,1-10-12.5L107.19,128,75,102.25a8,8,0,1,1,10-12.5l40,32A8,8,0,0,1,128,128Zm48,24H136a8,8,0,0,0,0,16h40a8,8,0,0,0,0-16Zm56-96V200a16,16,0,0,1-16,16H40a16,16,0,0,1-16-16V56A16,16,0,0,1,40,40H216A16,16,0,0,1,232,56ZM216,200V56H40V200H216Z"/></svg>';
  const ICON_AI = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M197.58,129.06,146,110l-19-51.62a15.92,15.92,0,0,0-29.88,0L78,110l-51.62,19a15.92,15.92,0,0,0,0,29.88L78,178l19,51.62a15.92,15.92,0,0,0,29.88,0L146,178l51.62-19a15.92,15.92,0,0,0,0-29.88ZM137,164.22a8,8,0,0,0-4.74,4.74L112,223.85,91.78,169A8,8,0,0,0,87,164.22L32.15,144,87,123.78A8,8,0,0,0,91.78,119L112,64.15,132.22,119a8,8,0,0,0,4.74,4.74L191.85,144ZM144,40a8,8,0,0,1,8-8h16V16a8,8,0,0,1,16,0V32h16a8,8,0,0,1,0,16H184V64a8,8,0,0,1-16,0V48H152A8,8,0,0,1,144,40ZM248,88a8,8,0,0,1-8,8h-8v8a8,8,0,0,1-16,0V96h-8a8,8,0,0,1,0-16h8V72a8,8,0,0,1,16,0v8h8A8,8,0,0,1,248,88Z"/></svg>';
  const ICON_CARET = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';

  function rowLevel(row) {
    if (row.matches('.repo__head')) return 'repo';     // a repo = a "workspace"
    if (row.matches('.branch')) return 'branch';
    if (row.matches('.session')) return 'session';      // leaf
    return 'other';
  }
  // the DOM node a delete removes for a given row
  function rowUnit(row) {
    if (row.matches('.repo__head') || row.matches('.branch--group')) return row.closest('[data-repo]');
    return row; // plain branch or session
  }
  // the editable label for a row, and an in-place rename that keeps the open pane in sync
  function nameElOf(row) {
    const lvl = rowLevel(row);
    return row.querySelector(lvl === 'repo' ? '.repo__name' : lvl === 'branch' ? '.branch__name' : '.session__name');
  }
  function renameUnit(row, name) {
    const el = nameElOf(row);
    if (!el) return;
    el.textContent = name;
    if (row.matches('.session') && openEl === row) {
      const t = document.querySelector('.pane__title span');
      if (t) t.textContent = name;
    }
  }

  // Inline rename from the keyboard: r on the selected row edits its name in place.
  // ↵ commits (through renameUnit, so the open pane stays in sync), Esc reverts, blur commits.
  function startRename(row) {
    if (!row) return;
    const el = nameElOf(row);
    if (!el || el.isContentEditable) return;
    closeMenu();
    const prev = (el.textContent || '').trim();
    el.setAttribute('contenteditable', 'plaintext-only');
    el.classList.add('renaming');
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    let done = false;
    const finish = (commit) => {
      if (done) return; done = true;
      el.removeEventListener('keydown', onKey);
      el.removeEventListener('blur', onBlur);
      el.removeAttribute('contenteditable');
      el.classList.remove('renaming');
      const val = (el.textContent || '').replace(/\s+/g, ' ').trim();
      renameUnit(row, commit && val ? val : prev);
    };
    const onKey = (ev) => {
      ev.stopPropagation();                       // typing must not reach the sidebar nav handler
      if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
      else if (ev.key === 'Escape') { ev.preventDefault(); finish(false); }
    };
    const onBlur = () => finish(true);
    el.addEventListener('keydown', onKey);
    el.addEventListener('blur', onBlur);
  }

  // Delete the selected row from the keyboard: opens the row's confirm popover so a single
  // keystroke can't destroy a session — ↵ confirms, Esc cancels (see the menu key handler).
  function requestDelete(row) {
    if (!row) return;
    const kebab = row.querySelector('.kebab');
    if (!kebab) return;
    openMenu(row, kebab);
    if (openMenuEl) showConfirm(openMenuEl);
  }

  function addKebab(row) {
    const k = document.createElement('span');
    k.className = 'kebab';
    k.setAttribute('role', 'button');
    k.setAttribute('aria-label', 'Actions');
    k.innerHTML = ICON_DOTS;
    k.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); openRowActions(row); });
    row.appendChild(k);
  }

  let openMenuEl = null, openMenuRow = null;
  function closeMenu() {
    if (openMenuEl) { const m = openMenuEl; m.classList.remove('open'); setTimeout(() => m.remove(), 160); openMenuEl = null; }
    if (openMenuRow) { openMenuRow.classList.remove('menu-open'); openMenuRow = null; }
  }

  function openMenu(row, anchor) {
    if (openMenuRow === row) { closeMenu(); return; }
    closeMenu();
    const level = rowLevel(row);
    const menu = document.createElement('div');
    menu.className = 'menu';
    const parts = [];
    if (level === 'repo') parts.push(`<span class="menu__item" data-act="create-worktree">${ICON_BRANCH}Create worktree…</span>`);
    if (level === 'branch') parts.push(`<span class="menu__item" data-act="new-terminal">${ICON_TERMINAL}New terminal</span>`);
    if (level === 'branch') parts.push(`<span class="menu__item" data-act="new-claude">${ICON_AI}New Claude Code</span>`);
    if (level !== 'session') parts.push('<div class="menu__sep"></div>');
    parts.push(`<span class="menu__item menu__item--danger" data-act="delete">${ICON_TRASH}${level === 'session' ? 'Delete' : 'Remove'}</span>`);
    menu.innerHTML = `<div class="menu__viewport">`
      + `<div class="menu__pane menu__pane--actions">${parts.join('')}</div>`
      + `<div class="menu__pane menu__pane--confirm">${confirmMarkup(level)}</div>`
      + `</div>`;

    menu.addEventListener('click', (e) => {
      e.stopPropagation(); // in-menu clicks must not reach the outside-click handler
      const item = e.target.closest('.menu__item');
      const btn = e.target.closest('.menu__btn');
      if (item) {
        const act = item.dataset.act;
        if (act === 'delete') return showConfirm(menu);
        if (act === 'create-worktree') { closeMenu(); return openWorktreeDialog(row); }
        if (act === 'new-terminal') { closeMenu(); return addTerminal(row); }
        if (act === 'new-claude') { closeMenu(); return addClaude(row); }
      } else if (btn) {
        if (btn.dataset.c === 'cancel') return closeMenu();
        if (btn.dataset.c === 'ok') { const unit = rowUnit(row); closeMenu(); removeUnit(unit); }
      }
    });

    document.body.appendChild(menu);
    positionMenu(menu, anchor);
    requestAnimationFrame(() => menu.classList.add('open'));
    openMenuEl = menu; openMenuRow = row; row.classList.add('menu-open');
  }

  function positionMenu(menu, anchor) {
    const r = anchor.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = Math.max(8, r.right - mw);
    let top = r.bottom + 6;
    if (top + mh > window.innerHeight - 8) { top = r.top - mh - 6; menu.style.setProperty('--mo', 'bottom right'); }
    else menu.style.setProperty('--mo', 'top right');
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
  }

  // Workspaces and branches are *removed* — sidebar-only; worktrees stay on disk.
  // Sessions are deleted for real (the process ends).
  function confirmMarkup(level) {
    const label = level === 'repo' ? 'Remove this workspace from the sidebar? Nothing on disk is deleted.'
      : level === 'branch' ? 'Remove this branch from the sidebar? Its worktree stays on disk.'
      : 'Delete this session?';
    const verb = level === 'session' ? 'Delete' : 'Remove';
    return `<div class="menu__confirm">
      <div class="menu__confirm-label">${label}</div>
      <div class="menu__confirm-row">
        <span class="menu__btn" data-c="cancel">Cancel</span>
        <span class="menu__btn menu__btn--danger" data-c="ok">${verb}</span>
      </div></div>`;
  }

  function showConfirm(menu) {
    if (menu.classList.contains('confirming')) return;
    const vp = menu.querySelector('.menu__viewport');
    const startH = vp.offsetHeight;
    const endH = menu.querySelector('.menu__pane--confirm').offsetHeight;
    vp.style.height = startH + 'px';
    void vp.offsetHeight;            // flush the start height before animating
    menu.classList.add('confirming');
    vp.style.height = endH + 'px';   // container resizes to the confirm state; panes crossfade
  }

  function removeUnit(unit) {
    if (!unit) return;
    unit.classList.add('row-exit');
    const done = () => { unit.remove(); rollUpGroups(); if (openEl && !document.contains(openEl)) { openEl = null; renderEmpty(); } };
    unit.addEventListener('animationend', done, { once: true });
    setTimeout(done, 260);
  }

  // Mock "git branch" discovery — stands in for the native app's real GitService.
  // `worktree: true` = already checked out somewhere (the repo root for main).
  const FAKE_BRANCHES = [
    { name: 'main', age: '2h', worktree: true },
    { name: 'feat/onboarding', age: '5h' },
    { name: 'fix/login-redirect', age: '3d' },
    { name: 'chore/deps', age: '1w' },
  ];

  // Kebab "Create worktree…": check out an existing branch, or cut a new one off a
  // base — either way the result is a real folder that becomes a row (ADR-0007).
  function openWorktreeDialog(row) {
    const repo = row.closest('[data-repo]');
    const branchesEl = repo.querySelector('.branches');
    const shown = new Set(branchesEl ? [...branchesEl.querySelectorAll(':scope > .branch .branch__name, :scope > [data-repo] > .branch--group .branch__name')].map((n) => n.textContent) : []);
    const available = FAKE_BRANCHES.map((c) => c.name).filter((n) => !shown.has(n));
    const all = [...new Set([...shown, ...FAKE_BRANCHES.map((c) => c.name)])];
    let mode = available.length ? 'existing' : 'new';

    const backdrop = document.createElement('div');
    backdrop.className = 'backdrop';
    backdrop.innerHTML = `<div class="dialog" role="dialog" aria-label="Create worktree">
      <div class="dialog__title">Create worktree</div>
      <div class="seg">
        <button class="seg__btn" data-m="existing">Existing branch</button>
        <button class="seg__btn" data-m="new">New branch</button>
      </div>
      <div data-pane="existing">
        <div class="field"><label>Branch</label>
          <select id="dlgExisting">${available.map((n) => `<option>${esc(n)}</option>`).join('')}</select></div>
      </div>
      <div data-pane="new">
        <div class="field"><label>Base branch</label>
          <select id="dlgBase">${all.map((n) => `<option>${esc(n)}</option>`).join('')}</select></div>
        <div class="field"><label>Branch name</label>
          <input id="dlgName" placeholder="feat/…" autocomplete="off" spellcheck="false"></div>
      </div>
      <div class="dialog__actions">
        <span class="dialog__btn" data-d="cancel">Cancel</span>
        <span class="dialog__btn dialog__btn--primary" data-d="create">Create</span>
      </div></div>`;
    document.body.appendChild(backdrop);
    requestAnimationFrame(() => backdrop.classList.add('open'));

    const input = backdrop.querySelector('#dlgName');
    const existingSel = backdrop.querySelector('#dlgExisting');
    const createBtn = backdrop.querySelector('[data-d="create"]');
    const paint = () => {
      backdrop.querySelectorAll('.seg__btn').forEach((b) => b.classList.toggle('is-on', b.dataset.m === mode));
      backdrop.querySelector('[data-pane="existing"]').style.display = mode === 'existing' ? '' : 'none';
      backdrop.querySelector('[data-pane="new"]').style.display = mode === 'new' ? '' : 'none';
      const ok = mode === 'existing' ? !!existingSel.value : !!input.value.trim();
      createBtn.classList.toggle('is-disabled', !ok);
      if (mode === 'new') setTimeout(() => input.focus(), 60);
    };
    paint();
    backdrop.querySelectorAll('.seg__btn').forEach((b) => b.addEventListener('click', () => { mode = b.dataset.m; paint(); }));
    input.addEventListener('input', paint);

    const close = () => { backdrop.classList.remove('open'); setTimeout(() => backdrop.remove(), 200); document.removeEventListener('keydown', onKey); };
    const submit = () => {
      const name = mode === 'existing' ? existingSel.value : input.value.trim();
      if (!name) return;
      addBranch(repo, name);
      close();
    };
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) return close();
      const b = e.target.closest('.dialog__btn'); if (!b) return;
      if (b.dataset.d === 'cancel') close(); else submit();
    });
    function onKey(e) { if (e.key === 'Escape') close(); else if (e.key === 'Enter' && !e.target.closest('.seg__btn')) { e.preventDefault(); submit(); } }
    document.addEventListener('keydown', onKey);
  }

  // Every branch is a group shell (chevron + empty sessions) so indentation is uniform.
  function branchGroupShell(name, activity) {
    const wrapper = document.createElement('div');
    wrapper.className = 'repo';
    wrapper.setAttribute('data-repo', '');
    wrapper.innerHTML = `<a class="row branch branch--group" data-row data-toggle data-group data-activity="${esc(activity)}">
        <span class="chev">${ICON_CARET}</span>
        <span class="branch__name">${esc(name)}</span>
        <span class="branch__roll"></span>
      </a>
      <div class="collapse"><div class="collapse__inner"><div class="sessions"></div></div></div>`;
    return wrapper;
  }

  function addBranch(repo, name) {
    repo.classList.add('repo--open');
    const branches = repo.querySelector('.branches');
    const wrapper = branchGroupShell(name, 'now');
    wrapper.classList.add('row-enter');
    branches.appendChild(wrapper);
    wrapper.querySelectorAll('[data-row]').forEach(addKebab);
    rollUpGroups();
    wrapper.addEventListener('animationend', () => wrapper.classList.remove('row-enter'), { once: true });
  }

  // Promote a plain branch into a session-holding group if needed, return its .sessions
  function ensureGroup(branchRow) {
    if (branchRow.classList.contains('branch--group')) {
      const repo = branchRow.closest('[data-repo]');
      repo.classList.add('repo--open');
      return repo.querySelector('.sessions');
    }
    const branches = branchRow.parentNode;
    const wrapper = document.createElement('div');
    wrapper.className = 'repo repo--open';
    wrapper.setAttribute('data-repo', '');
    branches.insertBefore(wrapper, branchRow);

    branchRow.classList.add('branch--group');
    branchRow.setAttribute('data-toggle', '');
    branchRow.setAttribute('data-group', '');
    const metaEl = branchRow.querySelector('.branch__meta');
    branchRow.dataset.activity = metaEl ? metaEl.textContent : 'now';
    if (metaEl) metaEl.remove();

    const chev = document.createElement('span'); chev.className = 'chev'; chev.innerHTML = ICON_CARET;
    branchRow.insertBefore(chev, branchRow.firstChild);
    const roll = document.createElement('span'); roll.className = 'branch__roll';
    branchRow.insertBefore(roll, branchRow.querySelector('.kebab') || null);

    const collapse = document.createElement('div'); collapse.className = 'collapse';
    const inner = document.createElement('div'); inner.className = 'collapse__inner';
    const sessions = document.createElement('div'); sessions.className = 'sessions';
    inner.appendChild(sessions); collapse.appendChild(inner);
    wrapper.appendChild(branchRow); wrapper.appendChild(collapse);
    return sessions;
  }

  // A new session is one of two kinds. Claude Code is just a terminal that opened
  // and ran `claude`, so both spawn identically — only the type, icon, name and
  // starting state differ.
  const SESSION_KINDS = {
    terminal: { type: 'terminal', name: 'shell',       icon: `<span class="session__icon">${ICON_TERMINAL}</span>`,                  ind: 'run' },

  function addSession(branchRow, kind) {
    const spec = SESSION_KINDS[kind];
    const sessions = ensureGroup(branchRow);
    const a = document.createElement('a');

  }

  const addClaude   = (branchRow) => addSession(branchRow, 'claude');

  // ===== Add workspace (the + on the section header) =====
  const CHIP_COLORS = ['#6366f1', '#0ea5e9', '#f59e0b', '#10b981', '#ec4899', '#8b5cf6'];
  let workspaceSeq = nav.querySelectorAll(':scope > [data-repo]').length;

  // Every branch row maps to a real worktree folder (ADR-0007), so a workspace is
  // added with exactly the branches the user picked — collapsed, count = picked.
  function addWorkspace(pathOrName, cands) {
    const name = (pathOrName.split('/').filter(Boolean).pop() || pathOrName).trim();
    const color = CHIP_COLORS[workspaceSeq++ % CHIP_COLORS.length];
    const rows = cands || [];
    const repo = document.createElement('div');
    repo.className = 'repo row-enter';
    repo.setAttribute('data-repo', '');
    repo.innerHTML = `<button class="row repo__head" data-row data-toggle>

  // Step 2 of adding a workspace: pick which branches to show. Pre-checked rows
  // already have a worktree (reused); other checked rows get one created on Add.
  // Keyboard-first like the tree: ↑/↓ move, Space toggles, Enter adds, Esc cancels.
  const ICON_CHECK = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg>';
  function openWorktreePicker(pathOrName) {
    const name = (pathOrName.split('/').filter(Boolean).pop() || pathOrName).trim();
    const cands = FAKE_BRANCHES;
    const checked = cands.map((c) => !!c.worktree);

    const backdrop = document.createElement('div');

      <div class="dialog__title">Add worktrees — ${esc(name)}</div>

        <div class="wtrow" data-i="${i}">

          <span class="wtrow__age">${esc(c.age)}</span>
          <span class="wtrow__tag"></span>
        </div>`).join('')}</div>
      <div class="dialog__actions">
        <span class="dialog__btn" data-d="cancel">Cancel</span>
        <span class="dialog__btn dialog__btn--primary" data-d="create">Add</span>
      </div></div>`;
    document.body.appendChild(backdrop);
    requestAnimationFrame(() => backdrop.classList.add('open'));

    const rows = [...backdrop.querySelectorAll('.wtrow')];
    const addBtn = backdrop.querySelector('[data-d="create"]');
    const paint = () => {
      rows.forEach((r, i) => {
        r.classList.toggle('on', checked[i]);
        r.classList.toggle('cur', i === cur);
        r.querySelector('.wtrow__tag').textContent =
          cands[i].worktree ? 'has worktree' : (checked[i] ? 'will create' : '');
      });
      const n = checked.filter(Boolean).length;
      addBtn.textContent = 'Add ' + n;
      addBtn.classList.toggle('is-disabled', !n);
    };
    paint();

    const close = () => { backdrop.classList.remove('open'); setTimeout(() => backdrop.remove(), 200); document.removeEventListener('keydown', onKey, true); };
    const submit = () => {
      const picked = cands.filter((_, i) => checked[i]);
      if (!picked.length) return;
      addWorkspace(pathOrName, picked);
      close();
    };
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) return close();
      const r = e.target.closest('.wtrow');

      if (b.dataset.d === 'cancel') close(); else submit();

      const k = e.key;
      if (k === 'Escape') { e.preventDefault(); e.stopPropagation(); close(); }
      else if (k === 'ArrowDown') { e.preventDefault(); e.stopPropagation(); cur = Math.min(cur + 1, cands.length - 1); paint(); }
      else if (k === 'ArrowUp') { e.preventDefault(); e.stopPropagation(); cur = Math.max(cur - 1, 0); paint(); }
      else if (k === ' ') { e.preventDefault(); e.stopPropagation(); checked[cur] = !checked[cur]; paint(); }
      else if (k === 'Enter') { e.preventDefault(); e.stopPropagation(); submit(); }
    }
    document.addEventListener('keydown', onKey, true);   // capture: the picker owns the keyboard
  }

  function openWorkspaceDialog() {
    const backdrop = document.createElement('div');

  // ===== Keyboard shortcuts sheet (⌘?) — every binding above, one glanceable modal =====
  const ICON_KEYS = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm0,160H40V56H216V200Z"/><path d="M192,112H64a8,8,0,0,1,0-16H192a8,8,0,0,1,0,16Z"/><path d="M160,160H96a8,8,0,0,1,0-16h64a8,8,0,0,1,0,16Z"/></svg>';

  // ===== Command palette (⌘K) — Linear-style fuzzy command + jump menu =====
  const ICON_SEARCH = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"/></svg>';

  const ICON_PLUS = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"/></svg>';
  const CMDK_GROUPS = ['Actions', 'Workspaces', 'Branches', 'Sessions'];

  let pal = null, palItems = [], palActive = 0;

  const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  // subsequence fuzzy match; higher score = better, -Infinity = no match
  function fuzzy(q, text) {
    if (!q) return 0;
    q = q.toLowerCase();
    const t = text.toLowerCase();
    let ti = 0, score = 0, run = 0, first = -1;
    for (const c of q) {
      const idx = t.indexOf(c, ti);
      if (idx === -1) return -Infinity;
      if (first === -1) first = idx;
      run = idx === ti ? run + 2 : 0;                           // contiguous streak bonus
      if (idx === 0 || /[\W_\/]/.test(t[idx - 1])) score += 3;  // word-boundary hit
      score += 1 + run;
      ti = idx + 1;
    }
    return score - first * 0.5;
  }
  // items match on their label first; the context path is a weaker fallback,
  // so "synth dev" finds the dev server without outranking exact label hits
  function itemScore(q, it) {
    const s = fuzzy(q, it.label);
    if (!it.ctx) return s;
    return Math.max(s, fuzzy(q, it.ctx + ' ' + it.label) - 2);
  }

  // Which workspace/branch a context-sensitive action targets: the open session's,
  // else the nav cursor's, else the first workspace.
  function contextRow() {
    if (openEl && document.contains(openEl)) return openEl;
    if (selEl && document.contains(selEl)) return selEl;
    return null;
  }
  function contextWorkspaceHead() {
    const row = contextRow();
    const repo = (row && outerRepoOf(row)) || nav.querySelector(':scope > [data-repo]');
    return repo ? repo.querySelector(':scope > .repo__head') : null;
  }
  function contextBranch() {
    const row = contextRow();
    if (row) {
      if (row.matches('.branch')) return row;
      const g = branchGroupOf(row);
      if (g) return g;
    }
    const head = contextWorkspaceHead();
    const scope = head ? head.closest('[data-repo]') : nav;
    return scope.querySelector('.branch--active') || scope.querySelector('.branch')
      || nav.querySelector('.branch--active') || nav.querySelector('.branch');
  }

  // Reveal a row (expand its collapsed ancestors), select it, and mark a session read.
  function jumpTo(row) {
    let node = row.parentElement;
    while (node && node !== nav) {
      if (node.matches && node.matches('[data-repo]')) node.classList.add('repo--open');
      node = node.parentElement;
    }
    if (row.matches('[data-session]')) openSession(row);
    document.body.classList.add('kbd');
    select(row, true);
  }

  // The palette is a navigation STACK of frames. Root is simple; typing filters and progressively

  const ICON_FOLDER = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,72H131.31L104,44.69A15.86,15.86,0,0,0,92.69,40H40A16,16,0,0,0,24,56V200.62A15.4,15.4,0,0,0,39.38,216H216.89A15.13,15.13,0,0,0,232,200.89V88A16,16,0,0,0,216,72ZM40,56H92.69l16,16H40Zm176,144H40V88H216Z"/></svg>';

  const ICON_CLOSE  = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>';

  const seIcon = (s) => s.querySelector('.session__icon').outerHTML;
  const seStatus = (s) => STATE_LABEL[sessionState(s)];
  const wsOf = (el) => { let r = el.closest('[data-repo]'); while (r) { const o = r.parentElement && r.parentElement.closest('[data-repo]'); if (!o) break; r = o; } return r ? r.querySelector('.repo__name').textContent : ''; };

  const curFrame = () => pal.stack[pal.stack.length - 1];
  function pushFrame(fr) { pal.stack.push(fr); pal.input.value = fr.seed || ''; renderFrame(); if (fr.seed) pal.input.select(); }
  function popFrame() { if (pal.stack.length > 1) { pal.stack.pop(); pal.input.value = ''; renderFrame(); } }

  // ---- Frames: each returns { crumb?, placeholder, mode?, build(query) -> items[] } ----

  function rootFrame() {

      placeholder: 'Search or jump to anything…',
      build(q) {

          { sec: 'act', icon: ICON_KEYS,    label: 'Keyboard shortcuts', kbd: ['⌘', '?'], enter: () => runAndClose(openShortcuts) },
        ];
        const items = [
          ...here.items.map((it) => ({ ...it, g: 'Actions' })),
          { g: 'Actions', icon: ICON_PLUS,     label: 'New workspace…', enter: () => pushFrame(createFrame('workspace')) },
          { g: 'Actions', icon: ICON_SIDEBAR,  label: 'Toggle sidebar', kbd: ['⌘', 'B'], enter: () => runAndClose(() => app.classList.toggle('collapsed')) },

        allRows('.repo__head').forEach((h) => items.push({ g: 'Workspaces', icon: wsChip(h), label: wsName(h), enter: () => pushFrame(workspaceFrame(h)) }));

      crumb: name, placeholder: 'Search ' + name + '…',
      build() {

      branch:    { crumb: 'Remove branch',    ph: 'Select a branch to remove…',    sel: '.branch',     icon: () => ICON_BRANCH, label: brName, ctx: wsOf },

      : level === 'branch' ? 'Remove this branch? Its worktree stays on disk.'

      crumb: verb + ' ' + name + '?', mode: 'confirm', placeholder: hint + '  ↵ confirm · esc cancel',

  function renderCrumbs() {
    const crumbs = pal.stack.map((f, i) => ({ f, i })).filter((x) => x.f.crumb);
    pal.crumbs.innerHTML = crumbs.map(({ f, i }) => '<span class="cmdk__crumb" data-depth="' + i + '">' + esc(f.crumb) + '</span>').join('');

  function renderFrame() {
    const fr = curFrame();
    const q = pal.input.value.trim();
    pal.input.placeholder = fr.placeholder;
    renderCrumbs();
    let items = fr.build(q);
    if (!fr.mode && q) {   // 'list' frames fuzzy-filter by query; 'input'/'confirm' frames don't
      const sectioned = items.some((it) => it.g || it.sec);
      if (sectioned) {
        const order = [], byK = new Map();
        items.forEach((it) => { const s = itemScore(q, it); if (s === -Infinity) return; const k = it.g || it.sec || ''; if (!byK.has(k)) { byK.set(k, []); order.push(k); } byK.get(k).push({ it, s }); });
        items = order.flatMap((k) => byK.get(k).sort((a, b) => b.s - a.s).map((x) => x.it));
      } else {
        items = items.map((it) => ({ it, s: itemScore(q, it) })).filter((x) => x.s > -Infinity).sort((a, b) => b.s - a.s).map((x) => x.it);

  // Animate the list to its content height (measured at height:auto so it can shrink, not just grow).
  function sizeList() {
    const list = pal.list;
    const start = list.style.height ? list.offsetHeight : null;
    list.style.height = 'auto';
    const target = Math.min(list.scrollHeight, 340) + 'px';
    if (start === null) { list.style.height = target; return; }  // first render: snap, no animation
    list.style.height = start + 'px';
    void list.offsetHeight;                                       // flush the start height
    list.style.height = target;                                  // then animate to the new height

      </button>
      <div class="nav__label">Workspaces</div>
      ${heads.map(() => '').join('')}`;
    // append workspace scope rows, keeping a live handle back to each head element
    heads.forEach((h) => {
      const b = document.createElement('button');
      b.className = 'scope';
      b.dataset.scope = 'ws';
      b.innerHTML = `<span class="scope__icon">${wsChip(h)}</span><span class="scope__name">${esc(wsName(h))}</span>`;
      b._head = h;
      settingsNav.appendChild(b);
    });
  }

  function markScope() {
    settingsNav.querySelectorAll('.scope').forEach((b) => {
      const on = b.dataset.scope === 'global' ? settingsScope === 'global' : b._head === settingsScope;
      b.classList.toggle('scope--on', on);
    });
  }

  // Appearance is global-only: it sits above the setup script on the Global scope.
  function appearanceSection() {
    return `<div class="set-section">
        <div class="set-section__title">Appearance</div>
        <div class="set-section__sub"><b>System</b> follows your macOS appearance; Light and Dark pin it.</div>
        <div class="seg set-seg" role="group" aria-label="Theme">
          <button class="seg__btn" data-theme-opt="system">System</button>
          <button class="seg__btn" data-theme-opt="light">Light</button>
          <button class="seg__btn" data-theme-opt="dark">Dark</button>
        </div>
      </div>`;
  }

  // The one setting so far: the worktree setup script. Global shows just its own; a workspace
  // shows the run order + the read-only global script (what also runs) above its editable one.
  function scriptSection(isGlobal, name) {
    if (isGlobal) {
      return appearanceSection() + `<div class="set-section">
        <div class="set-section__title">Worktree setup script</div>
        <div class="set-section__sub">Runs once inside every new worktree, right after it's created — across all workspaces.</div>
        <div class="set-code-wrap">
          <div class="set-code-head"><span class="set-code-head__label">setup.sh</span></div>
          <textarea class="set-code" data-edit="global" spellcheck="false">${esc(globalScript)}</textarea>
        </div>
        <div class="set-note">${ICON_INFO}<span>Runs in the new worktree's root with <code>$SYNTH_MAIN</code> pointing at the primary checkout. Times out after 5&nbsp;minutes; a non-zero exit is reported on the worktree but never blocks it.</span></div>
      </div>`;
    }
    return `<div class="set-section">
      <div class="set-section__title">Worktree setup script</div>
      <div class="set-section__sub">Extra setup for <b>${esc(name)}</b> worktrees, on top of the global script.</div>
      <div class="set-flow">
        <span class="set-flow__step"><span class="set-flow__ico">${ICON_GLOBE}</span>Global</span>
        <span class="set-flow__arrow">${ICON_CARET}</span>
        <span class="set-flow__step">${wsChip(contextHeadByName(name))}${esc(name)}</span>
        <span class="set-flow__note">Both run · global first</span>
      </div>
      <div class="set-code-wrap">
        <div class="set-code-head"><span class="set-code-head__label">Global — runs first</span><button class="set-link" data-goto="global">Edit in Global</button></div>
        <textarea class="set-code set-code--ro" rows="3" readonly spellcheck="false">${esc(globalScript)}</textarea>
      </div>
      <div class="set-code-wrap">
        <div class="set-code-head"><span class="set-code-head__label">${esc(name)} — runs next</span></div>
        <textarea class="set-code" data-edit="ws" spellcheck="false">${esc(scriptFor(name))}</textarea>
      </div>
      <div class="set-note">${ICON_INFO}<span>Each runs in the new worktree's root. Times out after 5&nbsp;minutes; a non-zero exit is reported but never blocks it.</span></div>
    </div>`;
  }
  // find a workspace head by its name (for the chip in the run-order strip)
  const contextHeadByName = (name) => workspaceHeads().find((h) => wsName(h) === name) || null;

  function renderSettings() {
    stopStream();
    const isGlobal = settingsScope === 'global';
    // a removed workspace can leave settingsScope dangling — fall back to Global
    if (!isGlobal && !document.contains(settingsScope)) { settingsScope = 'global'; return renderSettings(); }
    const head = isGlobal ? null : settingsScope;
    const name = isGlobal ? 'Global' : wsName(head);
    const titleIcon = isGlobal ? `<span class="scope__icon">${ICON_GLOBE}</span>` : wsChip(head);
    content.innerHTML = `<div class="pane">
      <div class="pane__head">
        <div class="pane__title">${titleIcon}<span>${esc(name)}</span></div>
        <div class="pane__crumb"><b>Settings</b> / ${esc(isGlobal ? 'All workspaces' : name)}</div>
        <div class="pane__spacer"></div>
      </div>
      <div class="set-body"><div class="set-body__inner">${scriptSection(isGlobal, name)}</div></div>
    </div>`;
    markScope();
    // theme segmented control (Global scope only)
    markThemeSeg();
    content.querySelectorAll('[data-theme-opt]').forEach((b) => {
      b.addEventListener('click', () => setTheme(b.dataset.themeOpt));
    });
    // edits persist to the mock store so they survive switching scopes
    content.querySelectorAll('.set-code[data-edit]').forEach((ta) => {
      ta.addEventListener('input', () => {
        if (ta.dataset.edit === 'global') globalScript = ta.value;
        else wsScripts[name] = ta.value;
      });
    });
  }

  function enterSettings(scope) {
    closeMenu();
    if (paletteOpen) closePalette();
    if (shortcutsEl) closeShortcuts();
    app.classList.remove('collapsed');
    settingsScope = scope || 'global';
    buildScopeNav();
    app.classList.add('settings');
    renderSettings();
  }
  function exitSettings() {
    if (!app.classList.contains('settings')) return;
    app.classList.remove('settings');
    renderOpen();   // restore the session that was open before
  }

  document.getElementById('openSettings').addEventListener('click', () => enterSettings());
  settingsNav.addEventListener('click', (e) => {
    if (e.target.closest('#settingsBack')) return exitSettings();
    const sc = e.target.closest('.scope');
    if (!sc) return;
    settingsScope = sc.dataset.scope === 'global' ? 'global' : sc._head;
    renderSettings();
  });
  // "Edit in Global" jumps scope without leaving settings
  content.addEventListener('click', (e) => {
    const g = e.target.closest('[data-goto]');
    if (g && app.classList.contains('settings')) { settingsScope = 'global'; renderSettings(); }
  });

  // Open a session by default so the workspace feels live on load (the Claude Code hero).
  openSession(nav.querySelector('.session[data-type="ai"]') || nav.querySelector('.session'));

  // Resizable sidebar — drag the seam to set the sidebar width (persists); ⌘B collapse still wins.
  (() => {
    const handle = document.getElementById('resizeHandle');
    if (!handle) return;
    const MIN = 200, MAX = 460;
    try { const s = parseInt(localStorage.getItem('synth-sidebar-w'), 10); if (s >= MIN && s <= MAX) app.style.setProperty('--sidebar-w', s + 'px'); } catch (e) {}
    let startX = 0, startW = 0;
    const onMove = (e) => {
      const w = Math.min(MAX, Math.max(MIN, startW + (e.clientX - startX)));
      app.style.setProperty('--sidebar-w', w + 'px');
    };
    const onUp = () => {
      app.classList.remove('resizing');
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      const w = Math.round(app.querySelector('.sidebar').getBoundingClientRect().width);
      try { if (w) localStorage.setItem('synth-sidebar-w', w); } catch (e) {}
    };
    handle.addEventListener('pointerdown', (e) => {
      if (app.classList.contains('collapsed')) return;
      e.preventDefault();
      startX = e.clientX;
      startW = app.querySelector('.sidebar').getBoundingClientRect().width;
      app.classList.add('resizing');
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
    // double-click the seam → reset to the default width
    handle.addEventListener('dblclick', () => { app.style.removeProperty('--sidebar-w'); try { localStorage.removeItem('synth-sidebar-w'); } catch (e) {} });
  })();
})();
</script>
</body>
</html>
