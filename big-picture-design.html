  /* run-order strip — makes the "both run, global first" merge legible at a glance */
  .set-flow {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 12px;
    margin: 14px 0 4px;
    background: var(--hover-soft);
    border: 0.5px solid var(--border);
    border-radius: 10px;
  }
  .set-flow__step { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 550; color: var(--ink); }
  .set-flow__ico { display: flex; color: var(--text-muted); }
  .set-flow__ico svg { width: 15px; height: 15px; display: block; }
  .set-flow .repo__chip { width: 16px; height: 16px; font-size: 9.5px; border-radius: 5px; }
  .set-flow__arrow { display: flex; color: var(--ink-meta); }
  .set-flow__arrow svg { width: 15px; height: 15px; display: block; }
  .set-flow__note { margin-left: auto; font-size: 11px; font-weight: 500; color: var(--text-muted); }

  .set-code-wrap { margin-top: 14px; }
  .set-code-head { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .set-code-head__label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-meta);
  }
  .set-link {
    margin-left: auto;
    border: 0;
    background: none;
    padding: 0;
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--input);
    cursor: pointer;
  }
  .set-link:hover { text-decoration: underline; }
  .set-code {
    width: 100%;
    min-height: 130px;
    resize: vertical;
    display: block;
    padding: 13px 15px;
    border: 0;
    border-radius: 10px;
    background: var(--term-bg);
    color: #d4d6dc;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    tab-size: 2;
    white-space: pre;
    outline: none;
    box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.06), 0 1px 3px rgba(0,0,0,0.18);
    -webkit-font-smoothing: auto;
  }
  .set-code:focus { box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.06), 0 1px 3px rgba(0,0,0,0.18), 0 0 0 2.5px rgba(var(--accent-rgb),0.22); }
  .set-code--ro { min-height: 0; opacity: 0.62; resize: none; }
  .set-note {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--text-muted);
  }
  .set-note svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; color: var(--ink-meta); }
  .set-note code, .set-section__sub code { font-family: var(--mono); font-size: 11px; background: var(--hover); padding: 0 4px; border-radius: 4px; }

  .set-code--flags { min-height: 0; height: 52px; resize: vertical; }
  /* effective launch-command preview, styled like the terminal surface */
  .set-cmd { margin-top: 14px; padding: 10px 12px; font-family: var(--mono); font-size: 11.5px; line-height: 1.55; color: var(--tui-fg); background: var(--tui-bg); border: 1px solid var(--tui-hair); border-radius: 8px; white-space: pre-wrap; word-break: break-word; }
  .set-cmd__prompt { color: var(--tui-dim); user-select: none; }
  .set-cmd__flag { color: var(--tui-blue); }

  /* ---- New-worktree sessions (settings): the ordered session set every worktree starts with.
     Each row is one template entry — drag the grip to reorder, type in the name to rename,
     × removes. The preview underneath renders the resulting sidebar subtree live. */
  .tpl-list { display: flex; flex-direction: column; gap: 4px; margin-top: 14px; }
  .set-code-wrap .tpl-list { margin-top: 0; }
  .tpl-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 9px;
    background: var(--raised);
    border: 0.5px solid var(--border);
    border-radius: 9px;
    box-shadow: 0 1px 1.5px rgba(0,0,0,0.04);
  }
  /* read-only mirror (the inherited global list on a workspace scope) — same dial as .set-code--ro */
  .tpl-list--ro .tpl-row { background: transparent; box-shadow: none; opacity: 0.62; }
  .tpl-grip { display: flex; flex-shrink: 0; color: var(--text-faint); cursor: grab; touch-action: none; }
  .tpl-grip svg { width: 14px; height: 14px; display: block; }
  .tpl-idx { flex-shrink: 0; width: 13px; text-align: center; font-size: 10.5px; font-weight: 500; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .tpl-row .session__icon { flex-shrink: 0; }
  .tpl-name {
    flex: 1;
    min-width: 0;
    padding: 2px 5px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: -0.006em;
    color: var(--ink);
    outline: none;
  }
  input.tpl-name:hover { background: var(--hover-soft); }
  input.tpl-name:focus { background: var(--hover-soft); box-shadow: inset 0 0 0 1.5px rgba(var(--accent-rgb),0.5); }
  .tpl-kind { flex-shrink: 0; padding: 2px 8px; border-radius: 999px; background: var(--hover); font-size: 10.5px; font-weight: 550; color: var(--text-muted); }
  .tpl-x {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border: 0;
    border-radius: 6px;
    background: none;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background-color 120ms ease, color 120ms ease, transform 110ms var(--ease-out);
  }
  .tpl-x svg { width: 12px; height: 12px; display: block; }
  .tpl-x:active { transform: scale(0.88); }
  @media (hover: hover) and (pointer: fine) {
    .tpl-x:hover { background: var(--hover); color: var(--error); }
  }
  .tpl-empty { padding: 10px 12px; border: 0.5px dashed var(--line); border-radius: 9px; font-size: 12px; color: var(--text-faint); }
  .tpl-add { display: flex; gap: 6px; margin-top: 8px; }
  .tpl-add__btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 0.5px solid var(--line);
    border-radius: 8px;
    background: var(--raised);
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 550;
    color: var(--ink-3);
    cursor: pointer;
    transition: background-color 120ms ease, color 120ms ease, border-color 120ms ease, transform 110ms var(--ease-out);
  }
  .tpl-add__btn svg { width: 12px; height: 12px; display: block; color: var(--text-faint); }
  .tpl-add__btn:active { transform: scale(0.97); }
  @media (hover: hover) and (pointer: fine) {
    .tpl-add__btn:hover { background: var(--hover-soft); border-color: var(--line-2); color: var(--ink); }
  }
  /* live preview: the sidebar subtree a new worktree would open with — display only */
  .tpl-preview { margin-top: 14px; padding: 10px 12px 12px; background: var(--sidebar); border: 0.5px solid var(--border); border-radius: 10px; }
  .tpl-preview .set-code-head { margin-bottom: 4px; }
  .tpl-preview .repo { margin: 0; }
  .tpl-preview .row { pointer-events: none; }

  /* Respect reduced motion: keep opacity/color, drop movement + looping pulses */
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
    .row:active, .icon-btn:active, .kebab:active { transform: translateY(0); }
    .kebab:active { transform: translateY(-50%); }
    .ind, .sdot--work, .ind--input svg, .work-dot, .term__cursor, .chat__composer.awaiting, .skel, .pane { animation: none; }
    .session--pulse, .notif--input .notif__glyph svg { animation: none; }
    .collapse, .app, .menu, .menu__viewport, .backdrop, .dialog, .cmdk, .cmdk__panel, .cmdk__list { transition: none; }
    .cmdk__panel { transform: none !important; }
    .row-enter, .row-exit { animation: none; }
  }

  /* ============================ Dark mode ============================ */
  /* The head script stamps :root[data-theme] before paint; System follows the OS.
     Only variables change here — every surface reads them, so the whole shell,
     the ⌘K palette, menus, dialogs, settings and the terminal all move together. */
  :root[data-theme="dark"] {
    --oc-ring: #f1ecec;
    --oc-inner: #4b4646;
    --canvas: #0d0f13;
    --panel: #191b1f;
    --sidebar: #1d1f24;
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.13);
    --text: #e6e8ed;
    --text-muted: #8d9099;
    --text-faint: #666a72;
    --ink-meta: #8d9099;
    --accent: #eee0cd;       /* the champagne mark itself */
    --accent-rgb: 238,224,205;
    --on-accent: #191b1f;    /* charcoal on the dark champagne button (13.3:1) */
    --focus: #eee0cd;        /* the champagne mark */
    --input: #7ea6dc;
    --input-rgb: 126,166,220;
    --copper: #c2724c;       /* keeps the copper here so it stays distinct from the pale champagne accent */
    --copper-rgb: 194,114,76;
    --pr-open: #57ab5a;
    --pr-merged: #b083f0;
    --pr-closed: #e5534b;
    --pr-queued: #4493f8;
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 10px 30px rgba(0,0,0,0.55);

  /* the window itself: matte black behind the app, hairline seam in dark */
  :root[data-theme="dark"] body { background: #0a0b0d; }
  :root[data-theme="dark"] .app { border-color: rgba(255,255,255,0.09); }
  /* the ⌘K glass reads as frosted dark, not a white sheet */
  :root[data-theme="dark"] .cmdk__panel { background: rgba(31,34,40,0.86); }
  /* settings appearance control sits on the standard segmented track */
  .set-seg { max-width: 300px; margin-top: 14px; }
  /* menu icons: brighter on the dark glass (danger keeps its red via its own rule) */
  :root[data-theme="dark"] .menu__item:not(.menu__item--danger) svg { color: var(--ink-4); }
  /* big-picture-only surfaces: the simulator stage + browser skeleton must go dark too */
  :root[data-theme="dark"] .sim { background: #0d0f13; }
  :root[data-theme="dark"] .skel {
    background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.09), rgba(255,255,255,0.05));
    background-size: 200% 100%;
  }
  /* ⌘K palette: the active-row label + status meta were tuned for a white panel —
     lift them to bright, legible values on the dark frosted glass */
  :root[data-theme="dark"] .cmdk__item.is-active .cmdk__label { color: var(--accent); }
  :root[data-theme="dark"] .cmdk__item--danger.is-active .cmdk__label { color: var(--error); }
  :root[data-theme="dark"] .cmdk__meta--run   { color: var(--work); }
  :root[data-theme="dark"] .cmdk__meta--work  { color: var(--work); }
  :root[data-theme="dark"] .cmdk__meta--input { color: var(--input); }
  :root[data-theme="dark"] .cmdk__meta--error { color: var(--error); }
</style>

    // Stamp the theme before first paint so there's no light flash. System by default.
    (function () {
      try {
        var p = localStorage.getItem('synth-theme') || 'system';
        var dark = p === 'dark' || (p !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

<script>
(() => {
  const app = document.getElementById('app');
  const nav = document.getElementById('nav');
  let paletteOpen = false;

  // --- Sidebar collapse / expand ---
  document.getElementById('collapseBtn').addEventListener('click', () => app.classList.add('collapsed'));
  document.getElementById('expandBtn').addEventListener('click', () => app.classList.remove('collapsed'));

  // --- Branch-group roll-up: highest-priority session state, else last activity ---
  const MARK_INPUT = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M192,96c0,28.51-24.47,52.11-56,55.56V160a8,8,0,0,1-16,0V144a8,8,0,0,1,8-8c26.47,0,48-17.94,48-40s-21.53-40-48-40S80,73.94,80,96a8,8,0,0,1-16,0c0-30.88,28.71-56,64-56S192,65.12,192,96Zm-64,96a16,16,0,1,0,16,16A16,16,0,0,0,128,192Z"/></svg>';
  const MARK_ERROR = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M144,200a16,16,0,1,1-16-16A16,16,0,0,1,144,200Zm-16-40a8,8,0,0,0,8-8V48a8,8,0,0,0-16,0V152A8,8,0,0,0,128,160Z"/></svg>';
  const MARK_DONE = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg>';

  // priority: needs-input > error > working > running > idle
  const PRIORITY = ['input', 'error', 'work', 'run', 'idle'];
  function sessionState(s) {
    if (s.querySelector('.ind--input')) return 'input';
    if (s.querySelector('.ind--error')) return 'error';
    if (s.querySelector('.sdot--work')) return 'work';
    if (s.querySelector('.sdot--run')) return 'run';
    return 'idle';
  }
  // Busy: a live agent turn or process. Closing one loses that turn, so it's the only
  // Close that's red — every Close still confirms, busy or not.
  function sessionIsBusy(s) { const st = sessionState(s); return st === 'work' || st === 'run'; }
  const ROLL = {
    input: () => `<span class="ind ind--input">${MARK_INPUT}</span>`,
    error: () => `<span class="ind ind--error">${MARK_ERROR}</span>`,
    work:  () => `<span class="ind"><span class="sdot sdot--work"></span></span>`,
    run:   () => `<span class="ind"><span class="sdot sdot--run"></span></span>`,
    unread:() => `<span class="ind"><span class="udot"></span></span>`,
  };
  function rollUpGroups() {
    nav.querySelectorAll('[data-group]').forEach((group) => {
      const repo = group.closest('[data-repo]');
      const sessions = [...repo.querySelectorAll('.sessions .session')];
      const worst = PRIORITY.find((p) => sessions.some((s) => sessionState(s) === p)) || 'idle';
      const hasUnread = sessions.some((s) => s.classList.contains('session--unread'));
      const slot = group.querySelector('.branch__roll');
      slot.innerHTML = worst !== 'idle' ? ROLL[worst]()
        : hasUnread ? ROLL.unread()  // all idle, but finished-and-unseen output waits inside
        : group.classList.contains('branch--active') ? `<span class="ind"><span class="branch__dot"></span></span>`  // checked-out branch
        : `<span class="branch__meta">${group.dataset.activity}</span>`;  // all idle → last activity
    });
  }
  rollUpGroups();

  // ===== Content pane: render the open session (the one "you are here") =====
  // Sticky selection — survives mousing around, changes only on activate. The white
  // active pill is DERIVED from it: the branch group that holds the open session.
  const content = document.querySelector('.content');
  const ICON_COPY_CRUMB = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>';
  const ICON_CHECK_CRUMB = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg>';
  // A copy button beside the branch name in the pane crumb — copies the branch name to the
  // clipboard, flashing a check. Hover-revealed on the header, like the sidebar kebab.
  function crumbCopyHTML(branch) {
    return `<button class="crumb-copy" data-copy="${esc(branch)}" title="Copy branch name" aria-label="Copy branch name">${ICON_COPY_CRUMB}</button>`;
  }
  // The header PR chip opens the pull request in the user's default browser (the native app
  // hands the URL to NSWorkspace). In the mock there's nothing to open, so just swallow the nav.
  content.addEventListener('click', (e) => {
    // clicking a pane's body makes it the active pane (002) — in place, so the click also
    // reaches whatever control it landed on. Settings renders a bare .pane (no _node) — skip.
    const pane = e.target.closest('.pane');
    if (pane && pane._node && pane._node !== activePane) setActivePane(pane._node);
    const chip = e.target.closest('[data-prchip]');
    if (chip) { e.preventDefault(); return; }
    const copy = e.target.closest('[data-copy]');
    if (copy) {
      e.preventDefault();
      if (navigator.clipboard) navigator.clipboard.writeText(copy.dataset.copy);
      copy.classList.add('copied');
      copy.innerHTML = ICON_CHECK_CRUMB;
      clearTimeout(copy._t);
      copy._t = setTimeout(() => { copy.classList.remove('copied'); copy.innerHTML = ICON_COPY_CRUMB; }, 1100);
    }
  });
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ICON_SEND = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,117.66a8,8,0,0,1-11.32,0L136,59.31V216a8,8,0,0,1-16,0V59.31L61.66,117.66a8,8,0,0,1-11.32-11.32l72-72a8,8,0,0,1,11.32,0l72,72A8,8,0,0,1,205.66,117.66Z"/></svg>';
  const ICON_EMPTY = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,128a8,8,0,0,1-3,6.25l-40,32a8,8,0,1,1-10-12.5L107.19,128,75,102.25a8,8,0,1,1,10-12.5l40,32A8,8,0,0,1,128,128Zm48,24H136a8,8,0,0,0,0,16h40a8,8,0,0,0,0-16Zm56-96V200a16,16,0,0,1-16,16H40a16,16,0,0,1-16-16V56A16,16,0,0,1,40,40H216A16,16,0,0,1,232,56ZM216,200V56H40V200H216Z"/></svg>';
  const STATE_LABEL = { run: 'busy', work: 'busy', input: 'needs input', error: 'error', idle: 'idle' };
  const IND_HTML = {
    input: `<span class="ind ind--input">${MARK_INPUT}</span>`,
    error: `<span class="ind ind--error">${MARK_ERROR}</span>`,
    work:  `<span class="ind"><span class="sdot sdot--work"></span></span>`,
    run:   `<span class="ind"><span class="sdot sdot--run"></span></span>`,
    idle:  `<span class="ind"></span>`,
  };
  let openEl = null;
  // ===== Layout: the pane tree (the spine — 009) =====
  // A leaf binds exactly one session (no empty pane, 004 §2): { leaf:true, session, setup, el }
  // — a setup skeleton counts as bound. A split is binary: { leaf:false, dir:'row'|'col', a, b,
  // split } — dir 'row' = side by side, 'col' = stacked; `split` is child a's fraction. The
  // single-pane case is a one-leaf tree, so today's behaviour is the degenerate case. `openEl`
  // mirrors the active pane's session (kept in sync by syncActive) so all the single-session
  // machinery — notifications, ⌘K, browser verbs — keeps reading one "you are here".
  let layout = null, activePane = null;
  const streamTimers = new Set();   // one running-terminal ticker per pane
  // The still-creating branch whose setup skeleton the pane is showing (null = none). Set
  // the instant a create is requested and cleared the moment anything else opens — so a
  // finished checkout resolves in place only while this still points at it (last-intent-wins).
  let setupEl = null;

  // ===== Per-branch layout ownership, persistence & sticky nav (014 / 005) =====
  // Each branch owns exactly one remembered layout. Switching branch stashes the one you leave and
  // restores the target's (workspace-switch reduces to branch-switch — the workspace owns none).
  // `stashedSplit` holds the durable split hidden behind a *transient* full-screen: full-screening a
  // non-member session is a tmux-style view that leaves the split remembered underneath (002/005),
  // and clicking any member returns to it. Persisted to localStorage so the arrangement survives
  // reload; genuine on-disk serialization is a spec point the handoff brief (008) carries.
  const branchLayouts = new Map();   // branchKey -> that branch's remembered layout tree
  let currentBranchKey = null;       // the branch whose layout is on screen
  let stashedSplit = null;           // the durable split held behind a transient full-screen
  const LS_LAYOUTS = 'synth-branch-layouts';
  const durableLayout = () => stashedSplit || layout;   // the remembered layout, ignoring full-screen

  function outerRepoOf(el) {
    let repo = el.closest('[data-repo]');
    while (repo) { const outer = repo.parentElement && repo.parentElement.closest('[data-repo]'); if (!outer) break; repo = outer; }
    return repo;
  }
  function workspaceNameOf(el) {
    const repo = outerRepoOf(el);
    const n = repo && repo.querySelector(':scope > .repo__head .repo__name');
    return n ? n.textContent.trim() : 'project';
  }
  function branchGroupOf(el) {
    const group = el.closest('[data-repo]');
    return group ? group.querySelector(':scope > .branch--group') : null;
  }
  function branchNameOf(el) {
    const g = branchGroupOf(el);
    const n = g && g.querySelector('.branch__name');
    return n ? n.textContent.trim() : 'main';
  }
  // A branch's persistence identity — the sole scope unit (005). Workspace + branch name, so two
  // branches sharing a name across workspaces stay distinct; NUL-joined to never collide on text.
  function branchKeyOf(el) { return workspaceNameOf(el) + '\u0000' + branchNameOf(el); }
  // A split stays within one branch / worktree (003): a session may only join the on-screen layout
  // when it belongs to the branch that owns the surface. The guard the three split routes share —
  // drag-to-split, sidebar pair, and the ⌘⇧+arrow picker. A branchless setup skeleton owns nothing.
  function canJoinLayout(el) { return currentBranchKey != null && branchKeyOf(el) === currentBranchKey; }
  // The header PR chip mirrors the open branch's sidebar PR span: same number, same state
  // colour, clickable through to GitHub in the default browser. Empty when the branch has none.
  function branchPRChipHTML(el) {
    const g = branchGroupOf(el);
    const pr = g && g.querySelector('.branch__pr');
    if (!pr) return '';
    const state = (pr.className.match(/pr--(\w+)/) || [])[1] || 'open';
    return `<a class="prchip pr--${state}" href="#" data-prchip="${pr.dataset.pr}" title="PR #${pr.dataset.pr} · ${state} — open in browser">${pr.querySelector('svg').outerHTML}<span>#${pr.dataset.pr}</span></a>`;
  }

  // exactly one active pill across the whole tree — the active pane's branch group
  function derivePill(el) {
    nav.querySelectorAll('.branch--active').forEach((b) => b.classList.remove('branch--active'));
    const g = el && branchGroupOf(el);
    if (g) g.classList.add('branch--active');
  }

  function stopStream() { streamTimers.forEach((id) => clearInterval(id)); streamTimers.clear(); }

  // ---- Pane-tree helpers ----
  let paneSeq = 0;
  const leafNode  = (session) => ({ leaf: true, id: ++paneSeq, session, setup: null, el: null });

  function eachLeaf(node, fn) { if (!node) return; if (node.leaf) fn(node); else { eachLeaf(node.a, fn); eachLeaf(node.b, fn); } }
  function leafBySession(session) { let hit = null; eachLeaf(layout, (l) => { if (l.session === session) hit = l; }); return hit; }
  function leafInTree(tree, session) { let hit = null; eachLeaf(tree, (l) => { if (l.session === session) hit = l; }); return hit; }
  const isSplit = (tree) => !!(tree && !tree.leaf);
  const firstLeaf = (node) => (node.leaf ? node : firstLeaf(node.a));
  const activePaneEl = () => (activePane && activePane.el) || null;

  // Drop dead leaves (session / setup detached from the DOM) and collapse the split above each
  // — the surviving sibling reflows into the freed space (001). Returns true if it changed.
  function pruneLayout() {

    function walk(node) {

      const a = walk(node.a), b = walk(node.b);
      if (a && b) { node.a = a; node.b = b; return node; }

    }

    if (!layout) { activePane = null; return changed; }

  }

  // Mirror the active pane into the sidebar (the sticky "you are here" tint) + the derived
  // pill, and keep openEl pointing at its session — the DOM-cheap half of activation, no
  // content re-render, so clicking between panes never tears down a live surface.
  function syncActive() {
    nav.querySelectorAll('.session--open').forEach((x) => x.classList.remove('session--open'));
    const leaf = activePane, s = leaf && leaf.session;
    openEl = s || null;
    if (s) {
      s.classList.add('session--open');
      s.classList.remove('session--unread');
      clearNotif(s);
      derivePill(s);
    } else if (leaf && leaf.setup) {
      nav.querySelectorAll('.branch--active').forEach((b) => b.classList.remove('branch--active'));
      leaf.setup.classList.add('branch--active');   // the grayed pending row reads as "you are here"
    } else {

  }

  }
  // Click / keyboard activation — move the focus bar and the sidebar echo to `leaf`, in place.
  function setActivePane(leaf) { activePane = leaf; syncActive(); applyActiveBar(); refreshEchoActive(); }

  // one session pane, the member rows pull together into a bare horizontal band of tiles — in
  // reading order (the tree flattened a-before-b), membership only, never geometry. One pane
  // (today's degenerate case) leaves every row full-width. Rebuilt from the branch's *durable*
  // layout on every render, so the band stays put behind a transient full-screen (014) — a visible
  // "the split is still here", and any member tile clicks straight back into it.
  function renderSidebarEcho() {
    // tear down any prior band — return its tiles to full-width rows, in place
    nav.querySelectorAll('.session-group').forEach((g) => {
      while (g.firstElementChild) {
        const row = g.firstElementChild;
        row.classList.remove('session--tile-min');
        g.parentNode.insertBefore(row, g);
      }
      g.remove();
    });
    const members = [];
    eachLeaf(durableLayout(), (l) => { if (l.session) members.push(l.session); });
    if (members.length < 2) return;
    const band = document.createElement('div');
    band.className = 'session-group';
    members[0].parentNode.insertBefore(band, members[0]);   // sits where the first member lived
    members.forEach((row) => band.appendChild(row));
    refreshEchoActive();
  }
  // Past ~3 members the names stop fitting, so non-active tiles collapse to icon-only (003).
  // Membership and order don't change on activation, so this is the cheap update setActivePane
  // runs — no rebuild, just which tile keeps its name.
  function refreshEchoActive() {
    const band = nav.querySelector('.session-group');
    if (!band) return;
    const tiles = [...band.children], min = tiles.length > 3;
    tiles.forEach((t) => t.classList.toggle('session--tile-min', min && !t.classList.contains('session--open')));
  }

  // Subdivide a leaf: it becomes a binary split of itself + a new pane bound to `session`,
  // which lands active. Mutated in place so parent links survive. This is the model op the
  // gesture layer drives — 010 (content drag-to-split), 012 (sidebar-create) — and the only
  // way a split is born; 009 exercises it through SynthLayout (below) to prove the spine.
  function splitPane(targetLeaf, session, dir, before) {
    if (!targetLeaf || !session) return;
    stashedSplit = null;   // deliberately building a split commits the current view as durable (014)
    const incoming = leafNode(session);
    const kept = leafNode(targetLeaf.session);
    kept.setup = targetLeaf.setup;
    targetLeaf.leaf = false;
    targetLeaf.dir = dir === 'col' ? 'col' : 'row';
    targetLeaf.split = 0.5;
    targetLeaf.a = before ? incoming : kept;
    targetLeaf.b = before ? kept : incoming;
    targetLeaf.session = null; targetLeaf.setup = null; targetLeaf.el = null;
    activePane = incoming;
    renderLayout();
  }

  // Split the whole surface: the entire current tree becomes one child of a fresh root split,
  // the incoming session the other. Rim-drop (010) drives this; splitPane handles per-pane edges.
  function splitRoot(session, dir, before) {
    if (!session || !layout) return;
    stashedSplit = null;   // commits the current view as durable before wrapping it (014)
    const incoming = leafNode(session);
    const kept = layout;
    layout = { leaf: false, dir: dir === 'col' ? 'col' : 'row', split: 0.5,
               a: before ? incoming : kept, b: before ? kept : incoming };
    activePane = incoming;
    renderLayout();
  }

  // Detach one leaf and collapse the split above it — the surviving sibling reflows into the
  // freed space (001). Used to MOVE a session between panes on drop (010); unsplit/close is 013.
  function removeLeaf(target) {
    function walk(node) {
      if (!node) return null;
      if (node.leaf) return node === target ? null : node;
      const a = walk(node.a), b = walk(node.b);
      if (a && b) { node.a = a; node.b = b; return node; }
      return a || b;
    }
    layout = walk(layout);
  }

  // Is this session a member of an on-screen split — i.e. is there something to unsplit it out
  // of? A lone pane (layout is a single leaf) has no split, so Unsplit isn't offered there.
  const inSplit = (session) => !!(layout && !layout.leaf && leafBySession(session));

  // Unsplit (013): the flat route out of a split. Detach the session's leaf, collapse the split
  // above it, and let the surviving sibling reflow (001) — the session drops back to a plain
  // full-width sidebar row. A 2-pane split collapses to one full-screen pane, dissolving the
  // band. Same tree op as a close, minus killing the session. Focus falls to the survivor.
  function unsplitSession(session) {
    if (!inSplit(session)) return;
    removeLeaf(leafBySession(session));
    if (!layout) activePane = null;
    else { let ok = false; eachLeaf(layout, (l) => { if (l === activePane) ok = true; }); if (!ok) activePane = firstLeaf(layout); }
    renderLayout();
  }

  // ===== Keyboard split layer (007) — the chord scheme over the mouse split model =====
  // Pure Mac-native chords, no leader/mode: create (⌘⇧+arrow / ⌘| ⌘—), focus (⌘⌥+arrow / hjkl,
  // ⌘1…9, ⌘`), resize (⌘⌥⇧+arrow), zoom (⌘⇧⏎), unsplit (⌘⇧U). Each drives the same tree ops the

  const paneLeaves = () => { const a = []; eachLeaf(layout, (l) => { if (l.session) a.push(l); }); return a; };

    if (!box) return;

    const childA = seam.previousElementSibling, childB = seam.nextElementSibling;

    childB.style.flex = '1 1 ' + (100 - pct) + '%';

  // ⌘⇧⏎ zoom: a transient, tmux-style full-screen of the active pane over the remembered split
  // (the same stashedSplit mechanism openSession uses, 014) — the band stays echoed in the sidebar,
  // the split isn't persisted away, and toggling restores it with the zoomed pane still focused.
  function toggleZoom() {
    if (!layout) return;

      const back = activePane && activePane.session;
      layout = stashedSplit; stashedSplit = null;
      const leaf = back && leafInTree(layout, back);

      stashedSplit = layout;
      layout = leafNode(activePane.session);
      activePane = layout;
      renderLayout();

  // Subdivide the active pane, binding `session` into the fresh half (dir/before pick the side).
  // An already-open session moves rather than duplicating (drop its old leaf first, 010's rule).
  function splitActiveWith(session, dir, before, target) {
    target = target || activePane;

    const existing = leafBySession(session);

    splitPane(target, session, dir, before);
  }
  // "New …" in the split frame: spawn the session unopened, then bind it into the new pane.
  function splitNew(branchRow, kind, dir, before, target) {
    const el = addSession(branchRow, kind, { open: false });
    splitActiveWith(el, dir, before, target || activePane);
  }
  // The pick-a-session ⌘K frame that fills a keyboard-created pane (007) — the keyboard mirror of

  // already a pane here. A split stays within one branch (003), so creates land on that branch.
  function splitFrame(dir, before) {
    const target = activePane;
    const anchor = target && target.session;
    const br = anchor ? branchGroupOf(anchor) : contextBranch();
    const dword = dir === 'row' ? (before ? 'left' : 'right') : (before ? 'up' : 'down');
    return {
      crumb: 'Split ' + dword, placeholder: 'Split — pick a session…',
      build() {
        const items = [];

          items.push({ sec: 'act', icon: ICON_TERMINAL, label: 'New terminal', kbd: ['⌘', 'T'], enter: () => runAndClose(() => splitNew(br, 'terminal', dir, before, target)) });
          AGENTS.forEach((kk) => items.push({ sec: 'act', icon: AGENT_ICON[kk], label: 'New ' + SESSION_KINDS[kk].name, enter: () => runAndClose(() => splitNew(br, kk, dir, before, target)) }));
          items.push({ sec: 'act', icon: ICON_BROWSER, label: 'New browser', enter: () => runAndClose(() => splitNew(br, 'browser', dir, before, target)) });
        }
        allRows('.session').forEach((s) => {
          if (leafBySession(s)) return;   // already a pane in this layout — nothing to pull in
          if (!canJoinLayout(s)) return;  // a split stays within one branch / worktree (003)
          items.push({ sec: 'list', icon: seIcon(s), label: seName(s), ctx: seCtx(s), meta: seStatus(s), metaState: sessionState(s), enter: () => runAndClose(() => splitActiveWith(s, dir, before, target)) });

  }
  function openSplitPicker(dir, before) {
    if (!activePane || !activePane.session) return;   // no split from a bare setup skeleton
    openPaletteAt(splitFrame(dir, before));
  }

  // Take-me-to-it (002), now branch-aware and sticky (005/014):
  //  • Different branch → stash the branch you leave, restore the target's remembered layout, then
  //    apply the rules below within it (workspace-switch reduces to this — the workspace owns none).
  //  • Target branch has a split, session is a member → return to the split, focus that pane.
  //  • Target branch has a split, session is NOT a member → transient full-screen over the split
  //    (the split stays remembered underneath; a later member click returns to it).
  //  • Target branch has no split → the session is the single pane (degenerate one-leaf case).
  function openSession(el) {
    if (!el) return;
    app.classList.remove('settings');   // jumping to a session leaves settings mode
    setupEl = null;                     // opening a real session revokes any armed setup-resolve
    const bk = branchKeyOf(el);
    if (bk !== currentBranchKey) {       // branch switch: stash the one we leave, load the target's
      if (currentBranchKey != null) branchLayouts.set(currentBranchKey, durableLayout());
      currentBranchKey = bk;
      stashedSplit = null;
      layout = branchLayouts.get(bk) || null;
    }

    if (isSplit(durable)) {
      const member = leafInTree(durable, el);

      else { if (!stashedSplit) stashedSplit = layout; layout = leafNode(el); activePane = layout; } // full-screen

      else { layout = leafNode(el); activePane = layout; }  // else it becomes the (single) pane

  }

  // an async gap. Opening anything else clears setupEl (openSession / enterSettings), so a
  // finished checkout only resolves in place while this still points here.
  function openWorktreeSetup(groupRow) {
    app.classList.remove('settings');
    // the setup skeleton is a transient, branchless view — stash the branch we leave so its
    // remembered layout survives, and don't let the skeleton clobber any branch's entry (014)
    if (currentBranchKey != null) branchLayouts.set(currentBranchKey, durableLayout());
    currentBranchKey = null;

    layout = setupLeaf(groupRow);
    activePane = layout;

  }

  function setupPaneHTML(groupRow) {
    const name = groupRow.querySelector('.branch__name').textContent.trim();
    const ws = workspaceNameOf(groupRow);
    return `<div class="pane__head">
        <div class="pane__title"><span class="session__icon">${ICON_BRANCH}</span><span>${esc(name)}</span></div>
        <div class="pane__crumb"><b>${esc(ws)}</b> / ${esc(name)}</div>
        <div class="pane__spacer"></div>
      </div>
      <div class="pane__body"><div class="pane-setup"><span class="pane-setup__spin"></span><span>Setting up worktree…</span></div></div>`;
  }

  // A session moves to a new derived status: swap its sidebar indicator, re-roll, and
  // surface it if the change happened off-screen (the notification deck below).
  function setSessionState(el, state) {
    const prev = sessionState(el);
    const ind = el.querySelector(':scope > .ind');
    if (ind) ind.outerHTML = IND_HTML[state];
    rollUpGroups();
    notifyOnTransition(el, prev, state);
  }

  // ===== In-app notifications ===============================================
  // A background session (never the open one) that moves to needs-input or error rises as a

    el.classList.add('session--unread');

    if (prev && prev.kind !== kind) {   // kind changed → rebuild the card, don't restyle a stale one

      if (c) { leaveNotif(c); notifCards.delete(el); }

    notifState.set(el, { kind, order: ++notifSeq });

    if (notifState.delete(el)) renderNotifs();

  const NOTIF_RANK = { error: 0, input: 1, done: 2 };
  function notifOrder() {
    return [...notifState.keys()].filter((el) => el !== openEl && document.contains(el)).sort((a, b) => {
      const A = notifState.get(a), B = notifState.get(b);

  function notifWhat(el, kind) {
    const ai = el.dataset.type === 'ai';

    function closeCard() { const c = host.querySelector('.browser__ccard'); if (c) c.remove(); }

  // The header + body a session pane carries (004 §1 — every pane keeps its full header);

  function sessionPaneHTML(el) {

  function renderPane(leaf) {
    const pane = document.createElement('div');

  // Walk the tree into nested split containers; leaves render as panes, siblings divided by
  // a static seam. Child sizes ride on inline flex so 011 can later drive them by drag.
  function renderNode(node) {
    if (node.leaf) return renderPane(node);
    const box = document.createElement('div');
    box.className = 'split split--' + node.dir;
    box._node = node;   // 007: keyboard resize finds the split box to measure the floor against

    const fa = Math.round((node.split == null ? 0.5 : node.split) * 10000) / 100;

    b.style.flex = '1 1 ' + (100 - fa) + '%';

    seam.className = 'pane-seam pane-seam--' + node.dir;
    seam._node = node;   // 011: the seam drags this split node's fraction
    box.append(a, seam, b);
    return box;
  }

  // Wire each leaf's live surface, scoped to its own pane element (never content-wide — a
  // second browser/composer must not steal the first's controls). Active pane wired last so
  // the shared singletons (browserCommentAPI) reflect it.
  function wirePanes() {
    const leaves = []; eachLeaf(layout, (l) => leaves.push(l));
    leaves.sort((x, y) => (x === activePane ? 1 : 0) - (y === activePane ? 1 : 0));
    leaves.forEach((leaf) => {
      if (leaf.setup || !leaf.el || !leaf.session) return;
      const el = leaf.session, type = el.dataset.type || 'terminal', state = sessionState(el);

      else if (type === 'browser') wireBrowser(el, leaf.el);
      else if (type === 'terminal' && state === 'run' && !reduceMotion) startStream(leaf.el);

  // ---- Persistence (014) — simulate on-disk per-branch layouts via localStorage (005) ----
  // A session's stable identity across reload: branch + name (+ occurrence for the rare name clash).
  // The static sidebar rebuilds identically on reload, so this key resolves back to the same row;
  // a session that's since vanished (runtime-spawned, closed, renamed) simply won't resolve, which
  // is exactly the missing-session collapse path (005 / 004 §2).
  function sessionKey(el) {
    if (!el || !el.matches('[data-session]')) return null;
    const repo = el.closest('[data-repo]');
    if (!repo) return null;
    const nameOf = (s) => { const n = s.querySelector('.session__name'); return n ? n.textContent.trim() : ''; };
    const nm = nameOf(el);
    const same = [...repo.querySelectorAll('[data-session]')].filter((s) => nameOf(s) === nm);
    return branchKeyOf(el) + '\u0000' + nm + '#' + Math.max(0, same.indexOf(el));

  }
  // Tree ⇄ JSON. Leaves serialize to a session key; a setup skeleton or a now-detached session
  // serializes to null and the split above it collapses — same reflow a live close takes (001).
  function layoutToJSON(tree) {
    if (!tree) return null;
    if (tree.leaf) {
      if (!tree.session || !document.contains(tree.session)) return null;
      const k = sessionKey(tree.session);
      return k ? { s: k } : null;
    }
    const a = layoutToJSON(tree.a), b = layoutToJSON(tree.b);
    if (a && b) return { d: tree.dir, f: tree.split, a, b };
    return a || b;   // a child dropped out → collapse to the survivor
  }
  function layoutFromJSON(j) {
    if (!j) return null;

    return a || b;

  // Serialize every branch's durable layout (the current branch's is kept fresh by renderLayout).
  function persist() {
    try {
      const branches = {};
      branchLayouts.forEach((tree, bk) => { const j = layoutToJSON(tree); if (j) branches[bk] = j; });
      localStorage.setItem(LS_LAYOUTS, JSON.stringify({ v: 1, cur: currentBranchKey, branches }));
    } catch (e) {}
  }
  // Keep the branch registry in step with the on-screen layout, then persist — the one choke point
  // every mutation flows through (all layout ops end in renderLayout). A lone setup skeleton is
  // branchless and transient, so it never overwrites a real branch entry.
  function syncBranchLayout() {
    if (currentBranchKey == null) { persist(); return; }
    const d = durableLayout();
    if (d && d.leaf && d.setup) { persist(); return; }
    if (d) branchLayouts.set(currentBranchKey, d);
    else branchLayouts.delete(currentBranchKey);
    persist();
  }
  // Rebuild the branch registry from localStorage and restore the branch that was on screen. Returns
  // true if it painted a layout (so boot skips its default open). Missing sessions collapse (005).
  function hydrateLayouts() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(LS_LAYOUTS) || 'null'); } catch (e) {}
    if (!saved || !saved.branches) return false;
    buildKeyIndex();
    Object.keys(saved.branches).forEach((bk) => { const t = layoutFromJSON(saved.branches[bk]); if (t) branchLayouts.set(bk, t); });
    const cur = saved.cur;
    if (cur && branchLayouts.has(cur)) {
      currentBranchKey = cur;
      stashedSplit = null;
      layout = branchLayouts.get(cur);
      activePane = firstLeaf(layout);
      renderLayout();
      return true;
    }
    return false;
  }

  // Render the whole pane tree into .content. The single-pane case is one leaf → identical
  // to the old renderOpen output. Callers mutate layout/activePane, then call this.
  function renderLayout() {
    stopStream();

    pruneLayout();

    content.appendChild(renderNode(layout));

    applyActiveBar();
    renderSidebarEcho();

  // running terminals feel alive: a fresh log line trickles into each running pane every

  function startStream(scope) {
    const term = scope.querySelector('[data-term]');
    if (!term) return;
    let i = 0;
    const id = setInterval(() => {
      if (!document.contains(term)) { clearInterval(id); streamTimers.delete(id); return; }
      const div = document.createElement('div');
      div.className = 'term__ln dim';
      div.textContent = `  12:0${5 + (i % 4)}:${(12 + i * 7) % 60} [vite] ${STREAM_MSGS[i % STREAM_MSGS.length]}`;
      term.appendChild(div);
      while (term.children.length > 200) term.removeChild(term.firstChild);
      term.scrollTop = term.scrollHeight;
      i++;
    }, 2600);
    streamTimers.add(id);
  }

  // --- Keyboard-first navigation ---
  let selEl = null;

  function treeRows() {
    // A tree row is navigable only if it's actually on screen. A collapsed accordion
    // hides its rows — except a focus peek, where the closed accordion still reveals the
    // open session's path (the folded-away rows go display:none, caught by offsetParent).
    return [...nav.querySelectorAll('[data-row]')].filter((row) => {
      if (row.offsetParent === null) return false; // folded away inside a peek
      let p = row.parentElement;
      while (p && p !== nav) {
        if (p.classList.contains('collapse') &&
            !p.closest('[data-repo]').classList.contains('repo--open') &&
            !p.querySelector('.session--open')) {
          return false;
        }
        p = p.parentElement;
      }
      return true;
    });
  }

  // The single list the keyboard cursor walks. In the main view it's the tree
  // followed by the Settings foot button — so ↓/j off the last worktree leaf
  // flows straight into Settings. In Settings it's the scope list (Back + scopes).
  // One list means every nav keybinding works identically on both screens.
  function activeRows() {
    if (app.classList.contains('settings')) {
      return [...settingsNav.querySelectorAll('.settings-back, .scope')];
    }
    return [...treeRows(), document.getElementById('openSettings')];
  }
  // Where the cursor rests when nothing is explicitly selected: the open session
  // in the tree, or the active scope in Settings.
  function currentRow(rows) {
    if (app.classList.contains('settings')) return settingsNav.querySelector('.scope--on');
    return openEl && rows.includes(openEl) ? openEl : null;
  }
  // rows that own the create/rename/delete verbs — the tree only (you can't
  // rename Settings or a scope). Guards a/r/d against the shared cursor landing there.
  const isTreeRow = (el) => !!(el && el.closest && el.closest('#nav'));

  function select(el, scroll) {
    if (selEl) selEl.classList.remove('sel');
    selEl = el;
    if (el) {
      el.classList.add('sel');
      if (scroll) el.scrollIntoView({ block: 'nearest' });
    }
  }

  function move(dir) {
    const rows = activeRows();
    if (!rows.length) return;
    // no explicit selection yet → step relative to the current row (open session / active scope)
    const from = selEl && rows.includes(selEl) ? selEl : currentRow(rows);
    let i = from ? rows.indexOf(from) : -1;
    i = Math.max(0, Math.min(rows.length - 1, i + dir));
    select(rows[i], true);
  }

  // Activate the row under the cursor — the shared ↵/click action, dispatched by row kind.
  function activateRow(row) {
