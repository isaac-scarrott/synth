    const i = sibs.indexOf(unit), j = i + dir;
    if (i < 0 || j < 0 || j >= sibs.length) return;   // already at an edge — no wrap
    const firsts = [...container.children].map((el) => [el, el.getBoundingClientRect().top]);   // FLIP: capture
    if (dir > 0) container.insertBefore(sibs[j], unit);   // hop the next sibling above us
    else container.insertBefore(unit, sibs[j]);           // slot in above the previous sibling
    if (lvl === 'session') snapOwned(container);          // owned rows follow their owner
    if (!reduceMotion) {
      for (const [el, top] of firsts) {
        const dy = top - el.getBoundingClientRect().top;
        if (!dy) continue;
        el.style.transition = 'none';
        el.style.transform = `translateY(${dy}px)`;
        requestAnimationFrame(() => {
          el.style.transition = 'transform 180ms var(--ease-out)';
          el.style.transform = '';
          el.addEventListener('transitionend', () => { el.style.transition = ''; el.style.transform = ''; }, { once: true });
        });
      }
    }
    select(row, true);   // keep the cursor on the row you moved, and in view
  }
  // the editable label for a row, and an in-place rename that keeps the open pane in sync
  function nameElOf(row) {
    const lvl = rowLevel(row);
    return row.querySelector(lvl === 'repo' ? '.repo__name' : lvl === 'branch' ? '.branch__name' : '.session__name');
  }
  function renameUnit(row, name) {
    const el = nameElOf(row);
    if (!el) return;
    el.textContent = name;
    const leaf = row.matches('.session') ? leafBySession(row) : null;
    if (leaf && leaf.el) {
      const t = leaf.el.querySelector('.pane__title span:last-child');
      if (t) t.textContent = name;
    }
  }

  // Inline rename from the keyboard: r on the selected row edits its name in place.
  // ↵ commits (through renameUnit, so the open pane stays in sync), Esc reverts, blur commits.
  function startRename(row) {
    if (!row) return;
    const el = nameElOf(row);
    if (!el || el.isContentEditable) return;
    closeMenu();
    const prev = (el.textContent || '').trim();
    el.setAttribute('contenteditable', 'plaintext-only');
    el.classList.add('renaming');
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    let done = false;
    const finish = (commit) => {
      if (done) return; done = true;
      el.removeEventListener('keydown', onKey);
      el.removeEventListener('blur', onBlur);
      el.removeAttribute('contenteditable');
      el.classList.remove('renaming');
      const val = (el.textContent || '').replace(/\s+/g, ' ').trim();
      renameUnit(row, commit && val ? val : prev);
    };
    const onKey = (ev) => {
      ev.stopPropagation();                       // typing must not reach the sidebar nav handler
      if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
      else if (ev.key === 'Escape') { ev.preventDefault(); finish(false); }
    };
    const onBlur = () => finish(true);
    el.addEventListener('keydown', onKey);
    el.addEventListener('blur', onBlur);
  }

  // Close/remove the selected row from the keyboard — always through the ⌘K confirm frame,
  // so a single keystroke can't destroy anything — ↵ confirms, Esc cancels.
  function requestDelete(row) {
    if (!row) return;
    openPaletteAt(confirmFrame(row));
  }

  function addKebab(row) {
    const k = document.createElement('span');
    k.className = 'kebab';
    k.setAttribute('role', 'button');
    k.setAttribute('aria-label', 'Actions');
    k.innerHTML = ICON_DOTS;
    k.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); openRowActions(row); });
    row.appendChild(k);
  }

  let openMenuEl = null, openMenuRow = null;
  function closeMenu() {
    if (openMenuEl) { const m = openMenuEl; m.classList.remove('open'); setTimeout(() => m.remove(), 160); openMenuEl = null; }
    if (openMenuRow) { openMenuRow.classList.remove('menu-open'); openMenuRow = null; }
  }

  function removeUnit(unit) {
    if (!unit) return;
    // Containment cascade (ADR-0011 stage four): an owning claude row's browsers
    // live and die with it — the close confirm names them before this runs.
    if (unit.matches && unit.matches('.session[data-sid]')) ownedOf(unit).forEach(removeUnit);
    // If the keyboard cursor is on (or inside) the removed unit it falls back up the
    // hierarchy — session → its branch row, branch → its workspace head — instead of
    // resetting; a removed top-level workspace falls to a neighbouring workspace.
    let fallback = null;
    if (selEl && unit.contains(selEl)) {
      const up = unit.parentElement && unit.parentElement.closest('[data-repo]');
      const neighbour = up ? null : [unit.previousElementSibling, unit.nextElementSibling].find((el) => el && el.matches('[data-repo]'));
      fallback = (up || neighbour) ? (up || neighbour).querySelector(':scope > [data-row]') : null;
    }
    unit.classList.add('row-exit');
    const done = () => {
      unit.remove(); rollUpGroups();
      if (setupEl && !document.contains(setupEl)) setupEl = null;
      // a deleted session's pane collapses; its sibling reflows (001) — no guard (005)
      if (pruneLayout()) renderLayout();
      if (fallback && document.contains(fallback)) select(fallback, true);
    };
    unit.addEventListener('animationend', done, { once: true });
    setTimeout(done, 260);
  }

  // Mock "git branch" discovery — stands in for the native app's real GitService.
  // `worktree: true` = already checked out somewhere (the repo root for main).
  const FAKE_BRANCHES = [
    { name: 'main', age: '2h', worktree: true },
    { name: 'feat/onboarding', age: '5h' },
    { name: 'fix/login-redirect', age: '3d' },
    { name: 'chore/deps', age: '1w' },
  ];

  // Remote-tracking branches on origin that aren't checked out locally — the extra
  // reach the ⌘K worktree picker searches (git branch -a). Kept out of the
  // local-only flows (add-workspace picker, kebab dialog) so those are unchanged.
  const FAKE_REMOTE_BRANCHES = [
    { name: 'feat/billing', age: '4h' },
    { name: 'feat/search-v2', age: '1d' },
    { name: 'fix/webhook-retry', age: '2d' },
    { name: 'chore/ci-cache', age: '3d' },
    { name: 'experiment/new-nav', age: '6d' },
    { name: 'release/0.4', age: '1w' },
  ];
  const ALL_BRANCHES = [
    ...FAKE_BRANCHES.map((b) => ({ name: b.name, age: b.age, remote: false })),
    ...FAKE_REMOTE_BRANCHES.map((b) => ({ name: b.name, age: b.age, remote: true })),
  ];

  // Branch names can't contain spaces — inputs that name a new branch turn each
  // space into a dash as you type (leading whitespace dropped, runs collapsed).
  const dashSpaces = (s) => s.replace(/^\s+/, '').replace(/\s+/g, '-');
  function dashSpacesOnInput(input) {
    const v = dashSpaces(input.value);
    if (v === input.value) return;
    const pos = Math.max(0, input.selectionStart - (input.value.length - v.length));
    input.value = v;
    input.setSelectionRange(pos, pos);
  }

  // Every branch is a group shell (chevron + empty sessions) so indentation is uniform.
  function branchGroupShell(name, activity) {
    const wrapper = document.createElement('div');
    wrapper.className = 'repo';
    wrapper.setAttribute('data-repo', '');
    wrapper.innerHTML = `<a class="row branch branch--group" data-row data-toggle data-group data-activity="${esc(activity)}">
        <span class="chev">${ICON_CARET}</span>
        <span class="branch__name">${esc(name)}</span>
        <span class="branch__roll"></span>
      </a>
      <div class="collapse"><div class="collapse__inner"><div class="sessions"></div></div></div>`;
    return wrapper;
  }

  function addBranch(repo, name) {
    repo.classList.add('repo--open');
    const branches = repo.querySelector('.branches');
    const wrapper = branchGroupShell(name, 'now');
    wrapper.classList.add('row-enter');
    const groupRow = wrapper.querySelector('.branch--group');
    // The checkout runs in the background: the row lands at once — grayed, a small arc
    // spinning where its roll-up will go — and the pane switches now (riding the create)
    // to the setup skeleton, instead of waiting on the async checkout to yank it later.
    groupRow.classList.add('branch--pending');
    groupRow.querySelector('.branch__roll').innerHTML = '<span class="wt-spinner"></span>';
    branches.appendChild(wrapper);
    wrapper.querySelectorAll('[data-row]').forEach(addKebab);
    rollUpGroups();
    wrapper.addEventListener('animationend', () => wrapper.classList.remove('row-enter'), { once: true });
    openWorktreeSetup(groupRow);

    const wsName = repo.querySelector('.repo__name')?.textContent || '';
    // Simulated `git worktree add`: when it lands, spawn the scope's effective template in
    // creation order. Resolve in place — first session opens — only while the user is still
    // parked on this skeleton (last-intent-wins); if they moved on, don't touch the viewport:
    // announce the ready worktree with the quiet unread bullet (the agent-browser idiom).
    setTimeout(() => {
      groupRow.classList.remove('branch--pending');
      groupRow.querySelector('.branch__roll').innerHTML = '';
      const watching = setupEl === groupRow;
      const tpl = effectiveTpl(false, wsName);
      if (watching && tpl.length === 0) { setupEl = null; renderEmpty(); return; }  // start bare
      tpl.forEach((s, i) => addSession(groupRow, s.kind, { name: s.name, open: watching && i === 0 }));
      if (!watching) {
        const first = wrapper.querySelector('.session');
        if (first) first.classList.add('session--unread');
      }
    }, 1200);
  }

  // Promote a plain branch into a session-holding group if needed, return its .sessions
  function ensureGroup(branchRow) {
    if (branchRow.classList.contains('branch--group')) {
      const repo = branchRow.closest('[data-repo]');
      repo.classList.add('repo--open');
      return repo.querySelector('.sessions');
    }
    const branches = branchRow.parentNode;
    const wrapper = document.createElement('div');
    wrapper.className = 'repo repo--open';
    wrapper.setAttribute('data-repo', '');
    branches.insertBefore(wrapper, branchRow);

    branchRow.classList.add('branch--group');
    branchRow.setAttribute('data-toggle', '');
    branchRow.setAttribute('data-group', '');
    const metaEl = branchRow.querySelector('.branch__meta');
    branchRow.dataset.activity = metaEl ? metaEl.textContent : 'now';
    if (metaEl) metaEl.remove();

    const chev = document.createElement('span'); chev.className = 'chev'; chev.innerHTML = ICON_CARET;
    branchRow.insertBefore(chev, branchRow.firstChild);
    const roll = document.createElement('span'); roll.className = 'branch__roll';
    branchRow.insertBefore(roll, branchRow.querySelector('.kebab') || null);

    const collapse = document.createElement('div'); collapse.className = 'collapse';
    const inner = document.createElement('div'); inner.className = 'collapse__inner';
    const sessions = document.createElement('div'); sessions.className = 'sessions';
    inner.appendChild(sessions); collapse.appendChild(inner);
    wrapper.appendChild(branchRow); wrapper.appendChild(collapse);
    return sessions;
  }

  // A new session is one of two kinds. Claude Code is just a terminal that opened
  // and ran `claude`, so both spawn identically — only the type, icon, name and
  // starting state differ.
  const SESSION_KINDS = {
    terminal: { type: 'terminal', name: 'shell',       icon: `<span class="session__icon">${ICON_TERMINAL}</span>`,                  ind: 'idle' },
    claude:   { type: 'ai',       name: 'Claude Code', icon: `<span class="session__icon session__icon--ai">${ICON_CLAWD}</span>`, ind: 'work' },
    opencode: { type: 'ai',       name: 'OpenCode',    icon: `<span class="session__icon">${ICON_OPENCODE}</span>`,                   ind: 'work' },
    browser:  { type: 'browser',  name: 'Browser',     icon: `<span class="session__icon">${ICON_BROWSER}</span>`,                   ind: 'idle' },
  };
  // opts: a template spawn passes its entry name, and { open: false } for every session
  // after the first — those wait idle (their process starts on first open), so only the
  // opened one carries its kind's fresh indicator.
  function addSession(branchRow, kind, opts = {}) {
    const spec = SESSION_KINDS[kind];
    const sessions = ensureGroup(branchRow);
    const a = document.createElement('a');
    a.className = 'row session row-enter';
    a.setAttribute('data-row', '');
    a.setAttribute('data-session', '');
    a.setAttribute('data-type', spec.type);
    if (spec.type === 'ai') a.setAttribute('data-agent', kind);
    a.innerHTML = `<span class="session__bullet"></span>
      ${spec.icon}
      <span class="session__name">${esc(opts.name || spec.name)}</span>
      ${IND_HTML[opts.open === false ? 'idle' : spec.ind]}`;
    addKebab(a);
    sessions.appendChild(a);
    a.addEventListener('animationend', () => a.classList.remove('row-enter'), { once: true });
    rollUpGroups();
    if (opts.open !== false) openSession(a); // a freshly spawned session opens straight into the content pane
    return a;   // 007: the split-create frame keeps the new row to bind it into a fresh pane
  }
  const addTerminal = (branchRow) => addSession(branchRow, 'terminal');
  // Every coding agent Synth can host, in creation order (Agents.swift AgentRegistry).
  const AGENTS = ['claude', 'opencode'];
  // Each agent's own mark. An agent with no artwork falls back to the generic sparkle.
  const AGENT_ICON = { claude: ICON_CLAWD, opencode: ICON_OPENCODE };
  const agentIcon = (k) => AGENT_ICON[k] || ICON_AI;
  const addAgent    = (branchRow, kind) => addSession(branchRow, kind);
  const addBrowser  = (branchRow) => addSession(branchRow, 'browser');

  // ===== Add workspace (the + on the section header) =====
  const CHIP_COLORS = ['#7569b5', '#477b90', '#7b773d', '#3e7e74', '#ad587f', '#a158ad'];
  let workspaceSeq = nav.querySelectorAll(':scope > [data-repo]').length;

  // Every branch row maps to a real worktree folder (ADR-0007), so a workspace is
  // added with exactly the branches the user picked — collapsed, count = picked.
  function addWorkspace(pathOrName, cands) {
    const name = (pathOrName.split('/').filter(Boolean).pop() || pathOrName).trim();
    const color = CHIP_COLORS[workspaceSeq++ % CHIP_COLORS.length];
    const rows = cands || [];
    const repo = document.createElement('div');
    repo.className = 'repo row-enter';
    repo.setAttribute('data-repo', '');
    repo.innerHTML = `<button class="row repo__head" data-row data-toggle>
        <span class="chev">${ICON_CARET}</span>
        <span class="repo__chip" style="--c:${color}">${name[0] ? name[0].toUpperCase() : '?'}</span>
        <span class="repo__name">${name}</span>
        <span class="repo__count">${rows.length}</span>
      </button>
      <div class="collapse"><div class="collapse__inner">
        <div class="branches">${rows.map((c) => `
          <div class="repo" data-repo>
            <a class="row branch branch--group" data-row data-toggle data-group data-activity="${esc(c.age)}">
              <span class="chev">${ICON_CARET}</span>
              <span class="branch__name">${esc(c.name)}</span>
              <span class="branch__roll"></span>
            </a>
            <div class="collapse"><div class="collapse__inner"><div class="sessions"></div></div></div>
          </div>`).join('')}
        </div>
      </div></div>`;
    nav.appendChild(repo);
    repo.querySelectorAll('[data-row]').forEach(addKebab);
    rollUpGroups();
    repo.addEventListener('animationend', () => repo.classList.remove('row-enter'), { once: true });
  }

  // Step 2 of adding a workspace: pick which branches to show. Pre-checked rows
  // already have a worktree (reused); other checked rows get one created on Add.
  // Keyboard-first like the tree: ↑/↓ move, Space toggles, Enter adds, Esc cancels.
  const ICON_CHECK = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg>';
  function openWorktreePicker(pathOrName) {
    const name = (pathOrName.split('/').filter(Boolean).pop() || pathOrName).trim();
    const cands = FAKE_BRANCHES;
    const checked = cands.map((c) => !!c.worktree);
    let cur = 0;

    const backdrop = document.createElement('div');
    backdrop.className = 'backdrop';
    backdrop.innerHTML = `<div class="dialog" role="dialog" aria-label="Add worktrees">
      <div class="dialog__title">Add worktrees — ${esc(name)}</div>
      <div class="wtlist">${cands.map((c, i) => `
        <div class="wtrow" data-i="${i}">
          <span class="wtcheck">${ICON_CHECK}</span>
          <span class="wtrow__name">${esc(c.name)}</span>
          <span class="wtrow__age">${esc(c.age)}</span>
          <span class="wtrow__tag"></span>
        </div>`).join('')}</div>
      <div class="dialog__actions">
        <span class="dialog__btn" data-d="cancel">Cancel</span>
        <span class="dialog__btn dialog__btn--primary" data-d="create">Add</span>
      </div></div>`;
    document.body.appendChild(backdrop);
    requestAnimationFrame(() => backdrop.classList.add('open'));

    const rows = [...backdrop.querySelectorAll('.wtrow')];
    const addBtn = backdrop.querySelector('[data-d="create"]');
    const paint = () => {
      rows.forEach((r, i) => {
        r.classList.toggle('on', checked[i]);
        r.classList.toggle('cur', i === cur);
        r.querySelector('.wtrow__tag').textContent =
          cands[i].worktree ? 'has worktree' : (checked[i] ? 'will create' : '');
      });
      const n = checked.filter(Boolean).length;
      addBtn.textContent = 'Add ' + n;
      addBtn.classList.toggle('is-disabled', !n);
    };
    paint();

    const close = () => { backdrop.classList.remove('open'); setTimeout(() => backdrop.remove(), 200); document.removeEventListener('keydown', onKey, true); };
    const submit = () => {
      const picked = cands.filter((_, i) => checked[i]);
      if (!picked.length) return;
      addWorkspace(pathOrName, picked);
      close();
    };
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) return close();
      const r = e.target.closest('.wtrow');
      if (r) { cur = +r.dataset.i; checked[cur] = !checked[cur]; paint(); return; }
      const b = e.target.closest('.dialog__btn'); if (!b) return;
      if (b.dataset.d === 'cancel') close(); else submit();
    });
    function onKey(e) {
      const k = e.key;
      if (k === 'Escape') { e.preventDefault(); e.stopPropagation(); close(); }
      else if (k === 'ArrowDown') { e.preventDefault(); e.stopPropagation(); cur = Math.min(cur + 1, cands.length - 1); paint(); }
      else if (k === 'ArrowUp') { e.preventDefault(); e.stopPropagation(); cur = Math.max(cur - 1, 0); paint(); }
      else if (k === ' ') { e.preventDefault(); e.stopPropagation(); checked[cur] = !checked[cur]; paint(); }
      else if (k === 'Enter') { e.preventDefault(); e.stopPropagation(); submit(); }
    }
    document.addEventListener('keydown', onKey, true);   // capture: the picker owns the keyboard
  }

  function openWorkspaceDialog() {
    const backdrop = document.createElement('div');
    backdrop.className = 'backdrop';
    backdrop.innerHTML = `<div class="dialog" role="dialog" aria-label="Add project">
      <div class="dialog__title">Add project</div>
      <div class="field"><label>Repository</label>
        <input id="wsPath" placeholder="~/code/my-repo" autocomplete="off" spellcheck="false"></div>
      <div class="dialog__actions">
        <span class="dialog__btn" data-d="cancel">Cancel</span>
        <span class="dialog__btn dialog__btn--primary is-disabled" data-d="create">Next</span>
      </div></div>`;
    document.body.appendChild(backdrop);
    requestAnimationFrame(() => backdrop.classList.add('open'));
    const input = backdrop.querySelector('#wsPath');
    const addBtn = backdrop.querySelector('[data-d="create"]');
    setTimeout(() => input.focus(), 60);
    input.addEventListener('input', () => addBtn.classList.toggle('is-disabled', !input.value.trim()));
    const close = () => { backdrop.classList.remove('open'); setTimeout(() => backdrop.remove(), 200); document.removeEventListener('keydown', onKey); };
    const submit = () => { const v = input.value.trim(); if (!v) return; close(); openWorktreePicker(v); };
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) return close();
      const b = e.target.closest('.dialog__btn'); if (!b) return;
      if (b.dataset.d === 'cancel') close(); else submit();
    });
    function onKey(e) { if (e.key === 'Escape') close(); else if (e.key === 'Enter') { e.preventDefault(); submit(); } }
    document.addEventListener('keydown', onKey);
  }
  document.getElementById('addWorkspace').addEventListener('click', openWorkspaceDialog);

  // --- Drag-to-reorder: change a session / worktree / workspace's priority ---
  // Each row reorders only within its own sibling list (sessions in a worktree,
  // worktrees in a repo, workspaces in the tree). The native app persists the order.
  (function enableReorder() {
    const THRESH = 5;               // px of travel before a press becomes a drag
    let start = null, clone = null, active = false, suppress = false, scrollRAF = 0;
    // Content drag-to-split (010): once a dragged sidebar session crosses into .content the
    // reorder hands off to drop-zone mode — the sidebar row freezes and a single highlight
    // tracks the resulting region until the drop lands the split/replace/rim op.
    const MIN_W = 360, MIN_H = 240;   // min-pane floor (001) — drops below it are refused
    const RIM = 16, EDGE = 0.3;       // outer-rim band (px) · edge-zone reach (fraction)
    let dzEl = null, dzMode = false, dzRes = null;
    let pairMode = false, pairTarget = null;   // dragging one session squarely onto another (012)
    let lineEl = null;                         // the reorder insertion line

    function paintLine(x, y, w) {
      if (!lineEl) { lineEl = document.createElement('div'); lineEl.className = 'drop-line'; document.body.appendChild(lineEl); }
      lineEl.style.left = x + 'px'; lineEl.style.top = y + 'px'; lineEl.style.width = w + 'px';
    }
    const hideLine = () => { if (lineEl) { lineEl.remove(); lineEl = null; } };

    // The unit a row drags as, and the CSS selector its siblings share.
    function dragUnit(row) {
      const lvl = rowLevel(row);
      // owned rows aren't draggable (contained); non-owned sessions slot between blocks only
      if (lvl === 'session') return row.dataset.owner ? null : { unit: row, sel: '.session:not([data-owner])' };
      if (lvl === 'branch' || lvl === 'repo') {
        const u = row.closest('[data-repo]');
        return u ? { unit: u, sel: '[data-repo]' } : null;
      }
      return null;
    }
    const sibs = (container, sel) => [...container.children].filter((el) => el.matches(sel));

    nav.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      const row = e.target.closest('[data-row]');
      if (!row || e.target.closest('.kebab')) return;
      const info = dragUnit(row);
      if (!info) return;
      const r = row.getBoundingClientRect();
      start = { row, unit: info.unit, sel: info.sel, container: info.unit.parentNode,
                x: e.clientX, y: e.clientY, offX: e.clientX - r.left, offY: e.clientY - r.top, w: r.width };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp, { once: true });
    });

    function begin() {
      active = true;
      // a session that starts the drag inside the on-screen split can be pulled OUT of it (013):
      // a plain sidebar drop (not a content split, not a pair) unsplits it back to a lone row.
      start.wasMember = start.sel.startsWith('.session') && inSplit(start.row);
      document.body.classList.add('dragging');
      clone = start.row.cloneNode(true);
      clone.classList.add('drag-clone');
      clone.classList.remove('sel');
      const k = clone.querySelector('.kebab'); if (k) k.remove();
      clone.style.width = start.w + 'px';
      moveClone(start.x, start.y);
      document.body.appendChild(clone);
      start.unit.classList.add('drag-src');
    }
    const moveClone = (x, y) => { clone.style.left = (x - start.offX) + 'px'; clone.style.top = (y - start.offY) + 'px'; };

    function onMove(e) {
      if (!start) return;
      if (!active) {
        if (Math.abs(e.clientX - start.x) < THRESH && Math.abs(e.clientY - start.y) < THRESH) return;
        begin();
      }
      moveClone(e.clientX, e.clientY);
      // A dragged session over the content area splits panes instead of reordering (010).
      if (start.sel.startsWith('.session') && overContent(e.clientX, e.clientY)) {
        if (pairMode) clearPair();
        hideLine(); start.dropRef = undefined;
        dzMode = true;
        dzRes = computeDrop(e.clientX, e.clientY);
        if (dzRes) paintDZ(dzRes); else hideDZ();
        return;
      }
      if (dzMode) { dzMode = false; dzRes = null; hideDZ(); }
      // Over the sidebar: dropping squarely onto another session pairs the two into a split — the
      // second create route (012). A row's centre pairs; its top/bottom edges stay reorder territory.
      if (start.sel.startsWith('.session')) {
        const pt = pairTargetAt(e.clientX, e.clientY);
        if (pt) { pairMode = true; markPair(pt); hideLine(); start.dropRef = undefined; return; }
        clearPair();
      }
      updateDropLine(e.clientY);
      autoscroll(e.clientY);
    }

    // The list holds still while dragging; a copper insertion line marks the slot the release
    // will land in — before the first sibling whose vertical midpoint is below the pointer,
    // or at the list's end. dropRef: undefined = no move (line hidden — the faded source row
    // already marks that slot), an element = insert before it, null = append.
    function updateDropLine(y) {
      const items = sibs(start.container, start.sel).filter((el) => el !== start.unit);
      let ref = null;
      for (const el of items) {
        const b = el.getBoundingClientRect();
        if (y < b.top + b.height / 2) { ref = el; break; }
      }
      // the item currently following the source IN THE LIST (owned rows may sit between) —
      // landing there is a no-op once snapOwned reunites owner blocks
      const next = items.find((el) => start.unit.compareDocumentPosition(el) & Node.DOCUMENT_POSITION_FOLLOWING) || null;
      if (!items.length || ref === next) {
        start.dropRef = undefined; hideLine(); return;
      }
      start.dropRef = ref;
      const r = (ref || items[items.length - 1]).getBoundingClientRect();
      paintLine(r.left + 4, (ref ? r.top : r.bottom) - 1, r.width - 8);
    }

    function onUp() {
      window.removeEventListener('pointermove', onMove);
      cancelAnimationFrame(scrollRAF);
      if (active) {
        suppress = true;                       // swallow the click this drag would otherwise fire
        if (clone) { clone.remove(); clone = null; }
        hideLine();
        start.unit.classList.remove('drag-src');
        document.body.classList.remove('dragging');
        if (dzMode) {
          const res = dzRes;
          dzMode = false; dzRes = null; hideDZ();
          if (res && !res.refuse) performDrop(res);
        } else if (pairMode) {
          const t = pairTarget;
          clearPair();
          if (t) performPair(t);
        } else {
          // land the reorder the insertion line promised (the list never moved mid-drag)
          if (start.dropRef !== undefined) {
            flip(() => start.container.insertBefore(start.unit, start.dropRef));
          }
          if (start.sel.startsWith('.session')) {
            snapOwned(start.container);          // reunite owner blocks
            // a split tile dragged out into the plain sidebar leaves the split (013); otherwise
            // just re-assert any open echo snapOwned may have disturbed.
            if (start.wasMember && inSplit(start.row)) unsplitSession(start.row);
            else renderSidebarEcho();
          }
        }
        clearPair();                           // never leave a pair highlight behind
        select(start.row);                     // keep selection on the row you moved
        active = false;
      }
      start = null;
    }

    // ---- Drop-zone geometry & painting (010) ----
    const overContent = (x, y) => {
      const r = content.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    };
    const paneUnder = (x, y) => { const h = document.elementFromPoint(x, y); return h ? h.closest('.pane') : null; };

    function paintDZ(res) {
      if (!dzEl) { dzEl = document.createElement('div'); document.body.appendChild(dzEl); }
      dzEl.className = 'dz dz--' + (res.refuse ? 'refuse' : res.kind);
      const b = res.rect;
      dzEl.style.left = b.left + 'px'; dzEl.style.top = b.top + 'px';
      dzEl.style.width = b.w + 'px'; dzEl.style.height = b.h + 'px';
    }
    const hideDZ = () => { if (dzEl) { dzEl.remove(); dzEl = null; } };

    // Would a root-level split on `dir` push the incoming pane or any existing pane below the
    // floor? (Rim splits the whole surface, so every pane on that axis halves — 001.)
    function rimRefused(dir) {
      const cr = content.getBoundingClientRect();
      const panes = [...content.querySelectorAll('.pane')];
      if (dir === 'row') return cr.width / 2 < MIN_W || panes.some((p) => p.getBoundingClientRect().width / 2 < MIN_W);
      return cr.height / 2 < MIN_H || panes.some((p) => p.getBoundingClientRect().height / 2 < MIN_H);
    }

    // Resolve pointer → the drop the release would perform: a per-pane edge split, a center
    // replace, an outer-rim whole-surface split, or (empty/settings) a plain full-surface open.
    function computeDrop(x, y) {
      const cr = content.getBoundingClientRect();
      const dragged = start.row;
      if (!layout || app.classList.contains('settings')) {
        return { kind: 'split', open: true, refuse: false, rect: { left: cr.left, top: cr.top, w: cr.width, h: cr.height } };
      }
      // A session from another branch / worktree never joins this surface (003) — refuse every zone
      // so the preview reads red rather than silently building a cross-worktree split.
      const foreign = !canJoinLayout(dragged);
      // Outer rim first — within RIM px of a content border → whole-surface split.
      const dl = x - cr.left, dr = cr.right - x, dt = y - cr.top, db = cr.bottom - y;
      const rim = Math.min(dl, dr, dt, db);
      if (rim <= RIM) {
        let dir, before, rect;
        if (rim === dl)      { dir = 'row'; before = true;  rect = { left: cr.left, top: cr.top, w: cr.width / 2, h: cr.height }; }
        else if (rim === dr) { dir = 'row'; before = false; rect = { left: cr.left + cr.width / 2, top: cr.top, w: cr.width / 2, h: cr.height }; }
        else if (rim === dt) { dir = 'col'; before = true;  rect = { left: cr.left, top: cr.top, w: cr.width, h: cr.height / 2 }; }
        else                 { dir = 'col'; before = false; rect = { left: cr.left, top: cr.top + cr.height / 2, w: cr.width, h: cr.height / 2 }; }
        return { kind: 'rim', dir, before, refuse: rimRefused(dir) || foreign, rect };
      }
      const paneEl = paneUnder(x, y);
      if (!paneEl || !paneEl._node) return null;
      const leaf = paneEl._node, pr = paneEl.getBoundingClientRect();
      const nx = (x - pr.left) / pr.width, ny = (y - pr.top) / pr.height;
      const near = Math.min(nx, 1 - nx, ny, 1 - ny);
      if (near > EDGE) {   // center → replace the pane's session in place
        return { kind: 'replace', leaf, refuse: leaf.session === dragged || foreign,
                 rect: { left: pr.left + pr.width * 0.14, top: pr.top + pr.height * 0.14, w: pr.width * 0.72, h: pr.height * 0.72 } };
      }
      let dir, before, rect;
      if (near === nx)          { dir = 'row'; before = true;  rect = { left: pr.left, top: pr.top, w: pr.width / 2, h: pr.height }; }
      else if (near === 1 - nx) { dir = 'row'; before = false; rect = { left: pr.left + pr.width / 2, top: pr.top, w: pr.width / 2, h: pr.height }; }
      else if (near === ny)     { dir = 'col'; before = true;  rect = { left: pr.left, top: pr.top, w: pr.width, h: pr.height / 2 }; }
      else                      { dir = 'col'; before = false; rect = { left: pr.left, top: pr.top + pr.height / 2, w: pr.width, h: pr.height / 2 }; }
      const childW = dir === 'row' ? pr.width / 2 : pr.width;
      const childH = dir === 'col' ? pr.height / 2 : pr.height;
      const refuse = leaf.session === dragged || foreign || childW < MIN_W || childH < MIN_H;
      return { kind: 'split', leaf, dir, before, refuse, rect };
    }

    // Land the resolved drop. A session already living in a pane MOVES (its old leaf collapses,
    // siblings reflow) rather than duplicating; focus follows the newly-placed pane (002).
    function performDrop(res) {
      const session = start.row;
      if (res.open) { openSession(session); return; }
      if (res.kind === 'replace') {
        if (res.leaf.session === session) return;
        const cur = leafBySession(session);
        if (cur && cur !== res.leaf) removeLeaf(cur);
        res.leaf.session = session; res.leaf.setup = null; res.leaf.el = null;
        activePane = res.leaf;
        renderLayout();
        return;
      }
      if (res.kind === 'split') {
        if (res.leaf.session === session) return;
        const cur = leafBySession(session);
        if (cur && cur !== res.leaf) removeLeaf(cur);
        splitPane(res.leaf, session, res.dir, res.before);
        return;
      }
      if (res.kind === 'rim') {
        if (layout && layout.leaf && layout.session === session) return;   // nothing to split against
        const cur = leafBySession(session);
        if (cur) removeLeaf(cur);
        splitRoot(session, res.dir, res.before);
      }
    }

    // ---- Sidebar pair-to-split (012) — the second create route ----
    // The pointer over another sidebar row's centre reads as "onto"; its top/bottom edges stay
    // reorder territory, so both gestures share the one list.
    function pairTargetAt(x, y) {
      const h = document.elementFromPoint(x, y);
      const row = h && h.closest('.session[data-session]');
      if (!row || row === start.row) return null;
      if (branchKeyOf(row) !== branchKeyOf(start.row)) return null;   // a pair is a split — one branch (003)
      const b = row.getBoundingClientRect();
      const ry = (y - b.top) / b.height;
      if (ry < 0.3 || ry > 0.7) return null;   // edges reorder, centre pairs
      return row;
    }
    const markPair = (row) => {
      if (pairTarget && pairTarget !== row) pairTarget.classList.remove('session--pair-to');
      pairTarget = row; row.classList.add('session--pair-to');
    };
    const clearPair = () => {
      if (pairTarget) pairTarget.classList.remove('session--pair-to');
      pairTarget = null; pairMode = false;
    };
    // Land the pair: if the target is already a pane, the dragged session splits it in place
    // (moving out of any pane it already held); otherwise the two become a fresh side-by-side
    // layout. Focus follows the dragged session, matching splitPane / the content drop (002).
    function performPair(target) {
      const dragged = start.row;
      if (dragged === target) return;
      const tLeaf = leafBySession(target);
      if (tLeaf) {
        const dLeaf = leafBySession(dragged);
        if (dLeaf === tLeaf) return;
        if (dLeaf) removeLeaf(dLeaf);
        splitPane(tLeaf, dragged, 'row', false);   // target | dragged, side by side
      } else {
        layout = { leaf: false, dir: 'row', split: 0.5, a: leafNode(target), b: leafNode(dragged) };
        activePane = layout.b;
        renderLayout();
      }
    }

    // Eat the click that trails a drag so it doesn't toggle/open the row.
    nav.addEventListener('click', (e) => {
      if (suppress) { suppress = false; e.preventDefault(); e.stopPropagation(); }
    }, true);

    // FLIP: animate siblings from their old positions to their new ones after a reorder.
    function flip(mutate) {
      const items = sibs(start.container, start.sel);
      const firsts = items.map((el) => [el, el.getBoundingClientRect().top]);
      mutate();
      if (reduceMotion) return;
      for (const [el, top] of firsts) {
        if (el === start.unit) continue;
        const dy = top - el.getBoundingClientRect().top;
        if (!dy) continue;
        el.style.transition = 'none';
        el.style.transform = `translateY(${dy}px)`;
        requestAnimationFrame(() => {
          el.style.transition = 'transform 180ms var(--ease-out)';
          el.style.transform = '';
          el.addEventListener('transitionend', () => { el.style.transition = ''; el.style.transform = ''; }, { once: true });
        });
      }
    }

    // Nudge the tree when a drag hovers near its top/bottom edge.
    function autoscroll(y) {
      const nr = nav.getBoundingClientRect(), M = 44;
      let dv = 0;
      if (y < nr.top + M) dv = -Math.min(14, (nr.top + M - y) / 2);
      else if (y > nr.bottom - M) dv = Math.min(14, (y - (nr.bottom - M)) / 2);
      cancelAnimationFrame(scrollRAF);
      if (dv) {
        nav.scrollTop += dv;
        updateDropLine(y);   // rows slide under the held pointer — keep the line aimed at the slot
        scrollRAF = requestAnimationFrame(() => autoscroll(y));
      }
    }
  })();

  // wire kebabs onto every existing row — each opens the ⌘K palette at that row's frame
  nav.querySelectorAll('[data-row]').forEach(addKebab);

  // A right-click anywhere on a row opens that same ⌘K palette frame (no native browser menu) —
  // the settings-mode scope rows aren't [data-row], so they fall through untouched.
  nav.addEventListener('contextmenu', (e) => {
    const row = e.target.closest('[data-row]');
    if (!row) return;
    e.preventDefault();
    openRowActions(row);
  });

  // ===== Keyboard shortcuts sheet (⌘?) — every binding above, one glanceable modal =====

  // ===== Feedback (⌘⇧F) — one frictionless textbox that forks on who is running Synth =====

  // Context (session kind, status, counts, theme) is captured silently and attached for repro —
  // structural only: file contents, paths, terminal output, env values and clipboard never leave;
  // the email path attaches only version/OS. Append ?guest to preview it; the native port resolves
  // the mode from git identity + the Synth workspace instead.
  const ICON_CHAT = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,24A104,104,0,0,0,36.18,176.88L24.83,210.93a16,16,0,0,0,20.24,20.24l34.05-11.35A104,104,0,1,0,128,24Zm0,192a87.87,87.87,0,0,1-44.06-11.81,8,8,0,0,0-6.54-.67L40,216,52.47,178.6a8,8,0,0,0-.66-6.54A88,88,0,1,1,128,216ZM84,116a12,12,0,1,1,12,12A12,12,0,0,1,84,116Zm44,0a12,12,0,1,1,12,12A12,12,0,0,1,128,116Zm44,0a12,12,0,1,1,12,12A12,12,0,0,1,172,116Z"/></svg>';
  const FEEDBACK_EMAIL = 'isaac.scarrott11@gmail.com';
  const AUTHOR_MODE = !/[?&]guest\b/.test(location.search);
  let feedbackEl = null, feedbackDraft = '';

  // Structural facts only — what Synth is doing, never what you're building. Captured at send and
  // folded into the payload silently; the user never has to manage it.
  function captureContext() {
    const kindLabel = { ai: 'Claude Code', terminal: 'Terminal', browser: 'Browser', simulator: 'Simulator' };
    const rows = [];
    if (openEl) rows.push(['Here', (kindLabel[openEl.dataset.type] || 'session') + ' · ' + branchNameOf(openEl)]);
    const ws = document.querySelectorAll('.repo__head').length;
    const busy = document.querySelectorAll('.session .sdot--work, .session .sdot--run').length;
    const unread = document.querySelectorAll('.session--unread').length;
    rows.push(['State', ws + (ws === 1 ? ' project' : ' projects') + ' · ' + busy + ' busy · ' + unread + ' unread']);
    rows.push(['Env', 'Synth 0.4 · macOS 15 · ' + (document.documentElement.dataset.theme || 'system') + ' theme']);
    return rows;
  }

  function openFeedback() {
    if (feedbackEl) return;
    closeMenu();
    const backdrop = document.createElement('div');
    backdrop.className = 'backdrop';
    backdrop.innerHTML = '<div class="dialog dialog--feedback" role="dialog" aria-label="Send feedback">'
      + '<textarea class="fb__text" placeholder="What&#39;s off?" spellcheck="true">' + esc(feedbackDraft) + '</textarea>'
      + '<div class="fb__foot"><span class="fb__dismiss">esc to dismiss</span>'
      + '<span class="dialog__btn dialog__btn--primary fb__send is-disabled" data-send>Send <kbd>⌘↵</kbd></span></div>'
      + '</div>';

    feedbackEl = backdrop;

    const ta = backdrop.querySelector('.fb__text');
    const sendBtn = backdrop.querySelector('[data-send]');
    const grow = () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 210) + 'px'; };
    const paint = () => sendBtn.classList.toggle('is-disabled', !ta.value.trim());
    setTimeout(() => { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); grow(); }, 60);
    ta.addEventListener('input', () => { feedbackDraft = ta.value; grow(); paint(); });
    paint();

    const close = () => { feedbackEl = null; backdrop.classList.remove('open'); setTimeout(() => backdrop.remove(), 200); document.removeEventListener('keydown', onKey, true); };
    const submit = () => {
      const text = ta.value.trim();

      feedbackDraft = '';

      close();
      if (AUTHOR_MODE) sendFeedbackAsFix(text, ctx); else sendFeedbackAsEmail(text, ctx);

  function slugify(text) {
    const s = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').split('-').filter(Boolean).slice(0, 4).join('-');
    return s || 'note';

  // Author path: the gripe becomes a real feedback/<slug> branch group with a Claude session
  // already working it — spawned quietly (unread bullet, no focus steal), exactly like an
  // agent-created browser. The session appearing in the tree is the confirmation.
  function sendFeedbackAsFix(text, ctx) {
    const repo = (openEl && outerRepoOf(openEl)) || document.querySelector('.repo[data-repo]');
    const slug = slugify(text);
    const seed = text + '\n\n' + ctx.map(([kk, v]) => kk + ': ' + v).join('\n');   // the prompt Claude is seeded with
    if (repo) {
      repo.classList.add('repo--open');
      const branches = repo.querySelector('.branches');
      const wrapper = branchGroupShell('feedback/' + slug, 'now');
      wrapper.classList.add('row-enter');
      branches.appendChild(wrapper);
      wrapper.querySelectorAll('[data-row]').forEach(addKebab);
      wrapper.addEventListener('animationend', () => wrapper.classList.remove('row-enter'), { once: true });
      addSession(wrapper.querySelector('.branch--group'), 'claude', { name: 'Claude Code', open: false });
      const sess = wrapper.querySelector('.session');
      if (sess) { setSessionState(sess, 'work'); sess.classList.add('session--unread'); sess.title = seed; }
      rollUpGroups();
    }
    flashToast('done', 'On it', 'feedback/' + slug);
  }

  // Everyone else: a pre-filled email, capped for mailto's practical body limit. No client → the
  // native port copies to clipboard and says so; the prototype just fires the mailto and confirms.
  function sendFeedbackAsEmail(text, ctx) {
    const env = (ctx.find(([kk]) => kk === 'Env') || [])[1] || '';   // email path attaches only version/OS — no branch/session names
    const body = (text + (env ? '\n\n— — —\n' + env : '') + '\n\nSent from Synth').slice(0, 1600);
    const url = 'mailto:' + FEEDBACK_EMAIL + '?subject=' + encodeURIComponent('Synth feedback') + '&body=' + encodeURIComponent(body);

  const ICON_SEARCH = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"/></svg>';

  const CMDK_GROUPS = ['Actions', 'Projects', 'Branches', 'Sessions'];

  const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  // subsequence fuzzy match; higher score = better, -Infinity = no match
  function fuzzy(q, text) {
    if (!q) return 0;
    q = q.toLowerCase();
    const t = text.toLowerCase();
    let ti = 0, score = 0, run = 0, first = -1;
    for (const c of q) {
      const idx = t.indexOf(c, ti);
      if (idx === -1) return -Infinity;
      if (first === -1) first = idx;
      run = idx === ti ? run + 2 : 0;                           // contiguous streak bonus
      if (idx === 0 || /[\W_\/]/.test(t[idx - 1])) score += 3;  // word-boundary hit

  // items match on their label first; the context path is a weaker fallback,
  // so "synth dev" finds the dev server without outranking exact label hits
  function itemScore(q, it) {

    const labelScore = s > -Infinity ? s + boost : -Infinity;
    if (!it.ctx) return labelScore;

  // Which row a context-sensitive action targets. ⌘K follows the keyboard focus: when the
  // sidebar owns it (its ring is showing on selEl), that focused row is the context; otherwise

  function contextRow() {

    if (document.body.classList.contains('kbd') && selEl && document.contains(selEl) && isTreeRow(selEl)) return selEl;

    return repo ? repo.querySelector(':scope > .repo__head') : null;
  }
  function contextBranch() {
    const row = contextRow();
    if (row) {
      if (row.matches('.branch')) return row;
      const g = branchGroupOf(row);
      if (g) return g;
    }
    const head = contextWorkspaceHead();
    const scope = head ? head.closest('[data-repo]') : nav;
    return scope.querySelector('.branch--active') || scope.querySelector('.branch')
      || nav.querySelector('.branch--active') || nav.querySelector('.branch');
  }

  // Reveal a row (expand its collapsed ancestors), select it, and mark a session read.
  function jumpTo(row) {
    let node = row.parentElement;
    while (node && node !== nav) {
      if (node.matches && node.matches('[data-repo]')) node.classList.add('repo--open');
      node = node.parentElement;
    }
    if (row.matches('[data-session]')) openSession(row);
    document.body.classList.add('kbd');
    select(row, true);
    recordVisit(row);
  }

  // The palette is a navigation STACK of frames. Root is simple; typing filters and progressively
  // reveals more. Enter drills into a frame or runs a leaf; Backspace on an empty query steps back.
  // Create / delete / confirm all happen inline as text frames — the palette never spawns a modal.
  const ICON_FOLDER = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,72H131.31L104,44.69A15.86,15.86,0,0,0,92.69,40H40A16,16,0,0,0,24,56V200.62A15.4,15.4,0,0,0,39.38,216H216.89A15.13,15.13,0,0,0,232,200.89V88A16,16,0,0,0,216,72ZM40,56H92.69l16,16H40Zm176,144H40V88H216Z"/></svg>';
  const ICON_STACK  = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M108,40H48A16,16,0,0,0,32,56v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V56A16,16,0,0,0,108,40Zm0,76H48V56h60ZM208,40H148a16,16,0,0,0-16,16v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V56A16,16,0,0,0,208,40Zm0,76H148V56h60ZM108,148H48a16,16,0,0,0-16,16v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V164A16,16,0,0,0,108,148Zm0,76H48V164h60Zm100-76H148a16,16,0,0,0-16,16v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V164A16,16,0,0,0,208,148Zm0,76H148V164h60Z"/></svg>';
  const ICON_ENTER  = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M232,80v88a8,8,0,0,1-16,0V88H56.68l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48a8,8,0,0,1,11.32,11.32L56.68,72H224A8,8,0,0,1,232,80Z"/></svg>';
  const ICON_CLOSE  = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>';
  const ICON_RENAME = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M227.31,73.37,182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31l88-88L180.69,120ZM192,108.68,147.31,64l24-24L216,84.68Z"/></svg>';
  const ICON_RESET = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M240,56v48a8,8,0,0,1-8,8H184a8,8,0,0,1,0-16h27.4L184.81,71.64l-.25-.24a80,80,0,1,0-1.67,114.78,8,8,0,0,1,11,11.63A95.44,95.44,0,0,1,128,224h-1.32A96,96,0,1,1,195.75,60L224,85.8V56a8,8,0,0,1,16,0Z"/></svg>';
  const ICON_MINUS = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm40-88a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h64A8,8,0,0,1,168,128Z"/></svg>';

  // entity readers — the DOM tree is the source of truth
  const wsName = (h) => h.querySelector('.repo__name').textContent;
  const wsChip = (h) => h.querySelector('.repo__chip').outerHTML;
  const brName = (b) => b.querySelector('.branch__name').textContent;
  const seName = (s) => s.querySelector('.session__name').textContent;
  const seIcon = (s) => s.querySelector('.session__icon').outerHTML;
  const seStatus = (s) => STATE_LABEL[sessionState(s)];
  const wsOf = (el) => { let r = el.closest('[data-repo]'); while (r) { const o = r.parentElement && r.parentElement.closest('[data-repo]'); if (!o) break; r = o; } return r ? r.querySelector('.repo__name').textContent : ''; };
  const brOf = (s) => { const n = s.closest('[data-repo]') && s.closest('[data-repo]').querySelector('.branch__name'); return n ? n.textContent : ''; };

  const curFrame = () => pal.stack[pal.stack.length - 1];
  function pushFrame(fr) { pal.stack.push(fr); pal.input.value = fr.seed || ''; renderFrame(); if (fr.seed) pal.input.select(); }
  function popFrame() { if (pal.stack.length > 1) { pal.stack.pop(); pal.input.value = ''; renderFrame(); } }
  function popTo(depth) { pal.stack.length = Math.max(1, depth + 1); pal.input.value = ''; renderFrame(); }

  // ---- Frames: each returns { crumb?, placeholder, mode?, build(query) -> items[] } ----
  // An item: { icon, label, kbd?, danger?, disabled?, g?(group), enter() }. enter() drills or runs.
  // ⌘K opens context-aware: the actions that act on where you are — the focused session, its branch,
  // its workspace — lead the root frame, each grouped and labelled by the scope it targets, most-local
  // first. "Where you are" is the focused sidebar row when its ring is showing, else the open session;
  // Session actions only appear when that anchor is a session leaf. A session action never sits under
  // the same heading as a branch or workspace action. A browser session adds a Page group above
  // Session — the page's own verbs, one keystroke from anywhere.
  const ICON_COPY = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>';
  // Page verbs drive the same toolbar controls a click would — the palette adds no second
  // navigation path. When the row isn't the open session there is no live page yet, so
  // everything but "Go to address…" (which opens the session first) reads disabled.
  function browserActions(row) {
    const live = row === openEl && activePaneEl() ? activePaneEl().querySelector('.browser') : null;
    const home = !live || live.hasAttribute('data-home');
    const url = home ? '' : live.querySelector('.browser__url').textContent;
    const drive = (fn) => runAndClose(() => {
      if (row !== openEl) jumpTo(row);
      const host = activePaneEl() && activePaneEl().querySelector('.browser');
      if (host) fn(host);

    const press = (sel) => drive((host) => { const b = host.querySelector(sel); if (b && !b.disabled) b.click(); });

    return [

      { icon: ICON_DEVTOOLS,   label: (live && live.querySelector('[data-devtools]')) ? 'Hide DevTools' : 'Show DevTools', kbd: ['⌥', '⌘', 'I'], disabled: home, enter: () => press('[data-nav="devtools"]') },
      { icon: ICON_DEVICE,     label: (live && live.querySelector('[data-nav="device"].is-on')) ? 'Exit device mode' : 'Enter device mode', kbd: ['⌘', '⇧', 'M'], disabled: home, enter: () => press('[data-nav="device"]') },
      { icon: ICON_PLUS,       label: 'Zoom in',  kbd: ['⌘', '+'], disabled: home, enter: () => drive(() => browserZoomAPI.in()) },
      { icon: ICON_MINUS,      label: 'Zoom out', kbd: ['⌘', '−'], disabled: home, enter: () => drive(() => browserZoomAPI.out()) },
      { icon: ICON_SEARCH,     label: 'Reset zoom', disabled: home || !(live && live.querySelector('[data-zoom].is-shown')), enter: () => drive(() => browserZoomAPI.reset()) },
    ];
  }
  function contextActions() {
    const row = contextRow();
    const open = row && row.matches('.session') ? row : null;
    const br = contextBranch(), head = contextWorkspaceHead();
    const items = [];
    if (open && open.dataset.type === 'browser') browserActions(open).forEach((a) => items.push({ grp: 'Page', unit: seName(open), ...a }));
    if (open) items.push({ grp: 'Session', unit: seName(open), icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(open)) });
    if (open && open === openEl && open.dataset.type === 'browser' && browserCommentAPI.available())
      items.push({ grp: 'Session', unit: seName(open), icon: ICON_COMMENT, label: (browserCommentAPI.isOn() ? 'Exit' : 'Enter') + ' comment mode', enter: () => runAndClose(() => browserCommentAPI.toggle()) });
    if (open && open.dataset.type === 'browser') {
      const owner = ownerOf(open);
      if (owner) items.push({ grp: 'Session', unit: seName(open), icon: ICON_MINUS, label: 'Detach from “' + sessionTitle(owner) + '”', danger: true, enter: () => runAndClose(() => detach(open)) });
      else claudesOf(open.parentElement).forEach((c) => items.push({ grp: 'Session', unit: seName(open), icon: agentIcon(c.getAttribute('data-agent')), label: 'Attach to “' + sessionTitle(c) + '”', danger: true, enter: () => runAndClose(() => adopt(open, c)) }));
    }
    if (open) items.push({ grp: 'Session', unit: seName(open), icon: ICON_CLOSE, label: 'Close', kbd: ['⌘', 'D'], danger: true, enter: () => pushFrame(confirmFrame(open)) });
    if (open && inSplit(open)) items.push({ grp: 'Session', unit: seName(open), icon: ICON_UNSPLIT, label: 'Unsplit', enter: () => runAndClose(() => unsplitSession(open)) });
    if (br) items.push({ grp: 'Branch', unit: brName(br), icon: ICON_TERMINAL, label: 'New terminal', enter: () => runAndClose(() => addTerminal(br)) });
    if (br) AGENTS.forEach((k) => items.push({ grp: 'Branch', unit: brName(br), icon: AGENT_ICON[k], label: 'New ' + SESSION_KINDS[k].name, enter: () => runAndClose(() => addAgent(br, k)) }));
    if (br) items.push({ grp: 'Branch', unit: brName(br), icon: ICON_BROWSER, label: 'New browser', enter: () => runAndClose(() => addBrowser(br)) });
    if (br) items.push({ grp: 'Branch', unit: brName(br), icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(br)) });
    if (br) items.push({ grp: 'Branch', unit: brName(br), icon: ICON_MINUS, label: 'Remove', danger: true, enter: () => pushFrame(confirmFrame(br)) });
    if (head) items.push({ grp: 'Project', unit: wsName(head), icon: ICON_BRANCH, label: 'New branch', enter: () => pushFrame(createFrame('worktree', head)) });

  }

  // ── Recents / frecency ──────────────────────────────────────────────────
  // The cold palette floats your most-used STABLE targets so they're one keystroke away.
  // Actions keep fixed positions (never ranked by use); dynamically-named sessions (AI titles,
  // browser URLs) are excluded — a target whose name shifts can't earn muscle memory. The native
  // app persists this; here it's in-memory, lightly seeded so the group shows in the static demo.
  let visitClock = 0;
  const visits = new Map();   // row element → { n: times used, t: last-use tick }
  function recordVisit(row) {
    if (!row || !isTreeRow(row)) return;
    if (row.matches('.session') && (row.dataset.type === 'ai' || row.dataset.type === 'browser')) return;
    const v = visits.get(row) || { n: 0, t: 0 };
    v.n += 1; v.t = ++visitClock; visits.set(row, v);
  }
  function recentTargets(limit) {
    return [...visits.entries()].filter(([row]) => document.contains(row))
      .sort((a, b) => (b[1].n - a[1].n) || (b[1].t - a[1].t)).slice(0, limit).map(([row]) => row);
  }
  function recentItem(row) {
    const lvl = rowLevel(row);
    if (lvl === 'branch') return { g: 'Recent', icon: ICON_BRANCH, label: brName(row), ctx: wsOf(row), enter: () => { recordVisit(row); pushFrame(branchFrame(row)); } };
    if (lvl === 'repo')   return { g: 'Recent', icon: wsChip(row), label: wsName(row), enter: () => { recordVisit(row); pushFrame(workspaceFrame(row)); } };
    return { g: 'Recent', icon: seIcon(row), label: seName(row), ctx: seCtx(row), meta: seStatus(row), metaState: sessionState(row), enter: () => runAndClose(() => jumpTo(row)) };
  }
  (function seedRecents() {   // a little history so the Recent group is visible on first load
    const se = (n) => [...nav.querySelectorAll('.session')].find((s) => { const e = s.querySelector('.session__name'); return e && e.textContent === n; });
    const be = (n) => [...nav.querySelectorAll('.branch')].find((b) => { const e = b.querySelector('.branch__name'); return e && e.textContent === n; });
    [se('dev server'), se('dev server'), se('dev server'), be('main'), be('main'), se('migrate')].forEach(recordVisit);
  })();

  function rootFrame() {
    return {
      placeholder: 'Search or jump to anything…',
      build(q) {
        const here = contextActions();
        if (!q) return [
          ...recentTargets(4).map(recentItem),
          ...here.items.map((it) => ({ ...it, g: it.grp + ' · ' + it.unit })),
          { sec: 'nav', icon: ICON_FOLDER,  label: 'Projects', enter: () => pushFrame(workspacesFrame()) },
          { sec: 'nav', icon: ICON_BRANCH,  label: 'Branches',   enter: () => pushFrame(categoryFrame('branch')) },
          { sec: 'nav', icon: ICON_STACK,   label: 'Sessions',   enter: () => pushFrame(categoryFrame('session')) },
          { sec: 'act', icon: ICON_SIDEBAR, label: 'Toggle sidebar', kbd: ['⌘', 'B'], enter: () => runAndClose(() => app.classList.toggle('collapsed')) },
          { sec: 'act', icon: ICON_GEAR,    label: 'Settings', kbd: ['⌘', ','], enter: () => runAndClose(() => enterSettings()) },
          { sec: 'act', icon: ICON_KEYS,    label: 'Keyboard shortcuts', kbd: ['⌘', '?'], enter: () => runAndClose(openShortcuts) },
          { sec: 'act', icon: ICON_CHAT,    label: 'Send feedback…', kbd: ['⌘', '⇧', 'F'], enter: () => runAndClose(openFeedback) },
        ];
        const items = [
          ...here.items.map((it) => ({ ...it, g: 'Actions', ctx: it.unit })),
          { g: 'Actions', icon: ICON_PLUS,     label: 'Add project', enter: () => pushFrame(createFrame('workspace')) },
          { g: 'Actions', icon: ICON_SIDEBAR,  label: 'Toggle sidebar', kbd: ['⌘', 'B'], enter: () => runAndClose(() => app.classList.toggle('collapsed')) },
          { g: 'Actions', icon: ICON_GEAR,     label: 'Settings', kbd: ['⌘', ','], enter: () => runAndClose(() => enterSettings()) },
          { g: 'Actions', icon: ICON_KEYS,     label: 'Keyboard shortcuts', kbd: ['⌘', '?'], enter: () => runAndClose(openShortcuts) },
          { g: 'Actions', icon: ICON_CHAT,     label: 'Send feedback…', kbd: ['⌘', '⇧', 'F'], enter: () => runAndClose(openFeedback) },
        ];
        // Search groups run most-local-first: Actions (above), then Sessions, Branches, Projects.
        allRows('.session').forEach((s) => items.push({ g: 'Sessions', icon: seIcon(s), label: seName(s), ctx: seCtx(s), meta: seStatus(s), metaState: sessionState(s), enter: () => runAndClose(() => jumpTo(s)) }));
        allRows('.branch').forEach((b) => items.push({ g: 'Branches', icon: ICON_BRANCH, label: brName(b), ctx: wsOf(b), enter: () => pushFrame(branchFrame(b)) }));
        allRows('.repo__head').forEach((h) => items.push({ g: 'Projects', icon: wsChip(h), label: wsName(h), enter: () => pushFrame(workspaceFrame(h)) }));
