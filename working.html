<script>
(() => {
  const app = document.getElementById('app');
  const nav = document.getElementById('nav');
  let paletteOpen = false;

  // --- Sidebar collapse / expand ---
  document.getElementById('collapseBtn').addEventListener('click', () => app.classList.add('collapsed'));
  document.getElementById('expandBtn').addEventListener('click', () => app.classList.remove('collapsed'));

  // --- Branch-group roll-up: highest-priority session state, else last activity ---
  const MARK_INPUT = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M192,96c0,28.51-24.47,52.11-56,55.56V160a8,8,0,0,1-16,0V144a8,8,0,0,1,8-8c26.47,0,48-17.94,48-40s-21.53-40-48-40S80,73.94,80,96a8,8,0,0,1-16,0c0-30.88,28.71-56,64-56S192,65.12,192,96Zm-64,96a16,16,0,1,0,16,16A16,16,0,0,0,128,192Z"/></svg>';
  const MARK_ERROR = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M144,200a16,16,0,1,1-16-16A16,16,0,0,1,144,200Zm-16-40a8,8,0,0,0,8-8V48a8,8,0,0,0-16,0V152A8,8,0,0,0,128,160Z"/></svg>';
  const MARK_DONE = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg>';

  // priority: needs-input > error > working > running > idle
  const PRIORITY = ['input', 'error', 'work', 'run', 'idle'];
  function sessionState(s) {
    if (s.querySelector('.ind--input')) return 'input';
    if (s.querySelector('.ind--error')) return 'error';
    if (s.querySelector('.sdot--work')) return 'work';
    if (s.querySelector('.sdot--run')) return 'run';
    return 'idle';
  }
  const ROLL = {
    input: () => `<span class="ind ind--input">${MARK_INPUT}</span>`,
    error: () => `<span class="ind ind--error">${MARK_ERROR}</span>`,
    work:  () => `<span class="ind"><span class="sdot sdot--work"></span></span>`,
    run:   () => `<span class="ind"><span class="sdot sdot--run"></span></span>`,
    unread:() => `<span class="ind"><span class="udot"></span></span>`,
  };
  function rollUpGroups() {
    nav.querySelectorAll('[data-group]').forEach((group) => {
      const repo = group.closest('[data-repo]');
      const sessions = [...repo.querySelectorAll('.sessions .session')];
      const worst = PRIORITY.find((p) => sessions.some((s) => sessionState(s) === p)) || 'idle';
      const hasUnread = sessions.some((s) => s.classList.contains('session--unread'));
      const slot = group.querySelector('.branch__roll');
      slot.innerHTML = worst !== 'idle' ? ROLL[worst]()
        : hasUnread ? ROLL.unread()  // all idle, but finished-and-unseen output waits inside
        : group.classList.contains('branch--active') ? `<span class="ind"><span class="branch__dot"></span></span>`  // checked-out branch
        : `<span class="branch__meta">${group.dataset.activity}</span>`;  // all idle → last activity
    });
  }
  rollUpGroups();

  // ===== Content pane: render the open session (the one "you are here") =====
  // Sticky selection — survives mousing around, changes only on activate. The white
  // active pill is DERIVED from it: the branch group that holds the open session.
  const content = document.querySelector('.content');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ICON_SEND = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,117.66a8,8,0,0,1-11.32,0L136,59.31V216a8,8,0,0,1-16,0V59.31L61.66,117.66a8,8,0,0,1-11.32-11.32l72-72a8,8,0,0,1,11.32,0l72,72A8,8,0,0,1,205.66,117.66Z"/></svg>';
  const ICON_EMPTY = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,128a8,8,0,0,1-3,6.25l-40,32a8,8,0,1,1-10-12.5L107.19,128,75,102.25a8,8,0,1,1,10-12.5l40,32A8,8,0,0,1,128,128Zm48,24H136a8,8,0,0,0,0,16h40a8,8,0,0,0,0-16Zm56-96V200a16,16,0,0,1-16,16H40a16,16,0,0,1-16-16V56A16,16,0,0,1,40,40H216A16,16,0,0,1,232,56ZM216,200V56H40V200H216Z"/></svg>';
  const STATE_LABEL = { run: 'running', work: 'working', input: 'needs input', error: 'error', idle: 'idle' };
  const IND_HTML = {
    input: `<span class="ind ind--input">${MARK_INPUT}</span>`,
    error: `<span class="ind ind--error">${MARK_ERROR}</span>`,
    work:  `<span class="ind"><span class="sdot sdot--work"></span></span>`,
    run:   `<span class="ind"><span class="sdot sdot--run"></span></span>`,
    idle:  `<span class="ind"></span>`,
  };
  let openEl = null, streamTimer = null;
  // The still-creating branch whose setup skeleton the pane is showing (null = none). Set
  // the instant a create is requested and cleared the moment anything else opens — so a
  // finished checkout resolves in place only while this still points at it (last-intent-wins).
  let setupEl = null;

  function outerRepoOf(el) {
    let repo = el.closest('[data-repo]');
    while (repo) { const outer = repo.parentElement && repo.parentElement.closest('[data-repo]'); if (!outer) break; repo = outer; }
    return repo;
  }
  function workspaceNameOf(el) {
    const repo = outerRepoOf(el);
    const n = repo && repo.querySelector(':scope > .repo__head .repo__name');
    return n ? n.textContent.trim() : 'workspace';
  }
  function branchGroupOf(el) {
    const group = el.closest('[data-repo]');
    return group ? group.querySelector(':scope > .branch--group') : null;
  }
  function branchNameOf(el) {
    const g = branchGroupOf(el);
    const n = g && g.querySelector('.branch__name');
    return n ? n.textContent.trim() : 'main';
  }

  // exactly one active pill across the whole tree — the open session's branch group
  function derivePill(el) {
    nav.querySelectorAll('.branch--active').forEach((b) => b.classList.remove('branch--active'));
    const g = branchGroupOf(el);
    if (g) g.classList.add('branch--active');
  }

  function stopStream() { if (streamTimer) { clearInterval(streamTimer); streamTimer = null; } }

  function openSession(el) {
    if (!el) return;
    app.classList.remove('settings');   // jumping to a session leaves settings mode
    setupEl = null;                     // opening a real session revokes any armed setup-resolve
    if (openEl) openEl.classList.remove('session--open');
    openEl = el;
    el.classList.add('session--open');
    el.classList.remove('session--unread');   // opening marks it read
    clearNotif(el);                            // …and dismisses any toast for it
    derivePill(el);
    renderOpen();
  }

  // Optimistic switch: move the pane onto a still-creating worktree's "setting up…"
  // skeleton, tying the switch to the create keystroke so it can't surprise the user after
  // an async gap. Opening anything else clears setupEl (openSession / enterSettings), so a
  // finished checkout only resolves in place while this still points here.
  function openWorktreeSetup(groupRow) {
    app.classList.remove('settings');
    if (openEl) openEl.classList.remove('session--open');
    openEl = null;
    setupEl = groupRow;
    nav.querySelectorAll('.branch--active').forEach((b) => b.classList.remove('branch--active'));
    groupRow.classList.add('branch--active');   // the grayed pending row still reads as "you are here"
    renderSetup(groupRow);
  }

  function renderSetup(groupRow) {
    stopStream();
    const name = groupRow.querySelector('.branch__name').textContent.trim();
    const ws = workspaceNameOf(groupRow);
    content.innerHTML = `<div class="pane">
      <div class="pane__head">
        <div class="pane__title"><span class="session__icon">${ICON_BRANCH}</span><span>${esc(name)}</span></div>
        <div class="pane__crumb"><b>${esc(ws)}</b> / ${esc(name)}</div>
        <div class="pane__spacer"></div>
      </div>
      <div class="pane__body"><div class="pane-setup"><span class="pane-setup__spin"></span><span>Setting up worktree…</span></div></div>
    </div>`;
  }

  // A session moves to a new derived status: swap its sidebar indicator, re-roll, and
  // surface it if the change happened off-screen (the notification deck below).
  function setSessionState(el, state) {
    const prev = sessionState(el);
    const ind = el.querySelector(':scope > .ind');
    if (ind) ind.outerHTML = IND_HTML[state];
    rollUpGroups();
    notifyOnTransition(el, prev, state);
  }

  // ===== In-app notifications ===============================================
  // A background session (never the open one) that moves to needs-input or error rises as a
  // quiet glass toast, bottom-left. Several collapse into a deck — most-urgent in front — that
  // fans out on hover; ⌘↩ jumps to the front card, a click to any. 'done' (a live session
  // settling to idle off-screen) raises a transient toast that dismisses itself — it asks
  // for nothing, so it never persists; Claude and terminal alike (browsers carry no state).
  // When Synth is unfocused the native app raises these through Notification Center instead;
  // this is the focused-window counterpart.
  const notifsEl = document.getElementById('notifs');
  const notifState = new Map();   // sessionEl -> { kind, order }
  const notifCards = new Map();   // sessionEl -> card element
  const NOTIF_OP = [1, 0.7, 0.45];   // front, then two peeking; deeper cards hide behind "+N"
  const NOTIF_KBD = '<span class="notif__kbd"><span class="keys"><kbd>⌘</kbd><kbd>↩</kbd></span>jump</span>';
  let notifSeq = 0;

  const notifLive = (s) => s === 'work' || s === 'run' || s === 'input' || s === 'error';
  const NOTIF_DONE_MS = 6000;   // a done toast asks for nothing — it dismisses itself

  function notifyOnTransition(el, prev, next) {
    if (el === openEl) { clearNotif(el); return; }
    if (next === 'input' || next === 'error') { notify(el, next); return; }
    if (next === 'idle' && notifLive(prev)) {   // finished off-screen → "done"
      el.classList.remove('session--pulse'); void el.offsetWidth; el.classList.add('session--pulse');
      notify(el, 'done'); return;
    }
    clearNotif(el);   // work / run (and idle-from-idle) clear a standing toast
  }

  function notify(el, kind) {
    el.classList.add('session--unread');
    const prev = notifState.get(el);
    if (prev && prev.timer) clearTimeout(prev.timer);
    if (prev && prev.kind !== kind) {   // kind changed → rebuild the card, don't restyle a stale one
      const c = notifCards.get(el);
      if (c) { leaveNotif(c); notifCards.delete(el); }
    }
    const entry = { kind, order: ++notifSeq };
    if (kind === 'done') entry.timer = setTimeout(() => clearNotif(el), NOTIF_DONE_MS);
    notifState.set(el, entry);
    renderNotifs();
  }
  function clearNotif(el) {
    const st = notifState.get(el);
    if (st && st.timer) clearTimeout(st.timer);
    if (notifState.delete(el)) renderNotifs();
  }

  // background notifications, most-urgent first: error before input before done, newest first
  const NOTIF_RANK = { error: 0, input: 1, done: 2 };
  function notifOrder() {
    return [...notifState.keys()].filter((el) => el !== openEl && document.contains(el)).sort((a, b) => {
      const A = notifState.get(a), B = notifState.get(b);
      if (NOTIF_RANK[A.kind] !== NOTIF_RANK[B.kind]) return NOTIF_RANK[A.kind] - NOTIF_RANK[B.kind];
      return B.order - A.order;
    });
  }
  function notifTop() { return notifOrder()[0] || null; }

  function notifWhat(el, kind) {
    const ai = el.dataset.type === 'ai';
    if (kind === 'error') return ai ? 'Claude hit an error' : 'exited with an error';
    if (kind === 'done') return ai ? 'Claude finished' : 'finished';
    return ai ? 'Claude needs your input' : 'waiting for input';
  }
  function buildNotif(el) {
    const kind = notifState.get(el).kind;
    const name = el.querySelector('.session__name').textContent.trim();
    const icon = el.querySelector('.session__icon').innerHTML;
    const repo = outerRepoOf(el);
    const chip = repo && repo.querySelector('.repo__chip');
    const color = (chip && chip.style.getPropertyValue('--c').trim()) || 'var(--text-faint)';
    const c = document.createElement('div');
    c.className = 'notif notif--' + kind;
    c.addEventListener('click', () => jumpTo(el));

  // running terminals feel alive: a fresh log line trickles in every couple seconds

    const input = composerEl.querySelector('.chat__input');

  // --- Toggle expand/collapse (repos + the active branch's session group) ---

  // --- Keyboard-first navigation ---
  let selEl = null;

  function treeRows() {
    // A tree row is navigable only if none of its ancestors are collapsed.
    return [...nav.querySelectorAll('[data-row]')].filter((row) => {
      let p = row.parentElement;
      while (p && p !== nav) {
        if (p.classList.contains('collapse') &&
            !p.closest('[data-repo]').classList.contains('repo--open')) {
          return false;
        }

    });

  // followed by the Settings foot button — so ↓/j off the last worktree leaf
  // flows straight into Settings. In Settings it's the scope list (Back + scopes).
  // One list means every nav keybinding works identically on both screens.
  function activeRows() {
    if (app.classList.contains('settings')) {
      return [...settingsNav.querySelectorAll('.settings-back, .scope')];
    }
    return [...treeRows(), document.getElementById('openSettings')];
  }
  // Where the cursor rests when nothing is explicitly selected: the open session

  function currentRow(rows) {

  const isTreeRow = (el) => !!(el && el.closest && el.closest('#nav'));

    if (selEl) selEl.classList.remove('sel');

    if (el) {
      el.classList.add('sel');

    const rows = activeRows();
    if (!rows.length) return;

    const from = selEl && rows.includes(selEl) ? selEl : currentRow(rows);
    let i = from ? rows.indexOf(from) : -1;
    i = Math.max(0, Math.min(rows.length - 1, i + dir));

    if (!row) return;

    if (row.matches('.settings-back')) { exitSettings(); return; }
    if (row.matches('.scope')) { selectScope(row); return; }

      e.preventDefault();

      return;
    }
    if (shortcutsEl) { if (k === 'Escape') closeShortcuts(); return; }

    }
    // Cmd/Ctrl+K opens the palette; Cmd+K also closes it. Ctrl+K while open = nav-up (handled in-palette).
    if ((e.metaKey || e.ctrlKey) && (k === 'k' || k === 'K')) {

      return;
    }

    if ((e.metaKey || e.ctrlKey) && k === '1') { e.preventDefault(); focusContent(); return; }
    // Cmd/Ctrl+T spawns a terminal in the branch you're on (matches the native app)
    if ((e.metaKey || e.ctrlKey) && (k === 't' || k === 'T') && !e.shiftKey && !e.altKey && !app.classList.contains('settings')) {

    }
    // An open browser session claims the standard page verbs window-wide: ⌘L address,
    // ⌘R reload, ⌘[ / ⌘] history, ⌥⌘I DevTools — each drives the visible toolbar control,
    // so disabled states (home page, empty history) are respected for free.
    const bhost = openEl && openEl.dataset.type === 'browser' ? content.querySelector('.browser') : null;
    if (bhost && (e.metaKey || e.ctrlKey)) {
      const bpress = (sel) => { const b = bhost.querySelector(sel); if (b && !b.disabled) b.click(); };
      if (k === 'l' || k === 'L') { e.preventDefault(); bpress('[data-omni]'); return; }
      if ((k === 'r' || k === 'R') && !e.shiftKey) { e.preventDefault(); bpress('[data-nav="reload"]'); return; }
      if (k === '[') { e.preventDefault(); bpress('[data-nav="back"]'); return; }
      if (k === ']') { e.preventDefault(); bpress('[data-nav="fwd"]'); return; }

    if (openMenuEl) return;

    if (k === 'Escape') {

      e.preventDefault();
      focusContent();
      return;
    }
    // Tab toggles the highlighted group open/closed (no-op / default Tab elsewhere).
    if (k === 'Tab' && !e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
      if (document.querySelector('.backdrop')) return;   // a dialog owns Tab
      if (selEl && selEl.matches('[data-toggle]')) {

      }
      return;
    }
    // ⇧J / ⇧K reorder the selected row within its sibling list (keyboard twin of drag).
    if ((k === 'J' || k === 'K') && e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {

    }

    else if (k === 'ArrowUp' || k === 'k') { e.preventDefault(); move(-1); }
    else if (k === 'ArrowRight' || k === 'l') {
      e.preventDefault();

      if (repo && !repo.classList.contains('repo--open')) toggle(repo);

    }
    else if (k === 'ArrowLeft' || k === 'h') {
      e.preventDefault();

      if (repo && repo.classList.contains('repo--open')) toggle(repo);

    }

    else if ((k === 'a' || k === 'A') && !e.metaKey && !e.ctrlKey && !e.altKey) {
      if (!isTreeRow(selEl)) return;

      addToRow(selEl);
    }

    else if ((k === 'r' || k === 'R') && !e.metaKey && !e.ctrlKey && !e.altKey) {

    }

  // ===== Containment (ADR-0011 stage four): a browser can belong to a Claude session =====
  // Ownership is a sidebar-visible structure: the owned row carries data-owner = the owner's
  // data-sid and sits directly under it as a plain sibling (no indent) — the tie shows as a
  // small accent Claude mark in the row's indicator slot. Ownership is set at creation
  // (a spawned Claude adopts the browser it was spawned for) or by the user (kebab Move
  // under… / Detach) — driving a browser never adopts it.
  const IND_OWNED = (owner) => `<span class="ind ind--owned" title="Belongs to ${esc(owner)}">${ICON_AI}</span>`;
  let sidSeq = nav.querySelectorAll('.session[data-sid]').length;
  const claudeSid = (row) => row.dataset.sid || (row.dataset.sid = 'c' + (++sidSeq));
  const ownerOf = (row) => row && row.dataset.owner ? nav.querySelector(`.session[data-sid="${row.dataset.owner}"]`) : null;
  const ownedOf = (row) => row && row.dataset.sid ? [...row.parentElement.querySelectorAll(`.session[data-owner="${row.dataset.sid}"]`)] : [];
  const sessionTitle = (row) => row.querySelector('.session__name').textContent.trim();
  const claudesOf = (sessions) => [...sessions.querySelectorAll('.session[data-type="ai"]')];
  // owned rows always sit directly after their owner — restored after any sibling reorder
  function snapOwned(container) {
    container.querySelectorAll(':scope > .session[data-sid]').forEach((o) => {
      let ref = o;
      ownedOf(o).forEach((b) => { container.insertBefore(b, ref.nextSibling); ref = b; });
    });
  }
  function adopt(browserRow, ownerRow) {
    claudeSid(ownerRow);

    browserRow.classList.add('session--owned');
    const bInd = browserRow.querySelector(':scope > .ind');
    if (bInd) bInd.outerHTML = IND_OWNED(sessionTitle(ownerRow));
    const block = ownedOf(ownerRow).filter((b) => b !== browserRow);
    const ref = block.length ? block[block.length - 1] : ownerRow;
    ref.parentElement.insertBefore(browserRow, ref.nextSibling);

  }

    if (o) { const block = ownedOf(o); const ref = block.length ? block[block.length - 1] : o; o.parentElement.insertBefore(browserRow, ref.nextSibling); }
    browserCommentAPI.refresh();               // a detached open browser's next comment spawns

  function spawnOwnerClaude(browserRow) {

  function rowLevel(row) {
    if (row.matches('.repo__head')) return 'repo';     // a repo = a "workspace"
    if (row.matches('.branch')) return 'branch';
    if (row.matches('.session')) return 'session';      // leaf
    return 'other';
  }
  // the DOM node a delete removes for a given row
  function rowUnit(row) {
    if (row.matches('.repo__head') || row.matches('.branch--group')) return row.closest('[data-repo]');
    return row; // plain branch or session
  }
  // ⇧J / ⇧K reorder the selected row within its own sibling list — the keyboard twin
  // of drag-to-reorder (sessions in a worktree, worktrees in a repo, workspaces at top).
  // dir: -1 up, +1 down. The native app persists the resulting order.
  function reorderRow(row, dir) {
    if (!row) return;
    const lvl = rowLevel(row);
    let unit, sel;
    // owned rows keep their place under their owner; an owner hops as a block (snapOwned below)
    if (lvl === 'session') { if (row.dataset.owner) return; unit = row; sel = '.session:not([data-owner])'; }
    else if (lvl === 'branch' || lvl === 'repo') { unit = row.closest('[data-repo]'); sel = '[data-repo]'; }
    else return;
    if (!unit) return;
    const container = unit.parentNode;
    const sibs = [...container.children].filter((el) => el.matches(sel));
    const i = sibs.indexOf(unit), j = i + dir;
    if (i < 0 || j < 0 || j >= sibs.length) return;   // already at an edge — no wrap
    const firsts = [...container.children].map((el) => [el, el.getBoundingClientRect().top]);   // FLIP: capture
    if (dir > 0) container.insertBefore(sibs[j], unit);   // hop the next sibling above us
    else container.insertBefore(unit, sibs[j]);           // slot in above the previous sibling
    if (lvl === 'session') snapOwned(container);          // owned rows follow their owner
    if (!reduceMotion) {
      for (const [el, top] of firsts) {
        const dy = top - el.getBoundingClientRect().top;
        if (!dy) continue;
        el.style.transition = 'none';
        el.style.transform = `translateY(${dy}px)`;
        requestAnimationFrame(() => {
          el.style.transition = 'transform 180ms var(--ease-out)';
          el.style.transform = '';
          el.addEventListener('transitionend', () => { el.style.transition = ''; el.style.transform = ''; }, { once: true });
        });
      }
    }
    select(row, true);   // keep the cursor on the row you moved, and in view
  }
  // the editable label for a row, and an in-place rename that keeps the open pane in sync
  function nameElOf(row) {
    const lvl = rowLevel(row);
    return row.querySelector(lvl === 'repo' ? '.repo__name' : lvl === 'branch' ? '.branch__name' : '.session__name');
  }
  function renameUnit(row, name) {
    const el = nameElOf(row);
    if (!el) return;
    el.textContent = name;
    if (row.matches('.session') && openEl === row) {
      const t = document.querySelector('.pane__title span');
      if (t) t.textContent = name;
    }
  }

  // Inline rename from the keyboard: r on the selected row edits its name in place.
  // ↵ commits (through renameUnit, so the open pane stays in sync), Esc reverts, blur commits.
  function startRename(row) {
    if (!row) return;
    const el = nameElOf(row);
    if (!el || el.isContentEditable) return;
    closeMenu();
    const prev = (el.textContent || '').trim();
    el.setAttribute('contenteditable', 'plaintext-only');
    el.classList.add('renaming');
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    let done = false;
    const finish = (commit) => {
      if (done) return; done = true;
      el.removeEventListener('keydown', onKey);
      el.removeEventListener('blur', onBlur);
      el.removeAttribute('contenteditable');
      el.classList.remove('renaming');
      const val = (el.textContent || '').replace(/\s+/g, ' ').trim();
      renameUnit(row, commit && val ? val : prev);
    };
    const onKey = (ev) => {
      ev.stopPropagation();                       // typing must not reach the sidebar nav handler
      if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
      else if (ev.key === 'Escape') { ev.preventDefault(); finish(false); }
    };
    const onBlur = () => finish(true);
    el.addEventListener('keydown', onKey);
    el.addEventListener('blur', onBlur);
  }

  // Delete the selected row from the keyboard: drops into the ⌘K confirm frame so a single
  // keystroke can't destroy a session — ↵ confirms, Esc cancels.
  function requestDelete(row) {
    if (!row) return;
    openPaletteAt(confirmFrame(row));
  }

  function addKebab(row) {

    k.className = 'kebab';

  let openMenuEl = null, openMenuRow = null;
  function closeMenu() {
    if (openMenuEl) { const m = openMenuEl; m.classList.remove('open'); setTimeout(() => m.remove(), 160); openMenuEl = null; }
    if (openMenuRow) { openMenuRow.classList.remove('menu-open'); openMenuRow = null; }
  }

  function removeUnit(unit) {
    if (!unit) return;
    // Containment cascade (ADR-0011 stage four): an owning claude row's browsers
    // live and die with it — the delete confirm names them before this runs.
    if (unit.matches && unit.matches('.session[data-sid]')) ownedOf(unit).forEach(removeUnit);
    // If the keyboard cursor is on (or inside) the removed unit it falls back up the
    // hierarchy — session → its branch row, branch → its workspace head — instead of
    // resetting; a removed top-level workspace falls to a neighbouring workspace.
    let fallback = null;
    if (selEl && unit.contains(selEl)) {

      const neighbour = up ? null : [unit.previousElementSibling, unit.nextElementSibling].find((el) => el && el.matches('[data-repo]'));
      fallback = (up || neighbour) ? (up || neighbour).querySelector(':scope > [data-row]') : null;
    }
    unit.classList.add('row-exit');
    const done = () => {
      unit.remove(); rollUpGroups();
      if (setupEl && !document.contains(setupEl)) { setupEl = null; renderEmpty(); }
      if (openEl && !document.contains(openEl)) { openEl = null; renderEmpty(); }
      if (fallback && document.contains(fallback)) select(fallback, true);
    };

  // Mock "git branch" discovery — stands in for the native app's real GitService.
  // `worktree: true` = already checked out somewhere (the repo root for main).
  const FAKE_BRANCHES = [
    { name: 'main', age: '2h', worktree: true },
    { name: 'feat/onboarding', age: '5h' },
    { name: 'fix/login-redirect', age: '3d' },
    { name: 'chore/deps', age: '1w' },
  ];

  // Remote-tracking branches on origin that aren't checked out locally — the extra
  // reach the ⌘K worktree picker searches (git branch -a). Kept out of the
  // local-only flows (add-workspace picker, kebab dialog) so those are unchanged.
  const FAKE_REMOTE_BRANCHES = [
    { name: 'feat/billing', age: '4h' },
    { name: 'feat/search-v2', age: '1d' },
    { name: 'fix/webhook-retry', age: '2d' },
    { name: 'chore/ci-cache', age: '3d' },
    { name: 'experiment/new-nav', age: '6d' },
    { name: 'release/0.4', age: '1w' },
  ];
  const ALL_BRANCHES = [
    ...FAKE_BRANCHES.map((b) => ({ name: b.name, age: b.age, remote: false })),
    ...FAKE_REMOTE_BRANCHES.map((b) => ({ name: b.name, age: b.age, remote: true })),
  ];

  // Branch names can't contain spaces — inputs that name a new branch turn each
  // space into a dash as you type (leading whitespace dropped, runs collapsed).
  const dashSpaces = (s) => s.replace(/^\s+/, '').replace(/\s+/g, '-');
  function dashSpacesOnInput(input) {
    const v = dashSpaces(input.value);
    if (v === input.value) return;
    const pos = Math.max(0, input.selectionStart - (input.value.length - v.length));
    input.value = v;
    input.setSelectionRange(pos, pos);
  }

  // Every branch is a group shell (chevron + empty sessions) so indentation is uniform.
  function branchGroupShell(name, activity) {
    const wrapper = document.createElement('div');
    wrapper.className = 'repo';
    wrapper.setAttribute('data-repo', '');
    wrapper.innerHTML = `<a class="row branch branch--group" data-row data-toggle data-group data-activity="${esc(activity)}">
        <span class="chev">${ICON_CARET}</span>
        <span class="branch__name">${esc(name)}</span>
        <span class="branch__roll"></span>
      </a>
      <div class="collapse"><div class="collapse__inner"><div class="sessions"></div></div></div>`;
    return wrapper;
  }

  function addBranch(repo, name) {
    repo.classList.add('repo--open');
    const branches = repo.querySelector('.branches');
    const wrapper = branchGroupShell(name, 'now');
    wrapper.classList.add('row-enter');
    const groupRow = wrapper.querySelector('.branch--group');
    // The checkout runs in the background: the row lands at once — grayed, a small arc
    // spinning where its roll-up will go — and the pane switches now (riding the create)
    // to the setup skeleton, instead of waiting on the async checkout to yank it later.
    groupRow.classList.add('branch--pending');
    groupRow.querySelector('.branch__roll').innerHTML = '<span class="wt-spinner"></span>';
    branches.appendChild(wrapper);
    wrapper.querySelectorAll('[data-row]').forEach(addKebab);
    rollUpGroups();
    wrapper.addEventListener('animationend', () => wrapper.classList.remove('row-enter'), { once: true });
    openWorktreeSetup(groupRow);

    const wsName = repo.querySelector('.repo__name')?.textContent || '';
    // Simulated `git worktree add`: when it lands, spawn the scope's effective template in
    // creation order. Resolve in place — first session opens — only while the user is still
    // parked on this skeleton (last-intent-wins); if they moved on, don't touch the viewport:
    // announce the ready worktree with the quiet unread bullet (the agent-browser idiom).
    setTimeout(() => {
      groupRow.classList.remove('branch--pending');
      groupRow.querySelector('.branch__roll').innerHTML = '';
      const watching = setupEl === groupRow;
      const tpl = effectiveTpl(false, wsName);
      if (watching && tpl.length === 0) { setupEl = null; renderEmpty(); return; }  // start bare
      tpl.forEach((s, i) => addSession(groupRow, s.kind, { name: s.name, open: watching && i === 0 }));
      if (!watching) {
        const first = wrapper.querySelector('.session');
        if (first) first.classList.add('session--unread');
      }
    }, 1200);
  }

  // Promote a plain branch into a session-holding group if needed, return its .sessions
  function ensureGroup(branchRow) {
    if (branchRow.classList.contains('branch--group')) {
      const repo = branchRow.closest('[data-repo]');
      repo.classList.add('repo--open');
      return repo.querySelector('.sessions');
    }
    const branches = branchRow.parentNode;
    const wrapper = document.createElement('div');
    wrapper.className = 'repo repo--open';
    wrapper.setAttribute('data-repo', '');
    branches.insertBefore(wrapper, branchRow);

    branchRow.classList.add('branch--group');
    branchRow.setAttribute('data-toggle', '');
    branchRow.setAttribute('data-group', '');
    const metaEl = branchRow.querySelector('.branch__meta');
    branchRow.dataset.activity = metaEl ? metaEl.textContent : 'now';
    if (metaEl) metaEl.remove();

    const chev = document.createElement('span'); chev.className = 'chev'; chev.innerHTML = ICON_CARET;
    branchRow.insertBefore(chev, branchRow.firstChild);
    const roll = document.createElement('span'); roll.className = 'branch__roll';
    branchRow.insertBefore(roll, branchRow.querySelector('.kebab') || null);

    const collapse = document.createElement('div'); collapse.className = 'collapse';
    const inner = document.createElement('div'); inner.className = 'collapse__inner';
    const sessions = document.createElement('div'); sessions.className = 'sessions';
    inner.appendChild(sessions); collapse.appendChild(inner);
    wrapper.appendChild(branchRow); wrapper.appendChild(collapse);
    return sessions;
  }

  // A new session is one of two kinds. Claude Code is just a terminal that opened
  // and ran `claude`, so both spawn identically — only the type, icon, name and
  // starting state differ.
  const SESSION_KINDS = {
    terminal: { type: 'terminal', name: 'shell',       icon: `<span class="session__icon">${ICON_TERMINAL}</span>`,                  ind: 'idle' },
    claude:   { type: 'ai',       name: 'Claude Code', icon: `<span class="session__icon session__icon--ai">${ICON_AI}</span>`,      ind: 'work' },
    browser:  { type: 'browser',  name: 'Browser',     icon: `<span class="session__icon">${ICON_BROWSER}</span>`,                   ind: 'idle' },
  };
  // opts: a template spawn passes its entry name, and { open: false } for every session
  // after the first — those wait idle (their process starts on first open), so only the
  // opened one carries its kind's fresh indicator.
  function addSession(branchRow, kind, opts = {}) {
    const spec = SESSION_KINDS[kind];
    const sessions = ensureGroup(branchRow);
    const a = document.createElement('a');
    a.className = 'row session row-enter';
    a.setAttribute('data-row', '');
    a.setAttribute('data-session', '');
    a.setAttribute('data-type', spec.type);
    a.innerHTML = `<span class="session__bullet"></span>
      ${spec.icon}
      <span class="session__name">${esc(opts.name || spec.name)}</span>
      ${IND_HTML[opts.open === false ? 'idle' : spec.ind]}`;
    addKebab(a);
    sessions.appendChild(a);
    a.addEventListener('animationend', () => a.classList.remove('row-enter'), { once: true });
    rollUpGroups();
    if (opts.open !== false) openSession(a); // a freshly spawned session opens straight into the content pane
  }

  const addClaude   = (branchRow) => addSession(branchRow, 'claude');
  const addBrowser  = (branchRow) => addSession(branchRow, 'browser');

  // ===== Add workspace (the + on the section header) =====
  const CHIP_COLORS = ['#7569b5', '#477b90', '#7b773d', '#3e7e74', '#ad587f', '#a158ad'];
  let workspaceSeq = nav.querySelectorAll(':scope > [data-repo]').length;

  // Every branch row maps to a real worktree folder (ADR-0007), so a workspace is
  // added with exactly the branches the user picked — collapsed, count = picked.
  function addWorkspace(pathOrName, cands) {
    const name = (pathOrName.split('/').filter(Boolean).pop() || pathOrName).trim();
    const color = CHIP_COLORS[workspaceSeq++ % CHIP_COLORS.length];
    const rows = cands || [];
    const repo = document.createElement('div');
    repo.className = 'repo row-enter';
    repo.setAttribute('data-repo', '');
    repo.innerHTML = `<button class="row repo__head" data-row data-toggle>
        <span class="chev">${ICON_CARET}</span>
        <span class="repo__chip" style="--c:${color}">${name[0] ? name[0].toUpperCase() : '?'}</span>
        <span class="repo__name">${name}</span>
        <span class="repo__count">${rows.length}</span>
      </button>
      <div class="collapse"><div class="collapse__inner">
        <div class="branches">${rows.map((c) => `
          <div class="repo" data-repo>
            <a class="row branch branch--group" data-row data-toggle data-group data-activity="${esc(c.age)}">
              <span class="chev">${ICON_CARET}</span>
              <span class="branch__name">${esc(c.name)}</span>
              <span class="branch__roll"></span>
            </a>

      </div></div>`;

    repo.querySelectorAll('[data-row]').forEach(addKebab);
    rollUpGroups();
    repo.addEventListener('animationend', () => repo.classList.remove('row-enter'), { once: true });
  }

  // Step 2 of adding a workspace: pick which branches to show. Pre-checked rows
  // already have a worktree (reused); other checked rows get one created on Add.
  // Keyboard-first like the tree: ↑/↓ move, Space toggles, Enter adds, Esc cancels.
  const ICON_CHECK = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg>';
  function openWorktreePicker(pathOrName) {
    const name = (pathOrName.split('/').filter(Boolean).pop() || pathOrName).trim();
    const cands = FAKE_BRANCHES;
    const checked = cands.map((c) => !!c.worktree);
    let cur = 0;

    const backdrop = document.createElement('div');
    backdrop.className = 'backdrop';
    backdrop.innerHTML = `<div class="dialog" role="dialog" aria-label="Add worktrees">
      <div class="dialog__title">Add worktrees — ${esc(name)}</div>
      <div class="wtlist">${cands.map((c, i) => `
        <div class="wtrow" data-i="${i}">
          <span class="wtcheck">${ICON_CHECK}</span>
          <span class="wtrow__name">${esc(c.name)}</span>
          <span class="wtrow__age">${esc(c.age)}</span>
          <span class="wtrow__tag"></span>
        </div>`).join('')}</div>
      <div class="dialog__actions">
        <span class="dialog__btn" data-d="cancel">Cancel</span>
        <span class="dialog__btn dialog__btn--primary" data-d="create">Add</span>
      </div></div>`;
    document.body.appendChild(backdrop);
    requestAnimationFrame(() => backdrop.classList.add('open'));

    const rows = [...backdrop.querySelectorAll('.wtrow')];
    const addBtn = backdrop.querySelector('[data-d="create"]');
    const paint = () => {
      rows.forEach((r, i) => {
        r.classList.toggle('on', checked[i]);
        r.classList.toggle('cur', i === cur);
        r.querySelector('.wtrow__tag').textContent =
          cands[i].worktree ? 'has worktree' : (checked[i] ? 'will create' : '');
      });
      const n = checked.filter(Boolean).length;
      addBtn.textContent = 'Add ' + n;
      addBtn.classList.toggle('is-disabled', !n);
    };
    paint();

    const close = () => { backdrop.classList.remove('open'); setTimeout(() => backdrop.remove(), 200); document.removeEventListener('keydown', onKey, true); };
    const submit = () => {
      const picked = cands.filter((_, i) => checked[i]);
      if (!picked.length) return;
      addWorkspace(pathOrName, picked);
      close();
    };
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) return close();
      const r = e.target.closest('.wtrow');

  (function enableReorder() {

    let start = null, clone = null, active = false, suppress = false, scrollRAF = 0;

    // The unit a row drags as, and the CSS selector its siblings share.
    function dragUnit(row) {
      const lvl = rowLevel(row);
      // owned rows aren't draggable (contained); non-owned sessions slot between blocks only
      if (lvl === 'session') return row.dataset.owner ? null : { unit: row, sel: '.session:not([data-owner])' };
      if (lvl === 'branch' || lvl === 'repo') {
        const u = row.closest('[data-repo]');
        return u ? { unit: u, sel: '[data-repo]' } : null;
      }
      return null;
    }
    const sibs = (container, sel) => [...container.children].filter((el) => el.matches(sel));

    nav.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      const row = e.target.closest('[data-row]');
      if (!row || e.target.closest('.kebab')) return;
      const info = dragUnit(row);
      if (!info) return;
      const r = row.getBoundingClientRect();
      start = { row, unit: info.unit, sel: info.sel, container: info.unit.parentNode,

      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp, { once: true });
    });

    function begin() {
      active = true;
      document.body.classList.add('dragging');
      clone = start.row.cloneNode(true);
      clone.classList.add('drag-clone');
      clone.classList.remove('sel');
      const k = clone.querySelector('.kebab'); if (k) k.remove();
      clone.style.width = start.w + 'px';
      moveClone(start.x, start.y);
      document.body.appendChild(clone);
      start.unit.classList.add('drag-src');
    }
    const moveClone = (x, y) => { clone.style.left = (x - start.offX) + 'px'; clone.style.top = (y - start.offY) + 'px'; };

    function onMove(e) {
      if (!start) return;
      if (!active) {
        if (Math.abs(e.clientX - start.x) < THRESH && Math.abs(e.clientY - start.y) < THRESH) return;
        begin();
      }
      moveClone(e.clientX, e.clientY);
      // insert before the first sibling whose vertical midpoint is below the pointer
      let ref = null;
      for (const el of sibs(start.container, start.sel)) {
        if (el === start.unit) continue;
        const b = el.getBoundingClientRect();
        if (e.clientY < b.top + b.height / 2) { ref = el; break; }
      }
      if (start.unit.nextElementSibling !== ref && start.unit !== ref) {
        flip(() => start.container.insertBefore(start.unit, ref));
      }
      autoscroll(e.clientY);
    }

    function onUp() {
      window.removeEventListener('pointermove', onMove);
      cancelAnimationFrame(scrollRAF);
      if (active) {
        suppress = true;                       // swallow the click this drag would otherwise fire
        if (clone) { clone.remove(); clone = null; }
        start.unit.classList.remove('drag-src');
        document.body.classList.remove('dragging');
        if (start.sel.startsWith('.session')) snapOwned(start.container);   // reunite owner blocks
        select(start.row);                     // keep selection on the row you moved
        active = false;
      }
      start = null;
    }

    // Eat the click that trails a drag so it doesn't toggle/open the row.
    nav.addEventListener('click', (e) => {
      if (suppress) { suppress = false; e.preventDefault(); e.stopPropagation(); }
    }, true);

    // FLIP: animate siblings from their old positions to their new ones after a reorder.
    function flip(mutate) {
      const items = sibs(start.container, start.sel);
      const firsts = items.map((el) => [el, el.getBoundingClientRect().top]);
      mutate();
      if (reduceMotion) return;
      for (const [el, top] of firsts) {
        if (el === start.unit) continue;
        const dy = top - el.getBoundingClientRect().top;
        if (!dy) continue;
        el.style.transition = 'none';
        el.style.transform = `translateY(${dy}px)`;
        requestAnimationFrame(() => {
          el.style.transition = 'transform 180ms var(--ease-out)';
          el.style.transform = '';
          el.addEventListener('transitionend', () => { el.style.transition = ''; el.style.transform = ''; }, { once: true });
        });

  // reveals more. Enter drills into a frame or runs a leaf; Backspace on an empty query steps back.
  // Create / delete / confirm all happen inline as text frames — the palette never spawns a modal.
  const ICON_FOLDER = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,72H131.31L104,44.69A15.86,15.86,0,0,0,92.69,40H40A16,16,0,0,0,24,56V200.62A15.4,15.4,0,0,0,39.38,216H216.89A15.13,15.13,0,0,0,232,200.89V88A16,16,0,0,0,216,72ZM40,56H92.69l16,16H40Zm176,144H40V88H216Z"/></svg>';
  const ICON_STACK  = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M108,40H48A16,16,0,0,0,32,56v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V56A16,16,0,0,0,108,40Zm0,76H48V56h60ZM208,40H148a16,16,0,0,0-16,16v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V56A16,16,0,0,0,208,40Zm0,76H148V56h60ZM108,148H48a16,16,0,0,0-16,16v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V164A16,16,0,0,0,108,148Zm0,76H48V164h60Zm100-76H148a16,16,0,0,0-16,16v60a16,16,0,0,0,16,16h60a16,16,0,0,0,16-16V164A16,16,0,0,0,208,148Zm0,76H148V164h60Z"/></svg>';
  const ICON_ENTER  = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M232,80v88a8,8,0,0,1-16,0V88H56.68l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48a8,8,0,0,1,11.32,11.32L56.68,72H224A8,8,0,0,1,232,80Z"/></svg>';
  const ICON_CLOSE  = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>';
  const ICON_RENAME = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M227.31,73.37,182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31l88-88L180.69,120ZM192,108.68,147.31,64l24-24L216,84.68Z"/></svg>';
  const ICON_RESET = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M240,56v48a8,8,0,0,1-8,8H184a8,8,0,0,1,0-16h27.4L184.81,71.64l-.25-.24a80,80,0,1,0-1.67,114.78,8,8,0,0,1,11,11.63A95.44,95.44,0,0,1,128,224h-1.32A96,96,0,1,1,195.75,60L224,85.8V56a8,8,0,0,1,16,0Z"/></svg>';
  const ICON_MINUS = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm40-88a8,8,0,0,1-8,8H96a8,8,0,0,1,0-16h64A8,8,0,0,1,168,128Z"/></svg>';

  // entity readers — the DOM tree is the source of truth
  const wsName = (h) => h.querySelector('.repo__name').textContent;
  const wsChip = (h) => h.querySelector('.repo__chip').outerHTML;
  const brName = (b) => b.querySelector('.branch__name').textContent;
  const seName = (s) => s.querySelector('.session__name').textContent;
  const seIcon = (s) => s.querySelector('.session__icon').outerHTML;
  const seStatus = (s) => STATE_LABEL[sessionState(s)];
  const wsOf = (el) => { let r = el.closest('[data-repo]'); while (r) { const o = r.parentElement && r.parentElement.closest('[data-repo]'); if (!o) break; r = o; } return r ? r.querySelector('.repo__name').textContent : ''; };
  const brOf = (s) => { const n = s.closest('[data-repo]') && s.closest('[data-repo]').querySelector('.branch__name'); return n ? n.textContent : ''; };
  const seCtx = (s) => [wsOf(s), brOf(s)].filter(Boolean).join(' / ');
  const allRows = (sel) => [...nav.querySelectorAll(sel)];

  const curFrame = () => pal.stack[pal.stack.length - 1];
  function pushFrame(fr) { pal.stack.push(fr); pal.input.value = fr.seed || ''; renderFrame(); if (fr.seed) pal.input.select(); }
  function popFrame() { if (pal.stack.length > 1) { pal.stack.pop(); pal.input.value = ''; renderFrame(); } }
  function popTo(depth) { pal.stack.length = Math.max(1, depth + 1); pal.input.value = ''; renderFrame(); }
  const runAndClose = (fn) => { closePalette(); fn(); };

  // ---- Frames: each returns { crumb?, placeholder, mode?, build(query) -> items[] } ----
  // An item: { icon, label, kbd?, danger?, disabled?, g?(group), enter() }. enter() drills or runs.
  // ⌘K opens context-aware but SCOPED: the root frame shows only the actions of the single innermost
  // thing you're focused on — the session if a session leaf is focused, else its branch, else its
  // workspace — never all three stacked (which made a session context a wall of branch + workspace
  // verbs, easy to misfire). "Where you are" is the focused sidebar row when its ring is showing,
  // else the open session. To act on a parent you step up to it: the parent branch and workspace
  // surface as "Go to" jump rows that drill into their own frame, where their actions live. A browser
  // session adds a Page group above Session — the page's own verbs, one keystroke from anywhere.
  const ICON_COPY = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>';
  // Page verbs drive the same toolbar controls a click would — the palette adds no second
  // navigation path. When the row isn't the open session there is no live page yet, so
  // everything but "Go to address…" (which opens the session first) reads disabled.
  function browserActions(row) {
    const live = row === openEl ? content.querySelector('.browser') : null;
    const home = !live || live.hasAttribute('data-home');
    const url = home ? '' : live.querySelector('.browser__url').textContent;
    const drive = (fn) => runAndClose(() => {
      if (row !== openEl) jumpTo(row);
      const host = content.querySelector('.browser');
      if (host) fn(host);
    });
    const press = (sel) => drive((host) => { const b = host.querySelector(sel); if (b && !b.disabled) b.click(); });
    const navOff = (dir) => !live || live.querySelector('[data-nav="' + dir + '"]').disabled;
    return [
      // on home the omnibox focuses the "Go to" field; on a page it opens the address drop
      { icon: ICON_SEARCH,     label: 'Go to address', kbd: ['⌘', 'L'], enter: () => press('[data-omni]') },
      { icon: ICON_NAV_RELOAD, label: 'Reload page', kbd: ['⌘', 'R'], disabled: home, enter: () => press('[data-nav="reload"]') },
      { icon: ICON_NAV_BACK,   label: 'Back',    kbd: ['⌘', '['], disabled: navOff('back'), enter: () => press('[data-nav="back"]') },
      { icon: ICON_NAV_FWD,    label: 'Forward', kbd: ['⌘', ']'], disabled: navOff('fwd'), enter: () => press('[data-nav="fwd"]') },
      { icon: ICON_COPY,       label: 'Copy URL', disabled: home, enter: () => runAndClose(() => { if (url && navigator.clipboard) navigator.clipboard.writeText(browserNorm(url)); }) },
      { icon: ICON_EXTERNAL,   label: 'Open in default browser', disabled: home, enter: () => runAndClose(() => { if (url) window.open(browserNorm(url), '_blank'); }) },
      { icon: ICON_DEVTOOLS,   label: (live && live.querySelector('[data-devtools]')) ? 'Hide DevTools' : 'Show DevTools', kbd: ['⌥', '⌘', 'I'], disabled: home, enter: () => press('[data-nav="devtools"]') },
    ];
  }
  // Scoped to the innermost focused level. `items` are that level's own verbs (grouped under its
  // scope · name); `parents` are the enclosing branch / workspace as jump rows that drill into their
  // frame — that's how you reach a parent's actions, deliberately one step away.
  function contextActions() {
    const row = contextRow();
    if (!row) return { items: [], parents: [] };
    const lvl = rowLevel(row);
    const br = contextBranch(), head = contextWorkspaceHead();
    const items = [], parents = [];
    const upBranch = () => { if (br) parents.push({ icon: ICON_BRANCH, label: brName(br), ctx: 'Branch', enter: () => pushFrame(branchFrame(br)) }); };
    const upWorkspace = () => { if (head) parents.push({ icon: wsChip(head), label: wsName(head), ctx: 'Workspace', enter: () => pushFrame(workspaceFrame(head)) }); };

    if (lvl === 'session') {
      const open = row, name = seName(open);
      const push = (a) => items.push({ grp: 'Session', unit: name, ...a });
      if (open.dataset.type === 'browser') browserActions(open).forEach((a) => items.push({ grp: 'Page', unit: name, ...a }));
      push({ icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(open)) });
      if (open === openEl && open.dataset.type === 'browser' && browserCommentAPI.available())
        push({ icon: ICON_COMMENT, label: (browserCommentAPI.isOn() ? 'Exit' : 'Enter') + ' comment mode', enter: () => runAndClose(() => browserCommentAPI.toggle()) });
      if (open.dataset.type === 'browser') {
        const owner = ownerOf(open);
        if (owner) push({ icon: ICON_MINUS, label: 'Detach from “' + sessionTitle(owner) + '”', enter: () => runAndClose(() => detach(open)) });
        else claudesOf(open.parentElement).forEach((c) => push({ icon: ICON_AI, label: 'Move under “' + sessionTitle(c) + '”', enter: () => runAndClose(() => adopt(open, c)) }));
      }
      push({ icon: ICON_TRASH, label: 'Delete', danger: true, enter: () => pushFrame(confirmFrame(open)) });
      upBranch(); upWorkspace();
    } else if (lvl === 'branch' && br) {
      const name = brName(br);
      const push = (a) => items.push({ grp: 'Branch', unit: name, ...a });
      push({ icon: ICON_TERMINAL, label: 'New terminal', enter: () => runAndClose(() => addTerminal(br)) });
      push({ icon: ICON_AI, label: 'New Claude Code', enter: () => runAndClose(() => addClaude(br)) });
      push({ icon: ICON_BROWSER, label: 'New browser', enter: () => runAndClose(() => addBrowser(br)) });
      push({ icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(br)) });
      push({ icon: ICON_MINUS, label: 'Remove', enter: () => pushFrame(confirmFrame(br)) });
      upWorkspace();
    } else if (head) {
      const name = wsName(head);
      const push = (a) => items.push({ grp: 'Workspace', unit: name, ...a });
      push({ icon: ICON_BRANCH, label: 'New branch', enter: () => pushFrame(createFrame('worktree', head)) });
      push({ icon: ICON_GEAR, label: 'Settings', enter: () => runAndClose(() => enterSettings(head)) });
      push({ icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(head)) });
      push({ icon: ICON_MINUS, label: 'Remove', enter: () => pushFrame(confirmFrame(head)) });
    }
    return { items, parents };
  }

  // ── Recents / frecency ──────────────────────────────────────────────────
  // The cold palette floats your most-used STABLE targets so they're one keystroke away.
  // Actions keep fixed positions (never ranked by use); dynamically-named sessions (AI titles,
  // browser URLs) are excluded — a target whose name shifts can't earn muscle memory. The native
  // app persists this; here it's in-memory, lightly seeded so the group shows in the static demo.
  let visitClock = 0;
  const visits = new Map();   // row element → { n: times used, t: last-use tick }
  function recordVisit(row) {
    if (!row || !isTreeRow(row)) return;
    if (row.matches('.session') && (row.dataset.type === 'ai' || row.dataset.type === 'browser')) return;
    const v = visits.get(row) || { n: 0, t: 0 };
    v.n += 1; v.t = ++visitClock; visits.set(row, v);
  }
  function recentTargets(limit) {
    return [...visits.entries()].filter(([row]) => document.contains(row))
      .sort((a, b) => (b[1].n - a[1].n) || (b[1].t - a[1].t)).slice(0, limit).map(([row]) => row);
  }
  function recentItem(row) {
    const lvl = rowLevel(row);
    if (lvl === 'branch') return { g: 'Recent', icon: ICON_BRANCH, label: brName(row), ctx: wsOf(row), enter: () => { recordVisit(row); pushFrame(branchFrame(row)); } };
    if (lvl === 'repo')   return { g: 'Recent', icon: wsChip(row), label: wsName(row), enter: () => { recordVisit(row); pushFrame(workspaceFrame(row)); } };
    return { g: 'Recent', icon: seIcon(row), label: seName(row), ctx: seCtx(row), meta: seStatus(row), metaState: sessionState(row), enter: () => runAndClose(() => jumpTo(row)) };
  }
  (function seedRecents() {   // a little history so the Recent group is visible on first load
    const se = (n) => [...nav.querySelectorAll('.session')].find((s) => { const e = s.querySelector('.session__name'); return e && e.textContent === n; });
    const be = (n) => [...nav.querySelectorAll('.branch')].find((b) => { const e = b.querySelector('.branch__name'); return e && e.textContent === n; });
    [se('dev server'), se('dev server'), se('dev server'), be('main'), be('main'), se('migrate')].forEach(recordVisit);
  })();

  function rootFrame() {
    return {
      placeholder: 'Search or jump to anything…',
      build(q) {
        const here = contextActions();
        if (!q) return [
          ...recentTargets(4).map(recentItem),
          ...here.items.map((it) => ({ ...it, g: it.grp + ' · ' + it.unit })),
          ...here.parents.map((p) => ({ ...p, g: 'Go to' })),
          { sec: 'nav', icon: ICON_FOLDER,  label: 'Workspaces', enter: () => pushFrame(workspacesFrame()) },
          { sec: 'nav', icon: ICON_BRANCH,  label: 'Branches',   enter: () => pushFrame(categoryFrame('branch')) },
          { sec: 'nav', icon: ICON_STACK,   label: 'Sessions',   enter: () => pushFrame(categoryFrame('session')) },
          { sec: 'act', icon: ICON_SIDEBAR, label: 'Toggle sidebar', kbd: ['⌘', 'B'], enter: () => runAndClose(() => app.classList.toggle('collapsed')) },
          { sec: 'act', icon: ICON_GEAR,    label: 'Settings', kbd: ['⌘', ','], enter: () => runAndClose(() => enterSettings()) },
          { sec: 'act', icon: ICON_KEYS,    label: 'Keyboard shortcuts', kbd: ['⌘', '?'], enter: () => runAndClose(openShortcuts) },
          { sec: 'act', icon: ICON_CHAT,    label: 'Send feedback…', kbd: ['⌘', '⇧', 'F'], enter: () => runAndClose(openFeedback) },
        ];
        const items = [
          ...here.items.map((it) => ({ ...it, g: 'Actions', ctx: it.unit })),
          { g: 'Actions', icon: ICON_PLUS,     label: 'Add workspace', enter: () => pushFrame(createFrame('workspace')) },
          { g: 'Actions', icon: ICON_SIDEBAR,  label: 'Toggle sidebar', kbd: ['⌘', 'B'], enter: () => runAndClose(() => app.classList.toggle('collapsed')) },
          { g: 'Actions', icon: ICON_GEAR,     label: 'Settings', kbd: ['⌘', ','], enter: () => runAndClose(() => enterSettings()) },
          { g: 'Actions', icon: ICON_KEYS,     label: 'Keyboard shortcuts', kbd: ['⌘', '?'], enter: () => runAndClose(openShortcuts) },
          { g: 'Actions', icon: ICON_CHAT,     label: 'Send feedback…', kbd: ['⌘', '⇧', 'F'], enter: () => runAndClose(openFeedback) },
        ];
        // Search groups run most-local-first: Actions (above), then Sessions, Branches, Workspaces.
        allRows('.session').forEach((s) => items.push({ g: 'Sessions', icon: seIcon(s), label: seName(s), ctx: seCtx(s), meta: seStatus(s), metaState: sessionState(s), enter: () => runAndClose(() => jumpTo(s)) }));
        allRows('.branch').forEach((b) => items.push({ g: 'Branches', icon: ICON_BRANCH, label: brName(b), ctx: wsOf(b), enter: () => pushFrame(branchFrame(b)) }));
        allRows('.repo__head').forEach((h) => items.push({ g: 'Workspaces', icon: wsChip(h), label: wsName(h), enter: () => pushFrame(workspaceFrame(h)) }));
        return items;
      },
    };
  }

  function workspacesFrame() {
    return {
      crumb: 'Workspaces', placeholder: 'Search workspaces…',
      build() {
        const items = [
          { sec: 'act', icon: ICON_PLUS, label: 'Add workspace', enter: () => pushFrame(createFrame('workspace')) },
        ];
        allRows('.repo__head').forEach((h) => items.push({ sec: 'list', icon: wsChip(h), label: wsName(h), enter: () => pushFrame(workspaceFrame(h)) }));
        return items;
      },
    };
  }

  function categoryFrame(kind) {
    const cfg = {
      branch:  { crumb: 'Branches', ph: 'Search branches…', sel: '.branch',  mk: (b) => ({ sec: 'list', icon: ICON_BRANCH, label: brName(b), ctx: wsOf(b), enter: () => pushFrame(branchFrame(b)) }) },
      session: { crumb: 'Sessions', ph: 'Search sessions…', sel: '.session', mk: (s) => ({ sec: 'list', icon: seIcon(s), label: seName(s), ctx: seCtx(s), meta: seStatus(s), metaState: sessionState(s), enter: () => runAndClose(() => jumpTo(s)) }) },
    }[kind];
    return {
      crumb: cfg.crumb, placeholder: cfg.ph,
      build() {
        const items = [];
        allRows(cfg.sel).forEach((r) => items.push(cfg.mk(r)));
        return items;
      },
    };
  }

  function workspaceFrame(head) {
    const name = wsName(head);
    return {
      crumb: name, placeholder: 'Search ' + name + '…',
      build() {
        const items = [
          { sec: 'act', icon: ICON_BRANCH, label: 'New branch',  enter: () => pushFrame(createFrame('worktree', head)) },
        ];
        // Session creates land on the workspace's active branch (contextBranch's fallback);
        // the ctx chip names it since the crumb only establishes the workspace.
        const scope = head.closest('[data-repo]');
        const br = scope.querySelector('.branch--active') || scope.querySelector('.branch');
        if (br) {
          const bn = brName(br);
          items.push({ sec: 'act', icon: ICON_TERMINAL, label: 'New terminal',    ctx: bn, enter: () => runAndClose(() => addTerminal(br)) });
          items.push({ sec: 'act', icon: ICON_AI,       label: 'New Claude Code', ctx: bn, enter: () => runAndClose(() => addClaude(br)) });
          items.push({ sec: 'act', icon: ICON_BROWSER,  label: 'New browser',     ctx: bn, enter: () => runAndClose(() => addBrowser(br)) });
        }
        items.push(
          { sec: 'act', icon: ICON_GEAR,   label: 'Settings', enter: () => runAndClose(() => enterSettings(head)) },
          { sec: 'act', icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(head)) },
          { sec: 'act', icon: ICON_MINUS,  label: 'Remove', enter: () => pushFrame(confirmFrame(head)) },
        );
        head.closest('[data-repo]').querySelectorAll('.branch').forEach((b) =>
          items.push({ sec: 'list', icon: ICON_BRANCH, label: brName(b), enter: () => pushFrame(branchFrame(b)) }));
        return items;
      },
    };
  }

  function branchFrame(row) {
    const name = brName(row);
    return {
      crumb: name, placeholder: 'Search ' + name + '…',
      build() {
        const items = [
          { sec: 'act', icon: ICON_TERMINAL, label: 'New terminal',    enter: () => runAndClose(() => addTerminal(row)) },
          { sec: 'act', icon: ICON_AI,       label: 'New Claude Code', enter: () => runAndClose(() => addClaude(row)) },
          { sec: 'act', icon: ICON_BROWSER,   label: 'New browser',     enter: () => runAndClose(() => addBrowser(row)) },
          { sec: 'act', icon: ICON_RENAME,   label: 'Rename', enter: () => pushFrame(renameFrame(row)) },
          { sec: 'act', icon: ICON_MINUS,    label: 'Remove', enter: () => pushFrame(confirmFrame(row)) },
        ];
        if (row.classList.contains('branch--group'))
          row.closest('[data-repo]').querySelectorAll('.sessions .session').forEach((s) =>
            items.push({ sec: 'list', icon: seIcon(s), label: seName(s), meta: seStatus(s), metaState: sessionState(s), enter: () => runAndClose(() => jumpTo(s)) }));
        return items;
      },
    };
  }

  // `a` on a branch/worktree jumps straight to the "add a session" choice — terminal or Claude Code.
  function newSessionFrame(row) {
    const name = brName(row);
    return {
      crumb: 'New session', placeholder: 'New session in ' + name + '…',
      build() {
        return [
          { sec: 'act', icon: ICON_TERMINAL, label: 'New terminal',    ctx: name, enter: () => runAndClose(() => addTerminal(row)) },
          { sec: 'act', icon: ICON_AI,       label: 'New Claude Code', ctx: name, enter: () => runAndClose(() => addClaude(row)) },
          { sec: 'act', icon: ICON_BROWSER,   label: 'New browser',     ctx: name, enter: () => runAndClose(() => addBrowser(row)) },
        ];
      },
    };
  }

  // A session leaf has no children — its own actions (rename / delete) plus sibling
  // creates on its branch (the ctx chip names the branch, as the crumb is the session),
  // plus the containment verbs on browser rows (Move under a Claude session / Detach —
  // ADR-0011 stage four).
  function sessionFrame(row) {
    const name = seName(row);
    return {
      crumb: name, placeholder: 'Search ' + name + '…',
      build() {
        const items = [];
        if (row.dataset.type === 'browser') browserActions(row).forEach((a) => items.push({ sec: 'page', ...a }));
        const br = branchGroupOf(row);
        if (br) {
          const bn = brName(br);
          items.push({ sec: 'act', icon: ICON_TERMINAL, label: 'New terminal',    ctx: bn, enter: () => runAndClose(() => addTerminal(br)) });
          items.push({ sec: 'act', icon: ICON_AI,       label: 'New Claude Code', ctx: bn, enter: () => runAndClose(() => addClaude(br)) });
          items.push({ sec: 'act', icon: ICON_BROWSER,  label: 'New browser',     ctx: bn, enter: () => runAndClose(() => addBrowser(br)) });
        }
        items.push({ sec: 'act', icon: ICON_RENAME, label: 'Rename', enter: () => pushFrame(renameFrame(row)) });
        if (row.dataset.type === 'browser') {
          const owner = ownerOf(row);
          if (owner) items.push({ sec: 'act', icon: ICON_MINUS, label: 'Detach from “' + sessionTitle(owner) + '”', enter: () => runAndClose(() => detach(row)) });
          else claudesOf(row.parentElement).forEach((c) => items.push({ sec: 'act', icon: ICON_AI, label: 'Move under “' + sessionTitle(c) + '”', enter: () => runAndClose(() => adopt(row, c)) }));
        }
        items.push({ sec: 'act', icon: ICON_TRASH, label: 'Delete', danger: true, enter: () => pushFrame(confirmFrame(row)) });
        return items;
      },
    };
  }

  // The row kebab drills the palette straight to that row's frame (workspace / branch /
  // session) — same actions as anywhere else in ⌘K, no separate popover to maintain.
  function frameForRow(row) {
    const lvl = rowLevel(row);
    return lvl === 'repo' ? workspaceFrame(row) : lvl === 'branch' ? branchFrame(row) : sessionFrame(row);
  }
  function openPaletteAt(frame) {
    closeMenu();
    if (paletteOpen) { pal.stack = [rootFrame()]; pushFrame(frame); return; }
    openPalette();

  function addToRow(row) {

  function removeWorktreeFrame(row) {

  // quiet line, the base it forks from and where its worktree lands on disk (ADR-0007).
  function worktreeFrame(ctx) {

    const baseName = baseEl ? baseEl.textContent : 'main';
    const pathFor = (name) => '…/Synth/worktrees/' + repoName + '/' + name.replace(/[^\w.-]+/g, '-');

      crumb: 'New branch', mode: 'input', placeholder: 'Search branches to check out…',
